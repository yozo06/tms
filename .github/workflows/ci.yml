name: WildArc CI

on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [develop, main]

jobs:
  backend-checks:
    name: Backend — TypeScript & Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Run backend tests
        run: npm run test:backend -- --reporter=verbose
        continue-on-error: false

  frontend-checks:
    name: Frontend — TypeScript, Tests & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Run frontend tests
        run: npx vitest run --reporter=verbose
        continue-on-error: false

      - name: Build
        run: npm run build

  pr-summary:
    name: PR Status
    runs-on: ubuntu-latest
    needs: [backend-checks, frontend-checks]
    if: always()
    steps:
      - name: Check results
        run: |
          if [ "${{ needs.backend-checks.result }}" = "failure" ] || [ "${{ needs.frontend-checks.result }}" = "failure" ]; then
            echo "❌ CI checks failed"
            exit 1
          fi
          echo "✅ All checks passed"
