<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WildArc — Coorg Rainforest</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background: #050a04; cursor: none; }
        canvas { display: block; }
        .brand {
            position: fixed; bottom: 10%; left: 50%; transform: translateX(-50%);
            text-align: center; z-index: 50; opacity: 0;
            animation: fadeIn 5s ease-out 3s forwards; pointer-events: none;
        }
        .brand h1 {
            font-family: Georgia, 'Times New Roman', serif;
            color: rgba(225, 210, 175, 0.7); font-size: 3rem;
            font-weight: 400; letter-spacing: 12px;
            text-shadow: 0 2px 30px rgba(0,0,0,0.8);
        }
        .brand p {
            color: rgba(195, 190, 170, 0.4); font-family: Georgia, serif;
            font-size: 0.8rem; letter-spacing: 6px; margin-top: 12px;
            text-transform: uppercase;
        }
        @keyframes fadeIn { to { opacity: 1; } }
    </style>
</head>
<body>
<canvas id="c"></canvas>
<div class="brand"><h1>wildarc</h1><p>Where nature leads, we follow</p></div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;
let mx = 0.5, my = 0.5, smx = 0.5, smy = 0.5;
let t = 0;

function resize() { W = canvas.width = innerWidth; H = canvas.height = innerHeight; }
addEventListener('resize', resize); resize();
addEventListener('mousemove', e => { mx = e.clientX / W; my = e.clientY / H; });

// ===== NOISE ENGINE =====
class Noise {
    constructor(seed = 42) {
        this.p = new Uint8Array(512);
        const perm = new Uint8Array(256);
        for (let i = 0; i < 256; i++) perm[i] = i;
        let s = seed;
        for (let i = 255; i > 0; i--) {
            s = (s * 16807) % 2147483647;
            const j = s % (i + 1);
            [perm[i], perm[j]] = [perm[j], perm[i]];
        }
        for (let i = 0; i < 512; i++) this.p[i] = perm[i & 255];
    }
    fade(t) { return t * t * t * (t * (t * 6 - 15) + 10); }
    grad(hash, x) { return (hash & 1) === 0 ? x : -x; }
    n1(x) {
        const xi = Math.floor(x) & 255, xf = x - Math.floor(x);
        return this.grad(this.p[xi], xf) * (1 - this.fade(xf)) + this.grad(this.p[xi + 1], xf - 1) * this.fade(xf);
    }
    // 2D noise for textures
    n2(x, y) {
        const X = Math.floor(x) & 255, Y = Math.floor(y) & 255;
        const xf = x - Math.floor(x), yf = y - Math.floor(y);
        const u = this.fade(xf), v = this.fade(yf);
        const a = this.p[X] + Y, b = this.p[X + 1] + Y;
        const g = (h, dx, dy) => ((h & 3) === 0 ? dx + dy : (h & 3) === 1 ? -dx + dy : (h & 3) === 2 ? dx - dy : -dx - dy);
        return (1 - v) * ((1 - u) * g(this.p[a], xf, yf) + u * g(this.p[b], xf - 1, yf)) +
               v * ((1 - u) * g(this.p[a + 1], xf, yf - 1) + u * g(this.p[b + 1], xf - 1, yf - 1));
    }
    fbm(x, oct = 6, lac = 2, gain = 0.5) {
        let v = 0, a = 1, f = 1, m = 0;
        for (let i = 0; i < oct; i++) { v += this.n1(x * f) * a; m += a; a *= gain; f *= lac; }
        return v / m;
    }
    fbm2(x, y, oct = 4) {
        let v = 0, a = 1, f = 1, m = 0;
        for (let i = 0; i < oct; i++) { v += this.n2(x * f, y * f) * a; m += a; a *= 0.5; f *= 2; }
        return v / m;
    }
}

const N = new Noise(137), N2 = new Noise(283), N3 = new Noise(419), N4 = new Noise(557);
function rgba(r, g, b, a = 1) { return `rgba(${r|0},${g|0},${b|0},${a})`; }
function lerp(a, b, t) { return a + (b - a) * t; }
function clamp(v, lo = 0, hi = 1) { return Math.max(lo, Math.min(hi, v)); }

// ===== SKY =====
function drawSky() {
    for (let y = 0; y < H * 0.78; y++) {
        const f = y / (H * 0.78);
        let r, g, b;
        if (f < 0.12) { r = lerp(10, 22, f / 0.12); g = lerp(15, 30, f / 0.12); b = lerp(30, 55, f / 0.12); }
        else if (f < 0.30) { const s = (f - 0.12) / 0.18; r = lerp(22, 50, s); g = lerp(30, 68, s); b = lerp(55, 100, s); }
        else if (f < 0.45) { const s = (f - 0.30) / 0.15; r = lerp(50, 105, s); g = lerp(68, 125, s); b = lerp(100, 145, s); }
        else if (f < 0.58) { const s = (f - 0.45) / 0.13; r = lerp(105, 185, s); g = lerp(125, 160, s); b = lerp(145, 130, s); }
        else if (f < 0.72) { const s = (f - 0.58) / 0.14; r = lerp(185, 225, s); g = lerp(160, 145, s); b = lerp(130, 85, s); }
        else if (f < 0.86) { const s = (f - 0.72) / 0.14; r = lerp(225, 200, s); g = lerp(145, 95, s); b = lerp(85, 45, s); }
        else { const s = (f - 0.86) / 0.14; r = lerp(200, 130, s); g = lerp(95, 50, s); b = lerp(45, 25, s); }
        const nv = N.n1(y * 0.007 + 100) * 3;
        ctx.fillStyle = rgba(r + nv, g + nv * 0.5, b - nv * 0.2);
        ctx.fillRect(0, y, W, 1);
    }
    // Cirrus wisps
    ctx.globalAlpha = 0.035;
    for (let i = 0; i < 4; i++) {
        const cy = H * (0.12 + i * 0.07), cx = W * (0.15 + i * 0.2);
        ctx.beginPath();
        for (let x = -150; x < 150; x += 2) {
            const ht = 1 - (x / 150) ** 2;
            const y = cy + N.fbm(x * 0.015 + i * 5, 3) * 6 * ht;
            x === -150 ? ctx.moveTo(cx + x, y) : ctx.lineTo(cx + x, y);
        }
        ctx.strokeStyle = 'rgba(190,185,175,1)'; ctx.lineWidth = 6; ctx.lineCap = 'round'; ctx.stroke();
    }
    ctx.globalAlpha = 1;
}

function drawSun() {
    const sx = W * (0.38 + (smx - 0.5) * 0.012), sy = H * (0.54 + (smy - 0.5) * 0.006);
    const p = 1 + Math.sin(t * 0.35) * 0.01;
    for (let i = 4; i >= 0; i--) {
        const r = (90 + i * 70) * p;
        const g = ctx.createRadialGradient(sx, sy, 0, sx, sy, r);
        g.addColorStop(0, rgba(255, 245, 215, 0.035 - i * 0.005));
        g.addColorStop(1, 'transparent');
        ctx.fillStyle = g; ctx.beginPath(); ctx.arc(sx, sy, r, 0, Math.PI * 2); ctx.fill();
    }
    const d = ctx.createRadialGradient(sx, sy, 0, sx, sy, 28 * p);
    d.addColorStop(0, 'rgba(255,252,240,0.8)'); d.addColorStop(0.35, 'rgba(255,235,180,0.5)');
    d.addColorStop(0.7, 'rgba(245,200,110,0.15)'); d.addColorStop(1, 'transparent');
    ctx.fillStyle = d; ctx.beginPath(); ctx.arc(sx, sy, 28 * p, 0, Math.PI * 2); ctx.fill();
}

// ===== THREE DISTINCT HILLS =====
// Each hill is a prominent, individual landform — not a continuous range

function getHillProfile(centerX, width, peakH, noiseObj, seed, x, ox) {
    const nx = (x + ox - centerX) / width;
    // Bell curve shape * noise for organic peak
    const bell = Math.exp(-nx * nx * 2.5);
    const detail = noiseObj.fbm(nx * 4 + seed, 5) * 0.3;
    return bell * (1 + detail) * peakH;
}

function drawHill(config) {
    const { centerX, width, peakHeight, baseY, noiseObj, seed, colors, haze, hazeColor,
            parallax, forest, forestConfig } = config;
    const ox = (smx - 0.5) * parallax;
    const oy = (smy - 0.5) * parallax * 0.2;

    const points = [];
    ctx.beginPath();
    ctx.moveTo(-10, H);
    for (let x = -10; x <= W + 10; x += 2) {
        const h = getHillProfile(centerX, width, peakHeight, noiseObj, seed, x, ox);
        const y = baseY - h + oy;
        points.push({ x, y });
        x === -10 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.lineTo(W + 10, H); ctx.lineTo(-10, H); ctx.closePath();

    // Hill body gradient
    const minY = Math.min(...points.map(p => p.y));
    const grad = ctx.createLinearGradient(0, minY - 10, 0, baseY + 20);
    colors.forEach(([s, c]) => grad.addColorStop(s, c));
    ctx.fillStyle = grad;
    ctx.fill();

    // Atmospheric haze
    if (haze > 0) {
        ctx.fillStyle = rgba(hazeColor[0], hazeColor[1], hazeColor[2], haze);
        ctx.fill();
    }

    // Dense forest canopy on hill
    if (forest) {
        drawHillForest(points, ox, oy, forestConfig);
    }

    return points;
}

function drawHillForest(points, ox, oy, cfg) {
    const { color, shadowColor, density, scale, layers } = cfg;
    const step = Math.max(1, Math.floor(density));

    for (let layer = 0; layer < (layers || 2); layer++) {
        const layerOff = layer * 3;
        for (let i = 0; i < points.length; i += step) {
            const p = points[i];
            const sz = (4 + N.fbm(i * 0.08 + layerOff + 40, 2) * 7) * scale;

            // Organic tree canopy cluster — overlapping irregular circles
            const count = 2 + Math.floor(N.n1(i * 0.5 + layer * 10) * 1.5 + 1.5);
            for (let c = 0; c < count; c++) {
                const cx = p.x + N.n1(i * 0.6 + c * 2.7 + layerOff) * sz * 1.5;
                const cy = p.y - sz * (0.2 + c * 0.12) + N.n1(i * 0.4 + c * 3.1 + layerOff) * sz * 0.3;
                const cr = sz * (0.35 + N.n1(i * 0.8 + c * 4 + layerOff) * 0.25);

                ctx.beginPath(); ctx.arc(cx, cy, cr, 0, Math.PI * 2);
                const shade = N.n1(i * 0.15 + c + layer) * 6;
                ctx.fillStyle = layer === 0
                    ? rgba(shadowColor[0] + shade, shadowColor[1] + shade, shadowColor[2] + shade, shadowColor[3])
                    : rgba(color[0] + shade, color[1] + shade * 1.3, color[2] + shade, color[3]);
                ctx.fill();
            }
        }
    }
}

// ===== RIVER IN VALLEY =====
function drawRiver() {
    const ox = (smx - 0.5) * 14;
    const oy = (smy - 0.5) * 5;

    // River is down in the valley between hills — seen from above at an angle
    // It should look like it's at the base of the hills, winding through

    const riverBaseY = H * 0.67;
    const riverWidth = 18; // wider since we see it from above

    // River banks (earthy, with vegetation)
    // Left bank
    ctx.beginPath();
    for (let x = -50; x <= W + 50; x += 3) {
        const nx = x / W;
        const curve = N.fbm(nx * 2.5 + 18, 4) * 22;
        const y = riverBaseY + curve + oy;
        x === -50 ? ctx.moveTo(x + ox, y - riverWidth * 1.2) : ctx.lineTo(x + ox, y - riverWidth * 1.2);
    }
    for (let x = W + 50; x >= -50; x -= 3) {
        const nx = x / W;
        const curve = N.fbm(nx * 2.5 + 18, 4) * 22;
        const y = riverBaseY + curve + oy;
        ctx.lineTo(x + ox, y - riverWidth * 0.6);
    }
    ctx.closePath();
    ctx.fillStyle = rgba(28, 42, 22, 0.5); // vegetated bank
    ctx.fill();

    // Right bank
    ctx.beginPath();
    for (let x = -50; x <= W + 50; x += 3) {
        const nx = x / W;
        const curve = N.fbm(nx * 2.5 + 18, 4) * 22;
        const y = riverBaseY + curve + oy;
        x === -50 ? ctx.moveTo(x + ox, y + riverWidth * 0.6) : ctx.lineTo(x + ox, y + riverWidth * 0.6);
    }
    for (let x = W + 50; x >= -50; x -= 3) {
        const nx = x / W;
        const curve = N.fbm(nx * 2.5 + 18, 4) * 22;
        const y = riverBaseY + curve + oy;
        ctx.lineTo(x + ox, y + riverWidth * 1.2);
    }
    ctx.closePath();
    ctx.fillStyle = rgba(25, 40, 20, 0.4);
    ctx.fill();

    // Water body — with depth gradient (deeper in center = darker)
    for (let pass = 0; pass < 4; pass++) {
        const widthScale = [1.0, 0.8, 0.55, 0.3][pass];
        const colors = [
            rgba(60, 95, 110, 0.25),  // outer — shallow, lighter
            rgba(50, 85, 105, 0.3),
            rgba(40, 75, 100, 0.35),  // center — deep, darker
            rgba(55, 90, 115, 0.2),   // bright center reflection
        ][pass];

        ctx.beginPath();
        for (let x = -50; x <= W + 50; x += 3) {
            const nx = x / W;
            const curve = N.fbm(nx * 2.5 + 18, 4) * 22;
            const wave = Math.sin(nx * 15 + t * 0.35 + pass) * 1.5;
            const y = riverBaseY + curve + wave + oy;
            x === -50 ? ctx.moveTo(x + ox, y - riverWidth * widthScale * 0.5) : ctx.lineTo(x + ox, y - riverWidth * widthScale * 0.5);
        }
        for (let x = W + 50; x >= -50; x -= 3) {
            const nx = x / W;
            const curve = N.fbm(nx * 2.5 + 18, 4) * 22;
            const wave = Math.sin(nx * 15 + t * 0.35 + pass + 0.5) * 1.5;
            const y = riverBaseY + curve + wave + oy;
            ctx.lineTo(x + ox, y + riverWidth * widthScale * 0.5);
        }
        ctx.closePath();
        ctx.fillStyle = colors;
        ctx.fill();
    }

    // Rocks in river
    for (let i = 0; i < 15; i++) {
        const rx = (N.n1(i * 3.7 + 500) * 0.5 + 0.5) * W;
        const nx = rx / W;
        const curve = N.fbm(nx * 2.5 + 18, 4) * 22;
        const ry = riverBaseY + curve + oy;
        const sz = 3 + N.n1(i * 2.3 + 550) * 5;
        const exposed = N.n1(i * 1.9 + 580) > -0.2; // most rocks partially submerged

        if (exposed) {
            // Rock above water
            ctx.beginPath();
            ctx.ellipse(rx + ox, ry - sz * 0.3, sz, sz * 0.5, N.n1(i * 4 + 600) * 0.5, 0, Math.PI * 2);
            const rockShade = 40 + N.n1(i * 1.5 + 620) * 20;
            ctx.fillStyle = rgba(rockShade, rockShade - 5, rockShade - 10, 0.6);
            ctx.fill();

            // Wet highlight
            ctx.beginPath();
            ctx.ellipse(rx + ox - 1, ry - sz * 0.4, sz * 0.4, sz * 0.2, 0, 0, Math.PI * 2);
            ctx.fillStyle = rgba(120, 140, 150, 0.15);
            ctx.fill();
        }

        // Ripples around rock
        ctx.beginPath();
        ctx.ellipse(rx + ox + 2, ry, sz * 1.3, sz * 0.3, 0.1, 0, Math.PI * 2);
        ctx.strokeStyle = rgba(130, 160, 180, 0.08);
        ctx.lineWidth = 0.8;
        ctx.stroke();
    }

    // Water surface glints
    ctx.globalCompositeOperation = 'screen';
    for (let i = 0; i < 25; i++) {
        const gx = ((i * 59 + t * 5) % (W + 100)) - 50 + ox;
        const nx = gx / W;
        const curve = N.fbm(nx * 2.5 + 18, 4) * 22;
        const gy = riverBaseY + curve + oy;
        const gl = Math.sin(t * 2 + i * 1.9) * 0.5 + 0.5;
        if (gl > 0.6) {
            ctx.beginPath(); ctx.arc(gx, gy, 1.2, 0, Math.PI * 2);
            ctx.fillStyle = rgba(210, 230, 250, (gl - 0.6) * 0.45);
            ctx.fill();
        }
    }
    ctx.globalCompositeOperation = 'source-over';

    // Bank vegetation — small bushes, reeds along the river
    for (let i = 0; i < 30; i++) {
        const vx = (N.n1(i * 2.1 + 700) * 0.5 + 0.5) * W + ox;
        const nx = vx / W;
        const curve = N.fbm(nx * 2.5 + 18, 4) * 22;
        const side = i % 2 === 0 ? -1 : 1;
        const vy = riverBaseY + curve + oy + side * riverWidth * (0.7 + N.n1(i * 1.3 + 720) * 0.3);
        const h = 5 + N.n1(i * 1.7 + 740) * 6;

        // Small bush/reed
        for (let s = 0; s < 3; s++) {
            const sx = vx + N.n1(i * 3 + s * 5 + 760) * 4;
            const sway = Math.sin(t * 0.3 + i * 0.5 + s) * 1.5;
            ctx.beginPath();
            ctx.moveTo(sx, vy);
            ctx.quadraticCurveTo(sx + sway, vy - h * 0.6, sx + sway * 1.5, vy - h);
            ctx.strokeStyle = rgba(18, 40 + s * 5, 15, 0.35);
            ctx.lineWidth = 1;
            ctx.stroke();

            // Leaf at tip
            ctx.beginPath();
            ctx.ellipse(sx + sway * 1.5, vy - h, 3, 1.5, sway * 0.2, 0, Math.PI * 2);
            ctx.fillStyle = rgba(22, 50 + s * 5, 18, 0.3);
            ctx.fill();
        }
    }
}

// ===== MIST SYSTEM =====
// Key: mist is drawn BETWEEN hill layers for parallax depth illusion
function drawMistBand(baseY, count, speed, maxAlpha, scaleX, scaleY, color, parallax) {
    const drift = t * speed;
    const ox = (smx - 0.5) * parallax;

    for (let i = 0; i < count; i++) {
        const seed = i * 3.7 + 0.5;
        const x = ((N.n1(seed) * W * 1.8 + drift * 22 + ox) % (W * 2.2)) - W * 0.6;
        const yOff = N.fbm(drift * 0.04 + seed, 2) * 25;
        const y = baseY + yOff + N.n1(seed + 100) * 20;

        const rx = (130 + N.n1(seed + 200) * 90) * scaleX;
        const ry = (22 + N.n1(seed + 300) * 14) * scaleY;
        const alpha = maxAlpha * (0.4 + N.fbm(drift * 0.06 + seed, 2) * 0.6);

        // Multi-pass soft mist
        for (let p = 2; p >= 0; p--) {
            const pr = 1 + p * 0.35;
            const g = ctx.createRadialGradient(x, y, 0, x, y, rx * pr);
            const a = alpha * (1 - p * 0.28);
            g.addColorStop(0, rgba(color[0], color[1], color[2], a));
            g.addColorStop(0.35, rgba(color[0], color[1], color[2], a * 0.55));
            g.addColorStop(0.65, rgba(color[0], color[1], color[2], a * 0.15));
            g.addColorStop(1, 'transparent');
            ctx.fillStyle = g;
            ctx.beginPath();
            ctx.ellipse(x, y, rx * pr, ry * pr, N.n1(seed + 400) * 0.25, 0, Math.PI * 2);
            ctx.fill();
        }
    }
}

function drawMistTendrils(baseY, count, speed, alpha, parallax) {
    const drift = t * speed;
    const ox = (smx - 0.5) * (parallax || 0);
    ctx.globalAlpha = alpha;
    for (let i = 0; i < count; i++) {
        const seed = i * 5.3 + 77;
        const startX = ((N.n1(seed) * W * 2 + drift * 18 + ox) % (W * 1.6)) - W * 0.3;
        const y = baseY + N.n1(seed + 50) * 25;
        ctx.beginPath();
        const len = 120 + N.n1(seed + 80) * 100;
        for (let x = 0; x < len; x += 3) {
            const py = y + N.fbm((startX + x) * 0.004 + seed + drift * 0.015, 3) * 12;
            x === 0 ? ctx.moveTo(startX + x, py) : ctx.lineTo(startX + x, py);
        }
        ctx.strokeStyle = rgba(190, 200, 205, 0.7);
        ctx.lineWidth = 2 + N.n1(seed + 90) * 3;
        ctx.lineCap = 'round';
        ctx.filter = 'blur(2px)';
        ctx.stroke();
        ctx.filter = 'none';
    }
    ctx.globalAlpha = 1;
}

// ===== RAINFOREST FLOOR & UNDERGROWTH =====
function drawRainforestFloor() {
    const baseY = H * 0.78;
    const px = (smx - 0.5) * 30;

    // Rich dark earth
    const g = ctx.createLinearGradient(0, baseY - 25, 0, H);
    g.addColorStop(0, 'rgba(14, 28, 12, 0)');
    g.addColorStop(0.03, rgba(18, 34, 14, 1));
    g.addColorStop(0.12, rgba(12, 24, 10, 1));
    g.addColorStop(0.4, rgba(7, 14, 5, 1));
    g.addColorStop(1, rgba(3, 7, 2, 1));
    ctx.fillStyle = g;
    ctx.fillRect(0, baseY - 25, W, H - baseY + 25);

    // Ground texture — leaf litter, small stones, fallen twigs
    for (let i = 0; i < 80; i++) {
        const x = (N.n1(i * 1.2 + 200) * 0.5 + 0.5) * W * 1.2 - W * 0.1 + px;
        const y = baseY + 3 + (N.n1(i * 1.6 + 300) * 0.5 + 0.5) * (H - baseY) * 0.35;
        const isLeaf = i % 3 !== 0;

        if (isLeaf) {
            // Fallen leaf shapes (various decomposition states)
            const sz = 2 + N.n1(i * 2 + 400) * 3;
            const rot = N.n1(i * 3 + 450) * Math.PI;
            ctx.save(); ctx.translate(x, y); ctx.rotate(rot);
            ctx.beginPath();
            ctx.ellipse(0, 0, sz, sz * 0.45, 0, 0, Math.PI * 2);
            const brown = N.n1(i * 0.7 + 470);
            ctx.fillStyle = brown > 0
                ? rgba(40 + brown * 15, 28 + brown * 8, 15, 0.12)
                : rgba(20, 32, 16, 0.1);
            ctx.fill();
            ctx.restore();
        } else {
            // Small stone
            const sz = 1.5 + N.n1(i * 2.5 + 500) * 2;
            ctx.beginPath(); ctx.arc(x, y, sz, 0, Math.PI * 2);
            ctx.fillStyle = rgba(35, 32, 28, 0.1);
            ctx.fill();
        }
    }

    // --- UNDERSTORY LAYER ---
    // Ferns (tree ferns — large, arching fronds)
    drawTreeFerns(baseY, px);
    // Small palms
    drawSmallPalms(baseY, px);
    // Ground ferns
    drawGroundFerns(baseY, px);
    // Moss-covered rocks
    drawMossyRocks(baseY, px);
}

function drawTreeFerns(baseY, px) {
    // Large tree ferns with unfurling fronds — signature rainforest understory
    for (let i = 0; i < 6; i++) {
        const x = (i / 6) * W * 1.1 - W * 0.05 + px + N.n1(i * 4 + 800) * 40;
        const y = baseY + N.n1(i * 3 + 810) * 5;
        const height = 30 + N.n1(i * 2 + 820) * 20;
        const sway = Math.sin(t * 0.2 + i * 0.9) * 3;

        // Trunk (thin, fibrous)
        ctx.beginPath();
        ctx.moveTo(x, y);
        ctx.quadraticCurveTo(x + sway * 0.5, y - height * 0.5, x + sway, y - height);
        ctx.strokeStyle = rgba(30, 22, 16, 0.4);
        ctx.lineWidth = 3;
        ctx.stroke();

        // Fronds radiating from top
        const frondCount = 5 + Math.floor(N.n1(i * 5 + 830) * 3);
        for (let f = 0; f < frondCount; f++) {
            const angle = (f / frondCount) * Math.PI - Math.PI * 0.5 + N.n1(f * 2 + i * 7) * 0.3;
            const frondLen = 15 + N.n1(f * 3 + i * 5 + 840) * 12;
            const droop = 0.4 + N.n1(f * 2 + 860) * 0.3; // fronds droop under gravity
            const fSway = Math.sin(t * 0.25 + i + f * 0.4) * 2;

            const startX = x + sway;
            const startY = y - height;

            // Draw curved frond
            ctx.beginPath();
            ctx.moveTo(startX, startY);
            const midX = startX + Math.cos(angle) * frondLen * 0.6 + fSway;
            const midY = startY + Math.sin(angle) * frondLen * 0.6 + droop * frondLen * 0.3;
            const endX = startX + Math.cos(angle) * frondLen + fSway * 1.5;
            const endY = startY + Math.sin(angle) * frondLen + droop * frondLen;

            ctx.quadraticCurveTo(midX, midY, endX, endY);
            ctx.strokeStyle = rgba(20, 48, 18, 0.35);
            ctx.lineWidth = 1.2;
            ctx.stroke();

            // Pinnae (small leaflets along frond)
            const pinnaeCount = 6;
            for (let p = 1; p < pinnaeCount; p++) {
                const pt = p / pinnaeCount;
                const px2 = lerp(startX, endX, pt);
                const py2 = lerp(startY, endY, pt) + droop * frondLen * pt * pt * 0.5;
                const pLen = (1 - pt) * 5 + 2;

                for (const side of [-1, 1]) {
                    ctx.beginPath();
                    ctx.moveTo(px2, py2);
                    const perpAngle = angle + side * Math.PI * 0.35;
                    ctx.lineTo(px2 + Math.cos(perpAngle) * pLen, py2 + Math.sin(perpAngle) * pLen + 1);
                    ctx.strokeStyle = rgba(18, 42 + pt * 10, 14, 0.25);
                    ctx.lineWidth = 0.7;
                    ctx.stroke();
                }
            }
        }
    }
}

function drawSmallPalms(baseY, px) {
    for (let i = 0; i < 4; i++) {
        const x = W * (0.1 + i * 0.25) + px + N.n1(i * 6 + 900) * 50;
        const y = baseY + N.n1(i * 4 + 910) * 4;
        const h = 20 + N.n1(i * 3 + 920) * 15;
        const sway = Math.sin(t * 0.18 + i * 1.2) * 2;

        // Thin trunk
        ctx.beginPath(); ctx.moveTo(x, y);
        ctx.quadraticCurveTo(x + sway * 0.3, y - h * 0.5, x + sway, y - h);
        ctx.strokeStyle = rgba(35, 28, 18, 0.3);
        ctx.lineWidth = 2;
        ctx.stroke();

        // Palm fronds (long, arching)
        for (let f = 0; f < 5; f++) {
            const angle = (f / 5) * Math.PI * 1.2 - Math.PI * 0.6;
            const fLen = 18 + N.n1(f + i * 10 + 930) * 8;

            ctx.beginPath();
            const sx = x + sway, sy = y - h;
            const ex = sx + Math.cos(angle) * fLen;
            const ey = sy + Math.sin(angle) * fLen * 0.8 + fLen * 0.3;
            ctx.moveTo(sx, sy);
            ctx.quadraticCurveTo(sx + Math.cos(angle) * fLen * 0.5, sy + Math.sin(angle) * fLen * 0.3, ex, ey);
            ctx.strokeStyle = rgba(15, 42, 12, 0.3);
            ctx.lineWidth = 1;
            ctx.stroke();
        }
    }
}

function drawGroundFerns(baseY, px) {
    for (let i = 0; i < 18; i++) {
        const x = (i / 18) * W * 1.3 - W * 0.15 + px;
        const y = baseY + N.n1(i * 0.6 + 950) * 6;
        const h = 12 + N.n1(i * 0.8 + 960) * 12;
        const sway = Math.sin(t * 0.28 + i * 0.6) * 2;

        ctx.beginPath(); ctx.moveTo(x, y);
        ctx.quadraticCurveTo(x + sway, y - h * 0.5, x + sway * 1.5, y - h);
        ctx.strokeStyle = rgba(20, 45, 16, 0.4);
        ctx.lineWidth = 0.8;
        ctx.stroke();

        for (let j = 2; j < 7; j++) {
            const ft = j / 7;
            const fx = lerp(x, x + sway * 1.5, ft);
            const fy = lerp(y, y - h, ft);
            const lLen = (1 - ft) * 7 + 2;
            for (const s of [-1, 1]) {
                ctx.beginPath(); ctx.moveTo(fx, fy);
                ctx.quadraticCurveTo(fx + s * lLen * 0.5, fy - 1, fx + s * lLen, fy + 1.5);
                ctx.strokeStyle = rgba(22, 48, 18, 0.25);
                ctx.lineWidth = 0.6;
                ctx.stroke();
            }
        }
    }
}

function drawMossyRocks(baseY, px) {
    for (let i = 0; i < 5; i++) {
        const x = (N.n1(i * 7 + 1000) * 0.5 + 0.5) * W + px;
        const y = baseY + 2 + N.n1(i * 5 + 1010) * 8;
        const w = 8 + N.n1(i * 3 + 1020) * 10;
        const h = 5 + N.n1(i * 4 + 1030) * 6;

        // Rock shape
        ctx.beginPath();
        ctx.ellipse(x, y, w, h, N.n1(i * 6 + 1040) * 0.3, 0, Math.PI * 2);
        ctx.fillStyle = rgba(30, 28, 24, 0.25);
        ctx.fill();

        // Moss on top
        ctx.beginPath();
        ctx.ellipse(x, y - h * 0.3, w * 0.85, h * 0.4, 0, Math.PI, 0);
        ctx.fillStyle = rgba(25, 50, 20, 0.2);
        ctx.fill();
    }
}

// ===== RAINFOREST TREES (foreground) =====
function drawRainforestTree(baseXFrac, trunkW, parallax) {
    const px = (smx - 0.5) * parallax;
    const py = (smy - 0.5) * parallax * 0.12;
    const x = baseXFrac * W + px;
    const leanSeed = baseXFrac * 10;
    const lean = N.n1(leanSeed) * 12;

    // === BUTTRESS ROOTS ===
    const rootY = H * 0.82;
    for (let r = 0; r < 4; r++) {
        const side = r < 2 ? -1 : 1;
        const rIdx = r % 2;
        const rootSpread = trunkW * (2 + rIdx * 1.5);
        const rootH = trunkW * (0.8 + rIdx * 0.4);

        ctx.beginPath();
        ctx.moveTo(x + side * trunkW * 0.3, rootY - rootH);
        ctx.quadraticCurveTo(
            x + side * rootSpread * 0.5, rootY - rootH * 0.3,
            x + side * rootSpread, rootY + 5
        );
        ctx.lineTo(x + side * rootSpread * 0.7, rootY + 5);
        ctx.quadraticCurveTo(
            x + side * rootSpread * 0.35, rootY - rootH * 0.15,
            x + side * trunkW * 0.2, rootY - rootH * 0.6
        );
        ctx.closePath();
        ctx.fillStyle = rgba(12, 8, 4, 0.7);
        ctx.fill();
    }

    // === TRUNK ===
    ctx.beginPath();
    const topY = py - 10;
    for (let y = H + 10; y >= topY; y -= 3) {
        const frac = (H - y) / H;
        const taper = 1 - frac * 0.3;
        const wobble = N.n1(y * 0.004 + leanSeed) * 3;
        const leanX = lean * frac;
        const bx = x + leanX - trunkW * taper + wobble;
        y === H + 10 ? ctx.moveTo(bx, y) : ctx.lineTo(bx, y);
    }
    for (let y = topY; y <= H + 10; y += 3) {
        const frac = (H - y) / H;
        const taper = 1 - frac * 0.3;
        const wobble = N.n1(y * 0.004 + leanSeed) * 3;
        const leanX = lean * frac;
        ctx.lineTo(x + leanX + trunkW * taper - wobble, y);
    }
    ctx.closePath();

    const barkGrad = ctx.createLinearGradient(x - trunkW * 1.5, 0, x + trunkW * 1.5, 0);
    barkGrad.addColorStop(0, rgba(5, 3, 1, 1));
    barkGrad.addColorStop(0.15, rgba(15, 10, 5, 1));
    barkGrad.addColorStop(0.4, rgba(25, 18, 8, 1));
    barkGrad.addColorStop(0.6, rgba(22, 15, 7, 1));
    barkGrad.addColorStop(0.85, rgba(12, 8, 4, 1));
    barkGrad.addColorStop(1, rgba(5, 3, 1, 1));
    ctx.fillStyle = barkGrad;
    ctx.fill();

    // Bark grooves
    for (let i = 0; i < 10; i++) {
        const bx = x + (i - 5) * trunkW * 0.16 + lean * 0.3;
        ctx.beginPath();
        for (let y = H; y > 0; y -= 6) {
            const frac = (H - y) / H;
            const lX = lean * frac;
            const w = N.fbm(y * 0.003 + i * 2.1 + leanSeed, 3) * 4;
            y === H ? ctx.moveTo(bx + lX + w, y) : ctx.lineTo(bx + lX + w, y);
        }
        ctx.strokeStyle = rgba(3, 2, 1, 0.2 + N.n1(i + leanSeed) * 0.08);
        ctx.lineWidth = 0.6 + N.n1(i * 0.5) * 0.4;
        ctx.stroke();
    }

    // === EPIPHYTES (ferns, orchids, moss growing ON the trunk) ===
    for (let i = 0; i < 8; i++) {
        const my = H * (0.1 + i * 0.09);
        const frac = (H - my) / H;
        const lX = lean * frac;
        const side = N.n1(i * 4 + leanSeed + 100) > 0 ? 1 : -1;
        const mossX = x + lX + side * trunkW * (0.25 + N.n1(i * 2 + 110) * 0.2);

        // Epiphytic fern
        if (i % 3 === 0) {
            const fernH = 8 + N.n1(i * 3 + 120) * 5;
            for (let f = 0; f < 4; f++) {
                const angle = (f / 4) * Math.PI * 0.8 - Math.PI * 0.4;
                const fSway = Math.sin(t * 0.3 + i + f) * 1;
                ctx.beginPath();
                ctx.moveTo(mossX, my + py);
                ctx.quadraticCurveTo(
                    mossX + side * Math.cos(angle) * fernH * 0.5 + fSway,
                    my + py + Math.sin(angle) * fernH * 0.5,
                    mossX + side * Math.cos(angle) * fernH + fSway,
                    my + py + Math.sin(angle) * fernH + fernH * 0.2
                );
                ctx.strokeStyle = rgba(18, 45, 15, 0.25);
                ctx.lineWidth = 0.8;
                ctx.stroke();
            }
        }

        // Moss patch
        for (let j = 0; j < 3; j++) {
            const jx = mossX + N.n1(i * 3 + j * 5 + 130) * trunkW * 0.15;
            const jy = my + py + N.n1(i * 3 + j * 7 + 140) * 5;
            ctx.beginPath(); ctx.arc(jx, jy, trunkW * (0.08 + N.n1(i * 3 + j * 9 + 150) * 0.06), 0, Math.PI * 2);
            ctx.fillStyle = rgba(30 + j * 4, 58 + j * 6, 22, 0.12 + j * 0.02);
            ctx.fill();
        }
    }

    // === HANGING VINES / LIANAS ===
    const vineCount = 2 + Math.floor(N.n1(leanSeed + 200) * 2);
    for (let v = 0; v < vineCount; v++) {
        const branchY = H * (0.15 + v * 0.12 + N.n1(v * 3 + leanSeed + 210) * 0.08);
        const frac = (H - branchY) / H;
        const lX = lean * frac;
        const dir = baseXFrac < 0.5 ? 1 : -1;
        const vineStartX = x + lX + trunkW * 0.4 * dir + px;
        const vineStartY = branchY + py;

        // Branch the vine hangs from
        const branchLen = trunkW * (3 + N.n1(v * 5 + leanSeed + 220) * 3);
        const branchEndX = vineStartX + dir * branchLen;
        const branchEndY = vineStartY - 15 + N.n1(v * 4 + 230) * 20;
        ctx.beginPath();
        ctx.moveTo(vineStartX, vineStartY);
        ctx.quadraticCurveTo(vineStartX + dir * branchLen * 0.5, vineStartY - 25, branchEndX, branchEndY);
        ctx.strokeStyle = rgba(15, 11, 5, 0.8);
        ctx.lineWidth = trunkW * 0.18;
        ctx.lineCap = 'round';
        ctx.stroke();

        // Vine hanging down from branch
        const vineX = lerp(vineStartX, branchEndX, 0.5 + N.n1(v * 7 + 240) * 0.3);
        const vineY = lerp(vineStartY, branchEndY, 0.5) - 10;
        const vineLen = 40 + N.n1(v * 6 + 250) * 60;
        const vineSway = Math.sin(t * 0.2 + v * 1.5) * 5;

        ctx.beginPath();
        ctx.moveTo(vineX, vineY);
        ctx.bezierCurveTo(
            vineX + vineSway * 0.5, vineY + vineLen * 0.3,
            vineX + vineSway, vineY + vineLen * 0.6,
            vineX + vineSway * 0.8, vineY + vineLen
        );
        ctx.strokeStyle = rgba(20, 35, 12, 0.35);
        ctx.lineWidth = 1.2;
        ctx.stroke();

        // Leaves on vine
        for (let l = 0; l < 5; l++) {
            const lt = (l + 1) / 6;
            const lx = vineX + vineSway * lt + N.n1(l * 3 + v * 10 + 260) * 3;
            const ly = vineY + vineLen * lt;
            ctx.beginPath();
            ctx.ellipse(lx, ly, 3, 1.8, N.n1(l + v + 270) * Math.PI, 0, Math.PI * 2);
            ctx.fillStyle = rgba(16, 40, 12, 0.25);
            ctx.fill();
        }
    }
}

// ===== CANOPY =====
function drawCanopy() {
    const px = (smx - 0.5) * 32;
    const py = (smy - 0.5) * 16;

    ctx.fillStyle = rgba(3, 7, 2, 1);
    ctx.fillRect(0, 0, W, H * 0.055);

    const topG = ctx.createLinearGradient(0, 0, 0, H * 0.15);
    topG.addColorStop(0, rgba(3, 7, 2, 1));
    topG.addColorStop(1, 'transparent');
    ctx.fillStyle = topG;
    ctx.fillRect(0, 0, W, H * 0.15);

    // Dense leaf clusters
    const clusters = [
        { x: -0.05, y: 0.04, r: 0.30, ry: 0.17, d: 0.97 },
        { x: 0.08, y: 0.06, r: 0.24, ry: 0.14, d: 0.94 },
        { x: 0.20, y: 0.05, r: 0.17, ry: 0.10, d: 0.90 },
        { x: 0.28, y: 0.10, r: 0.13, ry: 0.07, d: 0.82 },
        { x: 1.05, y: 0.04, r: 0.30, ry: 0.17, d: 0.97 },
        { x: 0.92, y: 0.06, r: 0.24, ry: 0.14, d: 0.94 },
        { x: 0.80, y: 0.05, r: 0.17, ry: 0.10, d: 0.90 },
        { x: 0.72, y: 0.10, r: 0.13, ry: 0.07, d: 0.82 },
        // Sparse over opening
        { x: 0.40, y: 0.05, r: 0.06, ry: 0.035, d: 0.40 },
        { x: 0.54, y: 0.04, r: 0.05, ry: 0.028, d: 0.32 },
        { x: 0.62, y: 0.07, r: 0.055, ry: 0.030, d: 0.36 },
        { x: 0.48, y: 0.09, r: 0.04, ry: 0.022, d: 0.28 },
    ];

    for (const c of clusters) {
        const cx = c.x * W + px, cy = c.y * H + py;
        const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, c.r * W);
        g.addColorStop(0, rgba(5, 12, 4, c.d));
        g.addColorStop(0.4, rgba(7, 15, 5, c.d * 0.75));
        g.addColorStop(0.7, rgba(8, 18, 6, c.d * 0.35));
        g.addColorStop(1, 'transparent');
        ctx.fillStyle = g;
        ctx.beginPath(); ctx.ellipse(cx, cy, c.r * W, c.ry * H, 0, 0, Math.PI * 2); ctx.fill();

        if (c.r > 0.06) {
            for (let i = 0; i < 4; i++) {
                const ang = N.n1(c.x * 10 + i * 3.3) * Math.PI * 2;
                const dist = c.r * W * (0.4 + N.n1(c.x * 10 + i * 7) * 0.4);
                ctx.beginPath();
                ctx.arc(cx + Math.cos(ang) * dist, cy + Math.sin(ang) * dist * (c.ry / c.r), c.r * W * 0.18, 0, Math.PI * 2);
                ctx.fillStyle = rgba(6, 13, 4, c.d * 0.55);
                ctx.fill();
            }
        }
    }

    // Hanging leaves — diverse shapes (some long, some round, some pointed)
    for (let i = 0; i < 30; i++) {
        const lx = W * (0.20 + (i / 30) * 0.60) + px + N.n1(i * 1.2 + 1200) * 40;
        const ly = H * (0.05 + N.n1(i * 0.7 + 1250) * 0.09) + py;
        const sway = Math.sin(t * 0.28 + i * 0.5) * 4;
        const leafType = i % 3;

        if (leafType === 0) {
            // Long dripping leaf
            const len = 10 + N.n1(i * 1.4 + 1260) * 12;
            ctx.beginPath(); ctx.moveTo(lx + sway, ly);
            ctx.bezierCurveTo(lx + sway + 3, ly + len * 0.3, lx + sway + 2, ly + len * 0.7, lx + sway, ly + len);
            ctx.bezierCurveTo(lx + sway - 2, ly + len * 0.7, lx + sway - 3, ly + len * 0.3, lx + sway, ly);
            ctx.fillStyle = rgba(10, 28, 8, 0.22 + N.n1(i * 0.3 + 1270) * 0.1);
            ctx.fill();

            // Water drip at tip (occasionally)
            if (Math.sin(t * 0.5 + i * 2) > 0.8) {
                ctx.beginPath(); ctx.arc(lx + sway, ly + len + 2, 1, 0, Math.PI * 2);
                ctx.fillStyle = rgba(150, 180, 200, 0.15);
                ctx.fill();
            }
        } else if (leafType === 1) {
            // Broad oval leaf
            const sz = 5 + N.n1(i * 1.6 + 1280) * 4;
            ctx.beginPath();
            ctx.ellipse(lx + sway, ly + sz * 0.5, sz * 0.4, sz, N.n1(i * 2 + 1290) * 0.4, 0, Math.PI * 2);
            ctx.fillStyle = rgba(12, 32, 10, 0.18 + N.n1(i * 0.5 + 1300) * 0.08);
            ctx.fill();
        } else {
            // Compound leaf (small cluster)
            for (let j = 0; j < 3; j++) {
                const jx = lx + sway + N.n1(j * 4 + i * 3 + 1310) * 5;
                const jy = ly + j * 4;
                ctx.beginPath();
                ctx.ellipse(jx, jy, 3, 1.5, N.n1(j + i + 1320) * 0.5, 0, Math.PI * 2);
                ctx.fillStyle = rgba(14, 35, 11, 0.18);
                ctx.fill();
            }
        }
    }
}

// ===== LIGHT RAYS =====
function drawLightRays() {
    ctx.globalCompositeOperation = 'screen';
    const rays = [
        { x: 0.36, a: 3, w: 40, ph: 0 }, { x: 0.47, a: -1.5, w: 28, ph: 2 },
        { x: 0.55, a: 5, w: 22, ph: 4 }, { x: 0.42, a: 1, w: 15, ph: 1.5 },
    ];
    for (const r of rays) {
        const int = clamp(0.5 + Math.sin(t * 0.22 + r.ph) * 0.5) * 0.04;
        if (int < 0.003) continue;
        ctx.save(); ctx.translate(r.x * W, 0); ctx.rotate(r.a * Math.PI / 180);
        const g = ctx.createLinearGradient(0, 0, 0, H * 0.8);
        g.addColorStop(0, rgba(255, 240, 180, int));
        g.addColorStop(0.3, rgba(255, 235, 170, int * 0.4));
        g.addColorStop(0.7, rgba(255, 230, 160, int * 0.08));
        g.addColorStop(1, 'transparent');
        ctx.fillStyle = g; ctx.fillRect(-r.w / 2, 0, r.w, H * 0.8);
        ctx.restore();
    }
    ctx.globalCompositeOperation = 'source-over';
}

// ===== PARTICLES & FIREFLIES =====
const dust = Array.from({ length: 45 }, (_, i) => ({
    x: N.n1(i * 1.6 + 1400) * 0.5 + 0.5, y: N.n1(i * 2 + 1450) * 0.6 + 0.2,
    sz: 0.4 + N.n1(i * 3 + 1500) * 1.2, sp: 0.04 + N.n1(i * 1.2 + 1550) * 0.2,
    ph: N.n1(i * 4 + 1600) * Math.PI * 2, br: 0.06 + N.n1(i * 2.5 + 1650) * 0.12,
}));
const flies = Array.from({ length: 8 }, (_, i) => ({
    x: 0.25 + N.n1(i * 3 + 1700) * 0.5, y: 0.3 + N.n1(i * 3.5 + 1750) * 0.35,
    ph: N.n1(i * 4 + 1800) * Math.PI * 2, sp: 0.12 + N.n1(i * 2 + 1850) * 0.25,
    sz: 1.5 + N.n1(i * 5 + 1900) * 1.5,
}));

function drawParticles() {
    for (const p of dust) {
        const x = p.x * W + Math.sin(t * p.sp * 0.6 + p.ph) * 30;
        const y = ((p.y * H + t * p.sp * 4) % (H * 0.65)) + H * 0.12;
        const v = p.br * (0.5 + Math.sin(t * 0.8 + p.ph) * 0.5);
        if (v > 0.015) { ctx.beginPath(); ctx.arc(x, y, p.sz, 0, Math.PI * 2); ctx.fillStyle = rgba(205, 195, 165, v); ctx.fill(); }
    }
}
function drawFireflies() {
    for (const f of flies) {
        const x = f.x * W + Math.sin(t * f.sp + f.ph) * 35;
        const y = f.y * H + Math.cos(t * f.sp * 0.55 + f.ph + 1) * 22;
        const b = clamp(Math.sin(t * 0.9 + f.ph));
        if (b > 0.45) {
            const g = ctx.createRadialGradient(x, y, 0, x, y, f.sz * 7);
            g.addColorStop(0, rgba(210, 195, 75, b * 0.4));
            g.addColorStop(0.25, rgba(210, 195, 75, b * 0.08));
            g.addColorStop(1, 'transparent');
            ctx.fillStyle = g; ctx.beginPath(); ctx.arc(x, y, f.sz * 7, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(x, y, f.sz * 0.4, 0, Math.PI * 2);
            ctx.fillStyle = rgba(250, 240, 165, b * 0.85); ctx.fill();
        }
    }
}

// ===== VIGNETTE =====
function drawVignette() {
    const v = ctx.createRadialGradient(W / 2, H * 0.42, W * 0.18, W / 2, H * 0.42, W * 0.72);
    v.addColorStop(0, 'transparent'); v.addColorStop(0.5, 'transparent');
    v.addColorStop(0.8, rgba(2, 5, 1, 0.3)); v.addColorStop(1, rgba(2, 5, 1, 0.55));
    ctx.fillStyle = v; ctx.fillRect(0, 0, W, H);

    const b = ctx.createLinearGradient(0, H * 0.86, 0, H);
    b.addColorStop(0, 'transparent'); b.addColorStop(1, rgba(2, 5, 1, 0.35));
    ctx.fillStyle = b; ctx.fillRect(0, H * 0.86, W, H * 0.14);
}

// ===== MAIN RENDER =====
function render() {
    t += 0.016;
    smx = lerp(smx, mx, 0.022);
    smy = lerp(smy, my, 0.022);

    drawSky();
    drawSun();

    // ====== HILL 1 (farthest) — blue-grey, heavily hazed ======
    drawHill({
        centerX: W * 0.3, width: W * 0.5, peakHeight: H * 0.14, baseY: H * 0.52,
        noiseObj: N, seed: 1.2, colors: [[0, '#6a8a98'], [0.4, '#5a7a8a'], [1, '#4a6a78']],
        haze: 0.20, hazeColor: [150, 170, 195], parallax: 4,
        forest: true, forestConfig: {
            color: [50, 70, 55, 0.3], shadowColor: [40, 60, 48, 0.2],
            density: 6, scale: 0.5, layers: 1
        }
    });

    // Mist band BETWEEN hill 1 and hill 2 (flows IN FRONT of hill 1)
    drawMistBand(H * 0.46, 8, 0.07, 0.09, 2.0, 1.3, [165, 180, 195], 5);
    drawMistTendrils(H * 0.44, 3, 0.06, 0.025, 5);

    // ====== HILL 2 (middle) — green-grey, moderate haze ======
    drawHill({
        centerX: W * 0.65, width: W * 0.45, peakHeight: H * 0.12, baseY: H * 0.56,
        noiseObj: N2, seed: 3.4, colors: [[0, '#3a5a3a'], [0.3, '#345234'], [0.7, '#2a462a'], [1, '#22401e']],
        haze: 0.08, hazeColor: [130, 155, 165], parallax: 9,
        forest: true, forestConfig: {
            color: [22, 44, 20, 0.5], shadowColor: [16, 35, 14, 0.35],
            density: 4, scale: 0.65, layers: 2
        }
    });

    // Another peak for hill 2 (adjacent smaller peak)
    drawHill({
        centerX: W * 0.42, width: W * 0.35, peakHeight: H * 0.09, baseY: H * 0.55,
        noiseObj: N2, seed: 4.1, colors: [[0, '#365636'], [0.5, '#2e4a2e'], [1, '#244024']],
        haze: 0.06, hazeColor: [120, 145, 155], parallax: 10,
        forest: true, forestConfig: {
            color: [20, 40, 18, 0.45], shadowColor: [14, 32, 12, 0.3],
            density: 4, scale: 0.6, layers: 1
        }
    });

    // Mist band BETWEEN hill 2 and hill 3 — heavier, this is the valley mist
    drawMistBand(H * 0.54, 10, 0.12, 0.10, 1.7, 1.2, [180, 195, 200], 10);
    drawMistTendrils(H * 0.52, 5, 0.10, 0.035, 8);

    // ====== HILL 3 (nearest background hill) — dark green, dense forest ======
    drawHill({
        centerX: W * 0.5, width: W * 0.6, peakHeight: H * 0.10, baseY: H * 0.62,
        noiseObj: N3, seed: 5.8, colors: [[0, '#264826'], [0.4, '#1e3c1e'], [1, '#163216']],
        haze: 0.02, hazeColor: [100, 130, 120], parallax: 15,
        forest: true, forestConfig: {
            color: [16, 36, 14, 0.6], shadowColor: [10, 26, 8, 0.45],
            density: 3, scale: 0.85, layers: 2
        }
    });

    // ====== RIVER in valley between hill 3 and our hill ======
    drawRiver();

    // Mist rising from river / valley — the heaviest layer
    drawMistBand(H * 0.64, 12, 0.15, 0.11, 1.8, 1.4, [185, 198, 202], 14);
    drawMistBand(H * 0.58, 6, 0.05, 0.04, 1.1, 0.9, [175, 190, 190], 10);
    drawMistTendrils(H * 0.62, 6, 0.13, 0.04, 12);

    // ====== RAINFOREST FLOOR (our hill) ======
    drawRainforestFloor();

    // ====== FOREGROUND TREES — dense rainforest ======
    // Mid-distance trees (less detail)
    drawRainforestTree(0.30, 14, 16);
    drawRainforestTree(0.68, 12, 16);

    // Main foreground trees with full detail
    drawRainforestTree(0.06, 46, 34);
    drawRainforestTree(-0.04, 55, 40);
    drawRainforestTree(0.90, 42, 34);
    drawRainforestTree(1.04, 50, 40);

    // ====== CANOPY ======
    drawCanopy();

    // ====== LIGHT RAYS ======
    drawLightRays();

    // ====== ATMOSPHERE ======
    drawParticles();
    drawFireflies();
    drawVignette();

    requestAnimationFrame(render);
}

render();
</script>
