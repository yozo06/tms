<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WildArc — Coorg at Dawn</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background: #080c06; cursor: none; }
        canvas { display: block; }
        .brand {
            position: fixed; bottom: 10%; left: 50%; transform: translateX(-50%);
            text-align: center; z-index: 50; opacity: 0;
            animation: fadeIn 5s ease-out 3s forwards; pointer-events: none;
        }
        .brand h1 {
            font-family: Georgia, 'Times New Roman', serif;
            color: rgba(225, 210, 175, 0.75); font-size: 3.2rem;
            font-weight: 400; letter-spacing: 12px;
            text-shadow: 0 2px 25px rgba(0,0,0,0.7);
        }
        .brand p {
            color: rgba(195, 190, 170, 0.45); font-family: Georgia, serif;
            font-size: 0.8rem; letter-spacing: 6px; margin-top: 12px;
            text-transform: uppercase;
        }
        @keyframes fadeIn { to { opacity: 1; } }
    </style>
</head>
<body>
    <canvas id="c"></canvas>
    <div class="brand"><h1>wildarc</h1><p>Where nature leads, we follow</p></div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;
let mx = 0.5, my = 0.5, smx = 0.5, smy = 0.5;
let t = 0;

function resize() { W = canvas.width = innerWidth; H = canvas.height = innerHeight; }
addEventListener('resize', resize); resize();
addEventListener('mousemove', e => { mx = e.clientX / W; my = e.clientY / H; });

// ===== NOISE =====
// Simplex-like noise for natural terrain
class Noise {
    constructor(seed = 42) {
        this.p = new Uint8Array(512);
        const perm = new Uint8Array(256);
        for (let i = 0; i < 256; i++) perm[i] = i;
        // Fisher-Yates with seed
        let s = seed;
        for (let i = 255; i > 0; i--) {
            s = (s * 16807 + 0) % 2147483647;
            const j = s % (i + 1);
            [perm[i], perm[j]] = [perm[j], perm[i]];
        }
        for (let i = 0; i < 512; i++) this.p[i] = perm[i & 255];
    }
    fade(t) { return t * t * t * (t * (t * 6 - 15) + 10); }
    lerp(a, b, t) { return a + t * (b - a); }
    grad(hash, x) {
        return (hash & 1) === 0 ? x : -x;
    }
    noise1D(x) {
        const xi = Math.floor(x) & 255;
        const xf = x - Math.floor(x);
        const u = this.fade(xf);
        return this.lerp(
            this.grad(this.p[xi], xf),
            this.grad(this.p[xi + 1], xf - 1),
            u
        );
    }
    // Fractal brownian motion - multiple octaves for realism
    fbm(x, octaves = 6, lacunarity = 2.0, gain = 0.5) {
        let val = 0, amp = 1, freq = 1, max = 0;
        for (let i = 0; i < octaves; i++) {
            val += this.noise1D(x * freq) * amp;
            max += amp;
            amp *= gain;
            freq *= lacunarity;
        }
        return val / max;
    }
}

const noise = new Noise(137);
const noise2 = new Noise(283);
const noise3 = new Noise(419);

// ===== COLORS =====
function rgba(r, g, b, a = 1) { return `rgba(${r|0},${g|0},${b|0},${a})`; }
function lerp(a, b, t) { return a + (b - a) * t; }
function clamp(v, lo = 0, hi = 1) { return Math.max(lo, Math.min(hi, v)); }

// ===== SKY =====
function drawSky() {
    // Realistic Coorg dawn sky - based on actual Western Ghats sunrise colors
    // Deep blue zenith → pale blue → warm peach → fiery orange at horizon
    for (let y = 0; y < H * 0.78; y++) {
        const t = y / (H * 0.78);
        let r, g, b;
        if (t < 0.15) {
            // Deep blue-indigo zenith
            r = lerp(12, 25, t / 0.15);
            g = lerp(18, 35, t / 0.15);
            b = lerp(35, 60, t / 0.15);
        } else if (t < 0.35) {
            // Transition to steel blue
            const s = (t - 0.15) / 0.2;
            r = lerp(25, 55, s);
            g = lerp(35, 75, s);
            b = lerp(60, 110, s);
        } else if (t < 0.50) {
            // Pale blue-grey
            const s = (t - 0.35) / 0.15;
            r = lerp(55, 120, s);
            g = lerp(75, 140, s);
            b = lerp(110, 155, s);
        } else if (t < 0.62) {
            // Transition to warm — the magic band
            const s = (t - 0.50) / 0.12;
            r = lerp(120, 200, s);
            g = lerp(140, 170, s);
            b = lerp(155, 130, s);
        } else if (t < 0.75) {
            // Golden peach
            const s = (t - 0.62) / 0.13;
            r = lerp(200, 230, s);
            g = lerp(170, 150, s);
            b = lerp(130, 90, s);
        } else if (t < 0.88) {
            // Deep orange
            const s = (t - 0.75) / 0.13;
            r = lerp(230, 210, s);
            g = lerp(150, 100, s);
            b = lerp(90, 50, s);
        } else {
            // Dark burnt orange at horizon
            const s = (t - 0.88) / 0.12;
            r = lerp(210, 140, s);
            g = lerp(100, 55, s);
            b = lerp(50, 30, s);
        }

        // Add subtle color variation (not perfectly smooth)
        const nv = noise.noise1D(y * 0.008 + 100) * 4;
        r += nv; g += nv * 0.5; b -= nv * 0.3;

        ctx.fillStyle = rgba(r, g, b);
        ctx.fillRect(0, y, W, 1);
    }

    // Subtle high clouds (wispy cirrus)
    drawCirrusClouds();
}

function drawCirrusClouds() {
    ctx.globalAlpha = 0.04;
    for (let i = 0; i < 5; i++) {
        const cy = H * (0.15 + i * 0.06);
        const cx = W * (0.2 + i * 0.15);
        const w = W * (0.15 + noise.noise1D(i * 3) * 0.1);
        const h = 8 + noise.noise1D(i * 5 + 10) * 5;

        ctx.beginPath();
        for (let x = -w; x < w; x += 3) {
            const ht = 1 - (x / w) * (x / w);
            const y = cy + noise.fbm(x * 0.02 + i * 7, 3) * h * ht;
            x === -w ? ctx.moveTo(cx + x, y) : ctx.lineTo(cx + x, y);
        }
        ctx.strokeStyle = 'rgba(200,195,185,1)';
        ctx.lineWidth = h * 0.8;
        ctx.lineCap = 'round';
        ctx.stroke();
    }
    ctx.globalAlpha = 1;
}

// ===== SUN =====
function drawSun() {
    const sx = W * (0.38 + (smx - 0.5) * 0.015);
    const sy = H * (0.56 + (smy - 0.5) * 0.008);
    const pulse = 1 + Math.sin(t * 0.4) * 0.015;

    // Huge ambient glow (fills the horizon area)
    for (let i = 4; i >= 0; i--) {
        const r = (100 + i * 80) * pulse;
        const g = ctx.createRadialGradient(sx, sy, 0, sx, sy, r);
        const alpha = 0.04 - i * 0.006;
        g.addColorStop(0, rgba(255, 245, 210, alpha));
        g.addColorStop(0.5, rgba(255, 220, 150, alpha * 0.3));
        g.addColorStop(1, 'transparent');
        ctx.fillStyle = g;
        ctx.beginPath();
        ctx.arc(sx, sy, r, 0, Math.PI * 2);
        ctx.fill();
    }

    // Sun disc - not perfectly sharp (atmospheric diffusion)
    const disc = ctx.createRadialGradient(sx, sy, 0, sx, sy, 30 * pulse);
    disc.addColorStop(0, 'rgba(255,252,240,0.85)');
    disc.addColorStop(0.3, 'rgba(255,240,190,0.6)');
    disc.addColorStop(0.6, 'rgba(250,210,120,0.25)');
    disc.addColorStop(1, 'transparent');
    ctx.fillStyle = disc;
    ctx.beginPath();
    ctx.arc(sx, sy, 30 * pulse, 0, Math.PI * 2);
    ctx.fill();
}

// ===== TERRAIN =====
function drawMountainRange(config) {
    const { yBase, amplitude, noiseObj, seed, octaves, color, hazeColor, hazeAmount,
            parallax, hasForest, forestColor, forestDensity, forestScale } = config;

    const ox = (smx - 0.5) * parallax;
    const oy = (smy - 0.5) * parallax * 0.25;

    // Generate ridge profile with FBM noise
    ctx.beginPath();
    ctx.moveTo(-10, H);

    const points = [];
    for (let x = -10; x <= W + 10; x += 2) {
        const nx = (x + ox) / W;
        const h = noiseObj.fbm(nx * 3 + seed, octaves) * amplitude;
        const y = yBase + h + oy;
        points.push({ x, y });
        x === -10 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.lineTo(W + 10, H);
    ctx.lineTo(-10, H);
    ctx.closePath();

    // Mountain body - gradient from ridge to base
    const minY = Math.min(...points.map(p => p.y));
    const grad = ctx.createLinearGradient(0, minY, 0, yBase + amplitude + 30);
    if (typeof color === 'string') {
        ctx.fillStyle = color;
    } else {
        color.forEach(([stop, col]) => grad.addColorStop(stop, col));
        ctx.fillStyle = grad;
    }
    ctx.fill();

    // Atmospheric haze overlay
    if (hazeAmount > 0) {
        ctx.fillStyle = rgba(
            hazeColor[0], hazeColor[1], hazeColor[2], hazeAmount
        );
        ctx.fill();
    }

    // Forest canopy on the hills — round clustered tree tops, not triangles
    if (hasForest) {
        drawForestCanopy(points, ox, oy, forestColor, forestDensity, forestScale);
    }
}

function drawForestCanopy(ridgePoints, ox, oy, color, density, scale) {
    // Sample points along the ridge and place organic tree clusters
    const step = Math.max(2, Math.floor(density));

    for (let i = 0; i < ridgePoints.length; i += step) {
        const p = ridgePoints[i];
        if (!p) continue;

        // Vary tree sizes naturally
        const sz = (5 + noise.fbm(i * 0.1 + 50, 2) * 8) * scale;
        const spread = sz * (0.8 + noise.noise1D(i * 0.3) * 0.4);

        // Each "tree" is a cluster of overlapping circles (like real canopy viewed from distance)
        const clusterCount = 2 + Math.floor(Math.random() * 3);
        for (let c = 0; c < clusterCount; c++) {
            const cx = p.x + (noise.noise1D(i * 0.7 + c * 3) * spread);
            const cy = p.y - sz * 0.3 - c * sz * 0.15 + noise.noise1D(i * 0.5 + c * 5) * sz * 0.2;
            const cr = sz * (0.4 + noise.noise1D(i * 0.9 + c * 7) * 0.3);

            ctx.beginPath();
            ctx.arc(cx, cy, cr, 0, Math.PI * 2);
            // Slight color variation per cluster
            const shade = noise.noise1D(i * 0.2 + c) * 8;
            ctx.fillStyle = rgba(
                color[0] + shade,
                color[1] + shade * 1.5,
                color[2] + shade,
                color[3] || 1
            );
            ctx.fill();
        }
    }
}

// ===== RIVER =====
function drawRiver() {
    const baseY = H * 0.66;
    const ox = (smx - 0.5) * 12;

    // River path - winding through the valley
    const riverWidth = 10;

    for (let pass = 0; pass < 3; pass++) {
        const widthMul = pass === 0 ? 1.5 : pass === 1 ? 1.0 : 0.5;
        const alpha = pass === 0 ? 0.08 : pass === 1 ? 0.12 : 0.06;

        ctx.beginPath();
        for (let x = -50; x <= W + 50; x += 3) {
            const nx = x / W;
            const curve = noise.fbm(nx * 2 + 20, 3) * 25;
            const wave = Math.sin(nx * 12 + t * 0.4 + pass) * 2;
            const y = baseY + curve + wave + pass * 2;
            x === -50 ? ctx.moveTo(x + ox, y) : ctx.lineTo(x + ox, y);
        }
        ctx.strokeStyle = rgba(140, 175, 200, alpha);
        ctx.lineWidth = riverWidth * widthMul;
        ctx.lineCap = 'round';
        ctx.stroke();
    }

    // Reflective highlights on water
    ctx.globalCompositeOperation = 'screen';
    for (let i = 0; i < 20; i++) {
        const x = ((i * 73 + t * 6) % (W + 100)) - 50 + ox;
        const nx = x / W;
        const curve = noise.fbm(nx * 2 + 20, 3) * 25;
        const y = baseY + curve + 1;
        const glint = Math.sin(t * 2.5 + i * 1.7) * 0.5 + 0.5;
        if (glint > 0.65) {
            ctx.beginPath();
            ctx.arc(x, y, 1 + glint, 0, Math.PI * 2);
            ctx.fillStyle = rgba(220, 235, 255, (glint - 0.65) * 0.5);
            ctx.fill();
        }
    }
    ctx.globalCompositeOperation = 'source-over';
}

// ===== MIST =====
function drawMistLayer(baseY, count, speed, maxAlpha, scaleX, scaleY, color) {
    const drift = t * speed;
    for (let i = 0; i < count; i++) {
        const seed = i * 3.7 + 0.5;
        // Mist wisps move and morph
        const x = ((noise.noise1D(seed) * W * 1.5 + drift * 25) % (W * 2)) - W * 0.5;
        const yOff = noise.fbm(drift * 0.05 + seed, 2) * 30;
        const y = baseY + yOff + noise.noise1D(seed + 100) * 25;

        // Each wisp is an elongated irregular shape
        const rx = (120 + noise.noise1D(seed + 200) * 80) * scaleX;
        const ry = (20 + noise.noise1D(seed + 300) * 12) * scaleY;
        const alpha = maxAlpha * (0.5 + noise.fbm(drift * 0.08 + seed, 2) * 0.5);

        // Multi-pass for softer edges
        for (let p = 2; p >= 0; p--) {
            const pr = 1 + p * 0.4;
            const g = ctx.createRadialGradient(x, y, 0, x, y, rx * pr);
            const a = alpha * (1 - p * 0.3);
            g.addColorStop(0, rgba(color[0], color[1], color[2], a));
            g.addColorStop(0.3, rgba(color[0], color[1], color[2], a * 0.6));
            g.addColorStop(0.6, rgba(color[0], color[1], color[2], a * 0.2));
            g.addColorStop(1, 'transparent');
            ctx.fillStyle = g;
            ctx.beginPath();
            ctx.ellipse(x, y, rx * pr, ry * pr, noise.noise1D(seed + 400) * 0.3, 0, Math.PI * 2);
            ctx.fill();
        }
    }
}

// Wispy mist tendrils (thin, organic mist strands)
function drawMistTendrils(baseY, count, speed, alpha) {
    const drift = t * speed;
    ctx.globalAlpha = alpha;
    for (let i = 0; i < count; i++) {
        const seed = i * 5.3 + 77;
        const startX = ((noise.noise1D(seed) * W * 2 + drift * 15) % (W * 1.5)) - W * 0.25;
        const y = baseY + noise.noise1D(seed + 50) * 30;

        ctx.beginPath();
        const len = 150 + noise.noise1D(seed + 80) * 100;
        for (let x = 0; x < len; x += 3) {
            const py = y + noise.fbm((startX + x) * 0.005 + seed + drift * 0.02, 3) * 15;
            x === 0 ? ctx.moveTo(startX + x, py) : ctx.lineTo(startX + x, py);
        }
        ctx.strokeStyle = rgba(195, 205, 210, 0.8);
        ctx.lineWidth = 3 + noise.noise1D(seed + 90) * 4;
        ctx.lineCap = 'round';
        ctx.filter = 'blur(3px)';
        ctx.stroke();
        ctx.filter = 'none';
    }
    ctx.globalAlpha = 1;
}

// ===== FOREST FLOOR =====
function drawForestFloor() {
    const baseY = H * 0.78;
    const px = (smx - 0.5) * 28;

    // Rich dark earth gradient
    const g = ctx.createLinearGradient(0, baseY - 20, 0, H);
    g.addColorStop(0, 'rgba(16,32,14,0)');
    g.addColorStop(0.03, rgba(20, 38, 16, 1));
    g.addColorStop(0.15, rgba(14, 28, 10, 1));
    g.addColorStop(0.5, rgba(8, 16, 6, 1));
    g.addColorStop(1, rgba(4, 8, 3, 1));
    ctx.fillStyle = g;
    ctx.fillRect(0, baseY - 20, W, H - baseY + 20);

    // Fallen leaves, small rocks, ground texture
    for (let i = 0; i < 60; i++) {
        const x = (noise.noise1D(i * 1.3 + 200) * 0.5 + 0.5) * W * 1.2 - W * 0.1 + px;
        const y = baseY + 5 + noise.noise1D(i * 1.7 + 300) * (H - baseY - 10) * 0.4;
        const size = 2 + noise.noise1D(i * 2.1 + 400) * 3;
        const shade = noise.noise1D(i * 0.9 + 500);

        ctx.beginPath();
        ctx.ellipse(x, y, size, size * 0.5, noise.noise1D(i * 3) * Math.PI, 0, Math.PI * 2);
        ctx.fillStyle = shade > 0 ?
            rgba(30 + shade * 15, 22 + shade * 8, 12, 0.15) :
            rgba(18, 30, 14, 0.12);
        ctx.fill();
    }

    // Ferns — more realistic with curved fronds
    drawFerns(baseY, px);
}

function drawFerns(baseY, px) {
    for (let i = 0; i < 20; i++) {
        const x = (i / 20) * W * 1.3 - W * 0.15 + px;
        const y = baseY + noise.noise1D(i * 0.6 + 600) * 8;
        const height = 20 + noise.noise1D(i * 0.8 + 700) * 25;
        const sway = Math.sin(t * 0.3 + i * 0.7) * 3;
        const lean = noise.noise1D(i * 1.2 + 800) * 8;

        // Main stem — curved
        const stemPoints = [];
        for (let j = 0; j <= 10; j++) {
            const frac = j / 10;
            const sx = x + lean * frac + sway * frac * frac;
            const sy = y - height * frac;
            stemPoints.push({ x: sx, y: sy });
        }

        // Draw stem
        ctx.beginPath();
        ctx.moveTo(stemPoints[0].x, stemPoints[0].y);
        for (let j = 1; j < stemPoints.length; j++) {
            ctx.lineTo(stemPoints[j].x, stemPoints[j].y);
        }
        ctx.strokeStyle = rgba(22, 48, 18, 0.5);
        ctx.lineWidth = 1;
        ctx.stroke();

        // Fronds (pairs of small leaves along stem)
        for (let j = 2; j < stemPoints.length - 1; j++) {
            const p = stemPoints[j];
            const frac = j / stemPoints.length;
            const leafLen = (1 - frac) * 10 + 3;
            const leafAngle = Math.sin(t * 0.25 + i + j * 0.3) * 0.15;

            for (const side of [-1, 1]) {
                ctx.beginPath();
                ctx.moveTo(p.x, p.y);
                const tipX = p.x + side * leafLen * Math.cos(leafAngle);
                const tipY = p.y + leafLen * 0.3 * Math.sin(leafAngle) + 2;
                const cpX = p.x + side * leafLen * 0.6;
                const cpY = p.y - 1;
                ctx.quadraticCurveTo(cpX, cpY, tipX, tipY);
                ctx.quadraticCurveTo(cpX, p.y + 2, p.x, p.y);
                ctx.fillStyle = rgba(20 + frac * 10, 45 + frac * 15, 16, 0.3 + frac * 0.1);
                ctx.fill();
            }
        }
    }
}

// ===== FOREGROUND TREES =====
function drawTree(baseXFrac, trunkW, parallax, detailed) {
    const px = (smx - 0.5) * parallax;
    const py = (smy - 0.5) * parallax * 0.15;
    const x = baseXFrac * W + px;

    // Trunk — organic curve, not straight
    const leanSeed = baseXFrac * 10;
    const leanAmount = noise.noise1D(leanSeed) * 15;

    ctx.beginPath();
    const topY = py - 10;
    const botY = H + 10;

    // Left edge of trunk
    const leftPoints = [];
    const rightPoints = [];
    for (let y = botY; y >= topY; y -= 4) {
        const frac = (botY - y) / (botY - topY);
        // Trunk narrows going up, with slight irregularity
        const taper = 1 - frac * 0.35;
        const wobble = noise.noise1D(y * 0.005 + leanSeed) * 3;
        const lean = leanAmount * frac;
        leftPoints.push({ x: x + lean - trunkW * taper + wobble, y });
        rightPoints.push({ x: x + lean + trunkW * taper - wobble, y });
    }

    ctx.beginPath();
    ctx.moveTo(leftPoints[0].x, leftPoints[0].y);
    for (const p of leftPoints) ctx.lineTo(p.x, p.y);
    for (let i = rightPoints.length - 1; i >= 0; i--) ctx.lineTo(rightPoints[i].x, rightPoints[i].y);
    ctx.closePath();

    // Bark gradient - very dark, slight warm undertone
    const barkGrad = ctx.createLinearGradient(x - trunkW * 1.5, 0, x + trunkW * 1.5, 0);
    barkGrad.addColorStop(0, rgba(6, 4, 2, 1));
    barkGrad.addColorStop(0.2, rgba(18, 12, 6, 1));
    barkGrad.addColorStop(0.45, rgba(28, 20, 10, 1));
    barkGrad.addColorStop(0.55, rgba(24, 17, 8, 1));
    barkGrad.addColorStop(0.8, rgba(14, 10, 5, 1));
    barkGrad.addColorStop(1, rgba(6, 4, 2, 1));
    ctx.fillStyle = barkGrad;
    ctx.fill();

    if (detailed) {
        // Bark texture — deep vertical grooves
        for (let i = 0; i < 10; i++) {
            const bx = x + (i - 5) * trunkW * 0.18 + leanAmount * 0.3;
            ctx.beginPath();
            for (let y = H; y > 0; y -= 8) {
                const frac = (H - y) / H;
                const lean = leanAmount * frac;
                const wobble = noise.fbm(y * 0.003 + i * 2.3 + leanSeed, 3) * 5;
                y === H ? ctx.moveTo(bx + lean + wobble, y) : ctx.lineTo(bx + lean + wobble, y);
            }
            ctx.strokeStyle = rgba(4, 3, 1, 0.25 + noise.noise1D(i * 1.1) * 0.1);
            ctx.lineWidth = 0.8 + noise.noise1D(i * 0.7) * 0.5;
            ctx.stroke();
        }

        // Moss patches — organic, irregular
        for (let i = 0; i < 6; i++) {
            const my = H * (0.15 + i * 0.13);
            const side = noise.noise1D(i * 4 + leanSeed) > 0 ? 1 : -1;
            const frac = (H - my) / H;
            const lean = leanAmount * frac;
            const mossX = x + lean + side * trunkW * (0.3 + noise.noise1D(i * 2) * 0.2);

            // Organic moss blob (multiple overlapping circles)
            for (let j = 0; j < 4; j++) {
                const jx = mossX + noise.noise1D(i * 3 + j * 5) * trunkW * 0.2;
                const jy = my + py + noise.noise1D(i * 3 + j * 7 + 1) * 6;
                const jr = trunkW * (0.1 + noise.noise1D(i * 3 + j * 9 + 2) * 0.08);
                ctx.beginPath();
                ctx.arc(jx, jy, jr, 0, Math.PI * 2);
                ctx.fillStyle = rgba(35 + j * 3, 65 + j * 5, 25, 0.12 + j * 0.02);
                ctx.fill();
            }
        }

        // Branch
        const branchY = H * (0.18 + Math.abs(noise.noise1D(leanSeed + 50)) * 0.15);
        const dir = baseXFrac < 0.5 ? 1 : -1;
        const bFrac = (H - branchY) / H;
        const bLean = leanAmount * bFrac;

        ctx.beginPath();
        const bStartX = x + bLean + trunkW * 0.3 * dir + px;
        const bStartY = branchY + py;
        ctx.moveTo(bStartX, bStartY);

        // Branch curves organically
        const bLen = trunkW * 6;
        const bEndX = bStartX + dir * bLen;
        const bEndY = bStartY - 20 + noise.noise1D(leanSeed + 60) * 30;
        const bCpX = bStartX + dir * bLen * 0.6;
        const bCpY = bStartY - 35;

        ctx.quadraticCurveTo(bCpX, bCpY, bEndX, bEndY);
        ctx.strokeStyle = rgba(18, 13, 6, 0.9);
        ctx.lineWidth = trunkW * 0.22;
        ctx.lineCap = 'round';
        ctx.stroke();

        // Smaller sub-branches
        for (let b = 0; b < 3; b++) {
            const bt = 0.4 + b * 0.2;
            const bpx = lerp(bStartX, bEndX, bt);
            const bpy = lerp(bStartY, bEndY, bt) + (bStartY - bCpY) * 2 * bt * (1 - bt) * -1;
            const subDir = b % 2 === 0 ? 1 : -1;
            const subLen = trunkW * 2;

            ctx.beginPath();
            ctx.moveTo(bpx, bpy);
            ctx.quadraticCurveTo(
                bpx + dir * subLen * 0.3, bpy + subDir * subLen * 0.5 - 10,
                bpx + dir * subLen * 0.5, bpy + subDir * subLen * 0.3 - 5
            );
            ctx.strokeStyle = rgba(15, 11, 5, 0.7);
            ctx.lineWidth = trunkW * 0.08;
            ctx.stroke();
        }
    }
}

// ===== CANOPY =====
function drawCanopy() {
    const px = (smx - 0.5) * 32;
    const py = (smy - 0.5) * 16;

    // Dark strip at top
    const topGrad = ctx.createLinearGradient(0, 0, 0, H * 0.08);
    topGrad.addColorStop(0, rgba(4, 8, 3, 1));
    topGrad.addColorStop(1, rgba(4, 8, 3, 0));
    ctx.fillStyle = topGrad;
    ctx.fillRect(0, 0, W, H * 0.08);

    // Leaf mass clusters — organic shapes
    const clusters = [
        // Heavy left
        { x: -0.05, y: 0.04, r: 0.28, ry: 0.16, d: 0.97 },
        { x: 0.08, y: 0.06, r: 0.22, ry: 0.14, d: 0.93 },
        { x: 0.18, y: 0.05, r: 0.16, ry: 0.10, d: 0.88 },
        { x: 0.26, y: 0.09, r: 0.12, ry: 0.07, d: 0.80 },
        // Heavy right
        { x: 1.05, y: 0.04, r: 0.28, ry: 0.16, d: 0.97 },
        { x: 0.92, y: 0.06, r: 0.22, ry: 0.14, d: 0.93 },
        { x: 0.82, y: 0.05, r: 0.16, ry: 0.10, d: 0.88 },
        { x: 0.74, y: 0.09, r: 0.12, ry: 0.07, d: 0.80 },
        // Sparse canopy over opening
        { x: 0.40, y: 0.05, r: 0.06, ry: 0.035, d: 0.45 },
        { x: 0.52, y: 0.04, r: 0.05, ry: 0.03, d: 0.35 },
        { x: 0.60, y: 0.07, r: 0.055, ry: 0.032, d: 0.40 },
        { x: 0.47, y: 0.09, r: 0.04, ry: 0.025, d: 0.30 },
        { x: 0.56, y: 0.10, r: 0.035, ry: 0.02, d: 0.25 },
    ];

    for (const c of clusters) {
        // Each cluster = multiple overlapping leaf blobs
        const cx = c.x * W + px;
        const cy = c.y * H + py;
        const mainR = c.r * W;
        const mainRy = c.ry * H;

        // Main mass
        const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, mainR);
        g.addColorStop(0, rgba(6, 14, 5, c.d));
        g.addColorStop(0.4, rgba(8, 18, 6, c.d * 0.8));
        g.addColorStop(0.7, rgba(10, 20, 8, c.d * 0.4));
        g.addColorStop(1, 'transparent');
        ctx.fillStyle = g;
        ctx.beginPath();
        ctx.ellipse(cx, cy, mainR, mainRy, 0, 0, Math.PI * 2);
        ctx.fill();

        // Sub-blobs for organic edge
        if (c.r > 0.05) {
            for (let i = 0; i < 5; i++) {
                const angle = noise.noise1D(c.x * 10 + i * 3) * Math.PI * 2;
                const dist = mainR * (0.5 + noise.noise1D(c.x * 10 + i * 7 + 1) * 0.4);
                const bx = cx + Math.cos(angle) * dist;
                const by = cy + Math.sin(angle) * dist * (mainRy / mainR);
                const br = mainR * (0.2 + noise.noise1D(c.x * 10 + i * 11 + 2) * 0.15);

                ctx.beginPath();
                ctx.arc(bx, by, br, 0, Math.PI * 2);
                ctx.fillStyle = rgba(7, 15, 5, c.d * 0.6);
                ctx.fill();
            }
        }
    }

    // Individual hanging leaves
    for (let i = 0; i < 25; i++) {
        const lx = W * (0.22 + (i / 25) * 0.56) + px + noise.noise1D(i * 1.3 + 900) * 35;
        const ly = H * (0.06 + noise.noise1D(i * 0.8 + 950) * 0.08) + py;
        const sway = Math.sin(t * 0.3 + i * 0.55) * 4;
        const len = 8 + noise.noise1D(i * 1.5 + 1000) * 10;
        const width = 3 + noise.noise1D(i * 2 + 1050) * 2;

        ctx.beginPath();
        ctx.moveTo(lx + sway, ly);
        ctx.bezierCurveTo(
            lx + sway + width, ly + len * 0.3,
            lx + sway + width * 0.5, ly + len * 0.7,
            lx + sway + 1, ly + len
        );
        ctx.bezierCurveTo(
            lx + sway - width * 0.5, ly + len * 0.7,
            lx + sway - width, ly + len * 0.3,
            lx + sway, ly
        );
        ctx.fillStyle = rgba(12, 30, 10, 0.2 + noise.noise1D(i * 0.4 + 1100) * 0.15);
        ctx.fill();
    }
}

// ===== LIGHT RAYS =====
function drawLightRays() {
    ctx.globalCompositeOperation = 'screen';
    const rays = [
        { x: 0.36, angle: 3, w: 45, phase: 0 },
        { x: 0.48, angle: -1.5, w: 30, phase: 2 },
        { x: 0.56, angle: 5, w: 25, phase: 4 },
        { x: 0.42, angle: 1, w: 18, phase: 1.5 },
    ];

    for (const r of rays) {
        const intensity = clamp(0.5 + Math.sin(t * 0.25 + r.phase) * 0.5, 0, 1) * 0.045;
        if (intensity < 0.005) continue;

        ctx.save();
        ctx.translate(r.x * W, 0);
        ctx.rotate(r.angle * Math.PI / 180);

        const g = ctx.createLinearGradient(0, 0, 0, H * 0.85);
        g.addColorStop(0, rgba(255, 240, 180, intensity));
        g.addColorStop(0.3, rgba(255, 235, 170, intensity * 0.5));
        g.addColorStop(0.6, rgba(255, 230, 160, intensity * 0.15));
        g.addColorStop(1, 'transparent');
        ctx.fillStyle = g;
        ctx.fillRect(-r.w / 2, 0, r.w, H * 0.85);
        ctx.restore();
    }
    ctx.globalCompositeOperation = 'source-over';
}

// ===== PARTICLES =====
const dustParticles = Array.from({ length: 50 }, (_, i) => ({
    x: noise.noise1D(i * 1.7 + 1200) * 0.5 + 0.5,
    y: noise.noise1D(i * 2.1 + 1300) * 0.6 + 0.2,
    size: 0.5 + noise.noise1D(i * 3.1 + 1400) * 1.5,
    speed: 0.05 + noise.noise1D(i * 1.3 + 1500) * 0.25,
    phase: noise.noise1D(i * 4 + 1600) * Math.PI * 2,
    bright: 0.08 + noise.noise1D(i * 2.7 + 1700) * 0.15,
}));

function drawParticles() {
    for (const p of dustParticles) {
        const x = p.x * W + Math.sin(t * p.speed * 0.7 + p.phase) * 35;
        const y = ((p.y * H + t * p.speed * 5) % (H * 0.7)) + H * 0.1;
        const vis = p.bright * (0.5 + Math.sin(t * 0.9 + p.phase) * 0.5);

        if (vis > 0.02) {
            ctx.beginPath();
            ctx.arc(x, y, p.size, 0, Math.PI * 2);
            ctx.fillStyle = rgba(210, 200, 170, vis);
            ctx.fill();
        }
    }
}

// Fireflies
const fireflies = Array.from({ length: 8 }, (_, i) => ({
    x: 0.25 + noise.noise1D(i * 3 + 2000) * 0.5,
    y: 0.35 + noise.noise1D(i * 3.7 + 2100) * 0.3,
    phase: noise.noise1D(i * 4.3 + 2200) * Math.PI * 2,
    speed: 0.15 + noise.noise1D(i * 2.1 + 2300) * 0.3,
    size: 1.5 + noise.noise1D(i * 5 + 2400) * 1.5,
}));

function drawFireflies() {
    for (const f of fireflies) {
        const x = f.x * W + Math.sin(t * f.speed + f.phase) * 40;
        const y = f.y * H + Math.cos(t * f.speed * 0.6 + f.phase + 1) * 25;
        const brightness = clamp(Math.sin(t * 1.0 + f.phase), 0, 1);

        if (brightness > 0.5) {
            const glow = ctx.createRadialGradient(x, y, 0, x, y, f.size * 8);
            glow.addColorStop(0, rgba(210, 195, 80, brightness * 0.45));
            glow.addColorStop(0.2, rgba(210, 195, 80, brightness * 0.1));
            glow.addColorStop(1, 'transparent');
            ctx.fillStyle = glow;
            ctx.beginPath();
            ctx.arc(x, y, f.size * 8, 0, Math.PI * 2);
            ctx.fill();

            ctx.beginPath();
            ctx.arc(x, y, f.size * 0.5, 0, Math.PI * 2);
            ctx.fillStyle = rgba(250, 240, 170, brightness * 0.9);
            ctx.fill();
        }
    }
}

// ===== VIGNETTE & ATMOSPHERE =====
function drawVignette() {
    // Natural vignette — darker edges like being inside canopy
    const v = ctx.createRadialGradient(W / 2, H * 0.45, W * 0.2, W / 2, H * 0.45, W * 0.75);
    v.addColorStop(0, 'transparent');
    v.addColorStop(0.5, 'transparent');
    v.addColorStop(0.8, rgba(3, 6, 2, 0.3));
    v.addColorStop(1, rgba(3, 6, 2, 0.55));
    ctx.fillStyle = v;
    ctx.fillRect(0, 0, W, H);

    // Bottom darkness
    const bot = ctx.createLinearGradient(0, H * 0.88, 0, H);
    bot.addColorStop(0, 'transparent');
    bot.addColorStop(1, rgba(3, 6, 2, 0.35));
    ctx.fillStyle = bot;
    ctx.fillRect(0, H * 0.88, W, H * 0.12);
}

// ===== MAIN RENDER =====
function render() {
    t += 0.016;
    smx = lerp(smx, mx, 0.025);
    smy = lerp(smy, my, 0.025);

    // Sky
    drawSky();
    drawSun();

    // Far mountains — heavily hazed, blue-grey (atmospheric perspective)
    drawMountainRange({
        yBase: H * 0.46, amplitude: H * 0.09,
        noiseObj: noise, seed: 1.2, octaves: 6,
        color: [[0, '#6a8a98'], [0.5, '#5a7a8a'], [1, '#4a6a78']],
        hazeColor: [150, 170, 195], hazeAmount: 0.18,
        parallax: 5,
        hasForest: false,
    });

    // Atmospheric mist between far and mid
    drawMistLayer(H * 0.45, 5, 0.06, 0.06, 1.8, 1.2, [170, 185, 200]);

    // Mid mountains — greenish with visible forest
    drawMountainRange({
        yBase: H * 0.52, amplitude: H * 0.07,
        noiseObj: noise2, seed: 3.4, octaves: 6,
        color: [[0, '#3a5a3a'], [0.3, '#345234'], [0.7, '#2a462a'], [1, '#224022']],
        hazeColor: [130, 155, 170], hazeAmount: 0.08,
        parallax: 10,
        hasForest: true, forestColor: [22, 42, 20, 0.5], forestDensity: 4, forestScale: 0.7,
    });

    // Valley mist
    drawMistLayer(H * 0.50, 7, 0.10, 0.08, 1.4, 1.0, [185, 195, 200]);
    drawMistTendrils(H * 0.48, 4, 0.08, 0.03);

    // Near hills — dark green, dense forest
    drawMountainRange({
        yBase: H * 0.58, amplitude: H * 0.06,
        noiseObj: noise3, seed: 5.8, octaves: 6,
        color: [[0, '#264826'], [0.5, '#1e3c1e'], [1, '#163416']],
        hazeColor: [100, 130, 120], hazeAmount: 0.03,
        parallax: 16,
        hasForest: true, forestColor: [16, 35, 14, 0.6], forestDensity: 3, forestScale: 0.9,
    });

    // River
    drawRiver();

    // Heavy valley mist — the signature Coorg mist
    drawMistLayer(H * 0.60, 10, 0.15, 0.10, 1.6, 1.3, [190, 200, 205]);
    drawMistLayer(H * 0.54, 5, 0.05, 0.04, 1.0, 0.8, [180, 195, 195]);
    drawMistTendrils(H * 0.58, 6, 0.12, 0.04);

    // Forest floor
    drawForestFloor();

    // Mid-distance trees
    drawTree(0.30, 16, 18, false);
    drawTree(0.70, 14, 18, false);

    // Foreground trees — full detail
    drawTree(0.07, 48, 36, true);
    drawTree(-0.04, 58, 42, true);
    drawTree(0.88, 44, 36, true);
    drawTree(1.04, 52, 42, true);

    // Canopy
    drawCanopy();

    // Light rays
    drawLightRays();

    // Atmospheric particles
    drawParticles();
    drawFireflies();

    // Vignette
    drawVignette();

    requestAnimationFrame(render);
}

render();
</script>
