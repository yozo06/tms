<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WildArc — Coorg Timescape</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{overflow:hidden;background:#040804;cursor:none}
canvas{display:block;position:fixed;top:0;left:0}
#bg{z-index:0}#fg{z-index:1}
.brand{position:fixed;bottom:8%;left:50%;transform:translateX(-50%);
    text-align:center;z-index:50;opacity:0;animation:fi 6s ease-out 3s forwards;pointer-events:none}
.brand h1{font-family:Georgia,serif;color:rgba(220,208,172,0.6);font-size:2.8rem;
    font-weight:400;letter-spacing:14px;text-shadow:0 2px 30px rgba(0,0,0,0.8)}
.brand p{color:rgba(190,185,165,0.3);font-family:Georgia,serif;font-size:0.72rem;
    letter-spacing:7px;margin-top:14px;text-transform:uppercase}
@keyframes fi{to{opacity:1}}

/* Time dial */
.dial-wrap{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:100;
    display:flex;align-items:center;gap:12px;background:rgba(8,16,8,0.65);
    border:1px solid rgba(80,100,80,0.25);border-radius:24px;padding:8px 18px;
    backdrop-filter:blur(8px);user-select:none}
.dial-label{color:rgba(200,200,180,0.6);font-family:Georgia,serif;font-size:11px;
    letter-spacing:2px;min-width:70px;text-align:center}
.dial-icons{display:flex;gap:2px;align-items:center}
.dial-icons span{font-size:12px;opacity:0.5}
.dial-icons span.active{opacity:1}
input[type=range]{-webkit-appearance:none;width:200px;height:4px;border-radius:2px;
    background:linear-gradient(90deg,#1a1a3a,#3a2a1a,#5a4a20,#e8c050,#5a4a20,#3a2a1a,#1a1a3a);
    outline:none;cursor:pointer}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;
    border-radius:50%;background:rgba(220,210,180,0.8);border:2px solid rgba(100,120,100,0.5);
    cursor:pointer;box-shadow:0 0 8px rgba(200,180,100,0.3)}
</style>
</head>
<body>
<canvas id="bg"></canvas>
<canvas id="fg"></canvas>
<div class="brand"><h1>wildarc</h1><p>Where nature leads, we follow</p></div>
<div class="dial-wrap">
    <div class="dial-icons"><span>🌙</span></div>
    <input type="range" id="timeDial" min="0" max="1000" value="300">
    <div class="dial-icons"><span>🌙</span></div>
    <div class="dial-label" id="timeLabel">DAWN</div>
</div>

<script>
const bgC=document.getElementById('bg'),fgC=document.getElementById('fg');
const bg=bgC.getContext('2d'),fgCtx=fgC.getContext('2d');
let W,H;
let mx=.5,my=.5,smx=.5,smy=.5,psmx=-1,psmy=-1;
let t=0,needsRedraw=true;

// Time of day: 0=midnight, 0.25=sunrise, 0.5=noon, 0.75=sunset, 1=midnight
let timeOfDay=0.3; // start at dawn
const dial=document.getElementById('timeDial');
const tLabel=document.getElementById('timeLabel');
dial.addEventListener('input',()=>{timeOfDay=dial.value/1000;needsRedraw=true;});

function getTimeLabel(td){
    if(td<.05||td>.95)return'MIDNIGHT';if(td<.15)return'PRE-DAWN';if(td<.28)return'DAWN';
    if(td<.38)return'SUNRISE';if(td<.45)return'MORNING';if(td<.55)return'MIDDAY';
    if(td<.65)return'AFTERNOON';if(td<.75)return'EVENING';if(td<.82)return'SUNSET';
    if(td<.90)return'DUSK';return'NIGHT';
}

function resize(){W=bgC.width=fgC.width=innerWidth;H=bgC.height=fgC.height=innerHeight;needsRedraw=true;genTex();}
addEventListener('resize',resize);resize();
addEventListener('mousemove',e=>{mx=e.clientX/W;my=e.clientY/H;});

// ===== NOISE =====
class NS{constructor(s=42){this.p=new Uint8Array(512);const pm=new Uint8Array(256);
for(let i=0;i<256;i++)pm[i]=i;for(let i=255;i>0;i--){s=(s*16807)%2147483647;
const j=s%(i+1);[pm[i],pm[j]]=[pm[j],pm[i]];}for(let i=0;i<512;i++)this.p[i]=pm[i&255];}
f(t){return t*t*t*(t*(t*6-15)+10)}
g2(h,x,y){const u=(h&2)?y:x,v=(h&2)?x:y;return((h&1)?-u:u)+((h&4)?-v:v)}
n(x){const X=Math.floor(x)&255,xf=x-Math.floor(x),u=this.f(xf);
return((this.p[X]&1)?-xf:xf)*(1-u)+((this.p[X+1]&1)?-(xf-1):(xf-1))*u}
n2(x,y){const X=Math.floor(x)&255,Y=Math.floor(y)&255,xf=x-Math.floor(x),yf=y-Math.floor(y);
const u=this.f(xf),v=this.f(yf),a=this.p[X]+Y,b=this.p[X+1]+Y;
return(1-v)*((1-u)*this.g2(this.p[a],xf,yf)+u*this.g2(this.p[b],xf-1,yf))+v*((1-u)*this.g2(this.p[a+1],xf,yf-1)+u*this.g2(this.p[b+1],xf-1,yf-1))}
fbm(x,o=6){let v=0,a=1,f=1,m=0;for(let i=0;i<o;i++){v+=this.n(x*f)*a;m+=a;a*=.5;f*=2}return v/m}
fbm2(x,y,o=5){let v=0,a=1,f=1,m=0;for(let i=0;i<o;i++){v+=this.n2(x*f,y*f)*a;m+=a;a*=.5;f*=2}return v/m}
}
const n1=new NS(137),n2=new NS(283),n3=new NS(419),n4=new NS(557);

function rgba(r,g,b,a=1){return`rgba(${r|0},${g|0},${b|0},${a})`}
function L(a,b,t){return a+(b-a)*t}
function cl(v,lo=0,hi=1){return Math.max(lo,Math.min(hi,v))}
function lC(a,b,t){return[L(a[0],b[0],t),L(a[1],b[1],t),L(a[2],b[2],t)]}

// ===== TIME-BASED COLOR SYSTEM =====
// Multi-stop color lookup: input timeOfDay, output color
function timeColor(stops){
    // stops: [[time, [r,g,b]], ...]
    const td=timeOfDay;
    for(let i=0;i<stops.length-1;i++){
        if(td>=stops[i][0]&&td<=stops[i+1][0]){
            const f=(td-stops[i][0])/(stops[i+1][0]-stops[i][0]);
            return lC(stops[i][1],stops[i+1][1],f);
        }
    }
    return stops[stops.length-1][1];
}

// Darkness factor: 0=full light, 1=full dark
function darkness(){
    const td=timeOfDay;
    if(td<.2)return L(1,.3,(td)/.2); // midnight→pre-dawn
    if(td<.3)return L(.3,0,(td-.2)/.1); // pre-dawn→dawn
    if(td<.7)return 0; // day
    if(td<.8)return L(0,.3,(td-.7)/.1); // evening→dusk
    return L(.3,1,(td-.8)/.2); // dusk→night
}

// Sun visibility
function sunVis(){
    const td=timeOfDay;
    if(td<.2||td>.85)return 0;
    if(td<.3)return(td-.2)/.1;
    if(td>.75)return(0.85-td)/.1;
    return 1;
}
// Moon visibility
function moonVis(){
    const td=timeOfDay;
    if(td>.15&&td<.8)return 0;
    if(td<.05||td>.95)return 1;
    if(td<.15)return 1-(td-.05)/.1;
    return(td-.8)/.15;
}
// Sun Y position (arc across sky)
function sunY(){
    const td=cl((timeOfDay-.25)/.5,0,1); // 0 at sunrise, 1 at sunset
    return .58-.22*Math.sin(td*Math.PI); // highest at noon
}
function sunX(){
    const td=cl((timeOfDay-.25)/.5,0,1);
    return L(.25,.75,td); // east to west
}

// ===== TERRAIN TEXTURES =====
let hillTex=[];
function createTex(w,h,cfg){
    const c=document.createElement('canvas');c.width=w;c.height=h;
    const cx=c.getContext('2d');const img=cx.createImageData(w,h);const d=img.data;
    for(let y=0;y<h;y++)for(let x=0;x<w;x++){
        const i=(y*w+x)*4,nx=x/w,ny=y/h;
        const tex=cfg.nO.fbm2(nx*cfg.ns+cfg.sd,ny*cfg.ns*2+cfg.sd,5);
        const tex2=cfg.nO.fbm2(nx*cfg.ns*3+cfg.sd+10,ny*cfg.ns*4+cfg.sd+10,3);
        const bc=cfg.bc;
        let r=L(bc[0][0],bc[1][0],ny)+tex*14+tex2*7;
        let g=L(bc[0][1],bc[1][1],ny)+tex*18+tex2*9;
        let b=L(bc[0][2],bc[1][2],ny)+tex*7+tex2*4;
        if(ny<(cfg.fl||.6)){
            const fo=cfg.nO.fbm2(nx*40+cfg.sd,ny*40+cfg.sd,4);
            const fd=cfg.nO.fbm2(nx*80+cfg.sd+5,ny*80+cfg.sd+5,3);
            r+=fo*11-5+fd*4;g+=fo*16-1+fd*7;b+=fo*5-2;
            if(fd<-.3){r-=7;g-=4;b-=2}if(fd>.35&&ny<.3){r+=3;g+=7;b+=1}
        }
        r=L(r,cfg.hr,cfg.ha);g=L(g,cfg.hg,cfg.ha);b=L(b,cfg.hb,cfg.ha);
        d[i]=cl(r,0,255);d[i+1]=cl(g,0,255);d[i+2]=cl(b,0,255);d[i+3]=255;
    }
    cx.putImageData(img,0,0);return c;
}
function genTex(){
    const tw=Math.min(W,900),th=220;
    hillTex=[
        createTex(tw,th,{bc:[[72,98,112],[52,78,92]],ns:9,nO:n1,sd:1.5,hr:155,hg:175,hb:198,ha:.35,fl:.7}),
        createTex(tw,th,{bc:[[40,65,36],[26,48,22]],ns:11,nO:n2,sd:3.5,hr:130,hg:155,hb:165,ha:.15,fl:.8}),
        createTex(tw,th,{bc:[[36,60,33],[23,44,20]],ns:11,nO:n2,sd:4.2,hr:125,hg:148,hb:158,ha:.12,fl:.8}),
        createTex(tw,th,{bc:[[28,52,26],[16,36,14]],ns:13,nO:n3,sd:6,hr:90,hg:120,hb:115,ha:.05,fl:.9}),
    ];
}

// ===== HILLS =====
function hillY(cx,w,pk,nO,sd,x,ox){
    const nx=(x+ox-cx)/w;return Math.exp(-nx*nx*2.2)*(1+nO.fbm(nx*4.5+sd,6)*.35)*pk;
}
function drawHill(c,tex,cx,w,pk,by,nO,sd,px){
    const ox=(smx-.5)*px,oy=(smy-.5)*px*.18;
    const pts=[];let mY=by;
    c.beginPath();c.moveTo(-20,H);
    for(let x=-20;x<=W+20;x+=2){const h=hillY(cx,w,pk,nO,sd,x,ox);const y=by-h+oy;pts.push({x,y});
        x===-20?c.moveTo(x,y):c.lineTo(x,y);if(y<mY)mY=y;}
    c.lineTo(W+20,H);c.lineTo(-20,H);c.closePath();
    c.save();c.clip();
    c.drawImage(tex,-20+ox*.3,mY-5,W+40,by-mY+40);
    const dk=darkness();
    if(dk>0){c.fillStyle=rgba(5,8,20,dk*.5);c.fillRect(-20,mY-5,W+40,by-mY+40);}
    // Ridge highlight
    c.restore();
    // Re-trace for ridge glow
    c.beginPath();for(const p of pts)c.lineTo(p.x,p.y);
    c.strokeStyle=rgba(180,195,175,(.04-dk*.03)*sunVis());c.lineWidth=1.5;c.stroke();
    return pts;
}

// ===== STREAM (closer, bigger) =====
function drawStream(c){
    const ox=(smx-.5)*14,oy=(smy-.5)*6;
    const stY=H*.635; // moved closer (was .665)
    const stW=30; // bigger (was 22)
    const dk=darkness();

    // SLOPE from our hill down to stream
    const slopeTop=H*.70,slopeBot=stY+stW*.5;
    const sG=c.createLinearGradient(0,slopeTop-10,0,slopeBot+5);
    const sc1=lC([22,40,18],[8,14,8],dk);
    const sc2=lC([25,42,20],[10,16,10],dk);
    sG.addColorStop(0,rgba(sc1[0],sc1[1],sc1[2],0));
    sG.addColorStop(.06,rgba(sc1[0],sc1[1],sc1[2],.65));
    sG.addColorStop(.5,rgba(sc2[0],sc2[1],sc2[2],.8));
    sG.addColorStop(1,rgba(sc2[0],sc2[1],sc2[2],.5));
    c.fillStyle=sG;c.fillRect(0,slopeTop-10,W,slopeBot-slopeTop+15);

    // === CARDAMOM PLANTS down the slope ===
    for(let i=0;i<30;i++){
        const cx2=(n1.n(i*2.5+6000)*.5+.5)*W+ox;
        const cy2=L(slopeTop+5,slopeBot-8,n1.n(i*1.6+6010)*.5+.5);
        const ch=8+n1.n(i*2+6020)*6;
        const csw=Math.sin(t*.2+i*.6)*1.5;
        const cAlpha=L(.3,.1,dk);

        // Cardamom: tall stem with large alternate leaves
        c.beginPath();c.moveTo(cx2,cy2);
        c.quadraticCurveTo(cx2+csw*.3,cy2-ch*.5,cx2+csw,cy2-ch);
        c.strokeStyle=rgba(25,45,18,cAlpha);c.lineWidth=1.2;c.stroke();

        // Large elongated leaves (cardamom signature)
        for(let l=0;l<4;l++){
            const lt=(l+1)/5;
            const lx=L(cx2,cx2+csw,lt);
            const ly=L(cy2,cy2-ch,lt);
            const side=(l%2===0)?-1:1;
            const lLen=6+n1.n(i*3+l*5+6030)*4;
            const lSw=Math.sin(t*.15+i+l*.4)*1;

            c.beginPath();c.moveTo(lx,ly);
            c.bezierCurveTo(
                lx+side*lLen*.4+lSw,ly-1,
                lx+side*lLen*.8+lSw,ly+lLen*.15,
                lx+side*lLen+lSw,ly+lLen*.25
            );
            c.bezierCurveTo(
                lx+side*lLen*.7+lSw,ly+lLen*.35,
                lx+side*lLen*.3+lSw,ly+lLen*.15,
                lx,ly
            );
            c.fillStyle=rgba(16,40+l*3,12,cAlpha*.8);
            c.fill();
        }

        // Cardamom pods at base (small)
        if(i%4===0){
            for(let p=0;p<2;p++){
                c.beginPath();c.ellipse(cx2+n1.n(i*7+p*4+6050)*4,cy2+2+p*2,2,1.2,n1.n(i+p)*0.5,0,Math.PI*2);
                c.fillStyle=rgba(80,100,50,cAlpha*.6);c.fill();
            }
        }
    }

    // Trees growing up from slope
    for(let i=0;i<20;i++){
        const tx=(n1.n(i*2.7+6100)*.5+.5)*W+ox;
        const ty=L(slopeTop+2,slopeBot-2,n1.n(i*1.8+6110)*.5+.5);
        const th=10+n1.n(i*2.3+6120)*10;
        const tw2=3+n1.n(i*1.5+6130)*3;
        c.beginPath();c.moveTo(tx,ty);c.lineTo(tx+n1.n(i*3+6140)*2,ty-th);
        c.strokeStyle=rgba(16,12,6,L(.3,.12,dk));c.lineWidth=tw2*.35;c.stroke();
        for(let cc=0;cc<3;cc++){
            const ccx=tx+n1.n(i*4+cc*3+6150)*tw2*1.5;
            const ccy=ty-th-cc*2+n1.n(i*3+cc*5+6160)*3;
            const cr=tw2*(.5+n1.n(i*5+cc*7+6170)*.4);
            c.beginPath();c.arc(ccx,ccy,cr,0,Math.PI*2);
            c.fillStyle=rgba(14+n1.n(i*.3+cc)*4,36+n1.n(i*.3+cc)*6,10,L(.32,.12,dk));c.fill();
        }
    }

    // === FLOWER BEDS near stream banks ===
    for(let i=0;i<25;i++){
        const fx=(n1.n(i*2.3+6200)*.5+.5)*W+ox;
        const nx2=fx/W;
        const curve=n1.fbm(nx2*2.5+18,4)*16;
        const side=i%2===0?-1:1;
        const fy=stY+curve+oy+side*stW*(.55+n1.n(i*1.4+6210)*.2);
        const fAlpha=L(.22,.06,dk);

        // Flower cluster
        const petals=4+Math.floor(n1.n(i*3+6220)*2);
        const fSz=1.8+n1.n(i*2+6230)*1.2;
        const colors=[[220,120,150],[180,100,200],[240,200,80],[200,80,100],[150,180,220]][i%5];

        // Small stem
        c.beginPath();c.moveTo(fx,fy);c.lineTo(fx,fy-fSz*2);
        c.strokeStyle=rgba(18,42,14,fAlpha);c.lineWidth=.4;c.stroke();

        for(let p=0;p<petals;p++){
            const ang=(p/petals)*Math.PI*2;
            c.beginPath();c.ellipse(fx+Math.cos(ang)*fSz*.5,fy-fSz*2+Math.sin(ang)*fSz*.5,
                fSz*.35,fSz*.18,ang,0,Math.PI*2);
            c.fillStyle=rgba(colors[0],colors[1],colors[2],fAlpha);c.fill();
        }
        c.beginPath();c.arc(fx,fy-fSz*2,fSz*.15,0,Math.PI*2);
        c.fillStyle=rgba(200,180,50,fAlpha);c.fill();
    }

    // === AQUATIC PLANTS at stream edges ===
    for(let i=0;i<20;i++){
        const ax=(n1.n(i*2.8+6300)*.5+.5)*W+ox;
        const nx2=ax/W;
        const curve=n1.fbm(nx2*2.5+18,4)*16;
        const side=i%2===0?-1:1;
        const ay=stY+curve+oy+side*stW*.35;
        const aAlpha=L(.25,.08,dk);

        if(i%3===0){
            // Water lily pad
            c.beginPath();c.arc(ax,ay,3+n1.n(i*4+6310)*2,0,Math.PI*2);
            c.fillStyle=rgba(22,50,25,aAlpha);c.fill();
            // Lily flower (if day)
            if(dk<.4){
                c.beginPath();c.arc(ax+1,ay-1,1.5,0,Math.PI*2);
                c.fillStyle=rgba(230,200,210,aAlpha*.8);c.fill();
            }
        } else if(i%3===1){
            // Reeds
            for(let r=0;r<3;r++){
                const rx=ax+n1.n(i*5+r*4+6320)*3;
                const rh=6+n1.n(i*3+r*6+6330)*5;
                const rsw=Math.sin(t*.2+i+r*.3)*1;
                c.beginPath();c.moveTo(rx,ay);
                c.quadraticCurveTo(rx+rsw*.5,ay-rh*.5,rx+rsw,ay-rh);
                c.strokeStyle=rgba(20,48,16,aAlpha);c.lineWidth=.6;c.stroke();
                // Reed head
                c.beginPath();c.ellipse(rx+rsw,ay-rh,1,2.5,0,0,Math.PI*2);
                c.fillStyle=rgba(80,60,30,aAlpha*.7);c.fill();
            }
        } else {
            // Moss on wet rock
            const rsz=2+n1.n(i*3+6340)*2;
            c.beginPath();c.arc(ax,ay,rsz,0,Math.PI*2);
            c.fillStyle=rgba(30,55,28,aAlpha*.6);c.fill();
        }
    }

    // === BOULDERS ===
    for(let i=0;i<16;i++){
        const bx=(n1.n(i*3.5+6400)*.5+.5)*W+ox;
        const nx2=bx/W;
        const curve=n1.fbm(nx2*2.5+18,4)*16;
        const inSt=n1.n(i*1.8+6410)>.05;
        const by=stY+curve+oy+(inSt?n1.n(i*2.5+6415)*stW*.3:
            (n1.n(i*1.3+6420)>0?-1:1)*stW*(.45+n1.n(i*2+6425)*.25));
        const bsz=5+n1.n(i*2.2+6430)*10;

        c.beginPath();
        for(let j=0;j<=10;j++){
            const ang=(j/10)*Math.PI*2;
            const r=bsz*(.65+n1.n(i*8+j*4+6440)*.38);
            const px2=bx+Math.cos(ang)*r;
            const py2=by+Math.sin(ang)*r*.5;
            j===0?c.moveTo(px2,py2):c.lineTo(px2,py2);
        }
        c.closePath();
        const rBase=40+n1.n(i*1.4+6450)*15;
        const rk=L(1,.4,dk);
        const rg=c.createLinearGradient(bx,by-bsz,bx,by+bsz*.4);
        rg.addColorStop(0,rgba((rBase+15)*rk,(rBase+12)*rk,(rBase+8)*rk,.7));
        rg.addColorStop(.5,rgba((rBase+3)*rk,rBase*rk,(rBase-3)*rk,.65));
        rg.addColorStop(1,rgba((rBase-10)*rk,(rBase-12)*rk,(rBase-14)*rk,.55));
        c.fillStyle=rg;c.fill();
        if(n1.n(i*3+6460)>.15){
            c.beginPath();c.ellipse(bx-bsz*.1,by-bsz*.2,bsz*.28,bsz*.12,.2,0,Math.PI*2);
            c.fillStyle=rgba(32,55,26,L(.16,.06,dk));c.fill();
        }
        if(inSt){
            // White water around boulder
            c.beginPath();c.ellipse(bx+bsz*.7,by,bsz*1.1,bsz*.18,.15,0,Math.PI*2);
            c.fillStyle=rgba(210,225,240,L(.06,.02,dk)+Math.sin(t*2+bx)*.015);c.fill();
            for(let s=0;s<3;s++){
                c.beginPath();c.arc(bx+bsz*(.4+s*.25)+n1.n(bx+s*5)*2,by+n1.n(bx+s*7)*bsz*.15,
                    1+n1.n(bx+s*3)*.6,0,Math.PI*2);
                c.fillStyle=rgba(220,238,250,L(.07,.02,dk));c.fill();
            }
        }
    }

    // === WATER ===
    const wPasses=[
        {ws:1.0,col:[40,70,105],a:.10},{ws:.85,col:[35,65,100],a:.13},
        {ws:.65,col:[28,55,92],a:.16},{ws:.42,col:[22,48,88],a:.20},
        {ws:.2,col:[55,90,125],a:.08},
    ];
    for(const wp of wPasses){
        c.beginPath();
        for(let x=-50;x<=W+50;x+=2){
            const nx2=x/W;const curve=n1.fbm(nx2*2.5+18,4)*16;
            const wave=Math.sin(nx2*22+t*.35+wp.ws*2)*1.5+Math.sin(nx2*38+t*.5)*.6;
            x===-50?c.moveTo(x+ox,stY+curve+wave+oy-stW*wp.ws*.5):
                c.lineTo(x+ox,stY+curve+wave+oy-stW*wp.ws*.5);
        }
        for(let x=W+50;x>=-50;x-=2){
            const nx2=x/W;const curve=n1.fbm(nx2*2.5+18,4)*16;
            const wave=Math.sin(nx2*22+t*.35+wp.ws*2+.5)*1.2;
            c.lineTo(x+ox,stY+curve+wave+oy+stW*wp.ws*.5);
        }
        c.closePath();
        const wc=lC(wp.col,[wp.col[0]*.3,wp.col[1]*.3,wp.col[2]*.4],dk);
        c.fillStyle=rgba(wc[0],wc[1],wc[2],wp.a);c.fill();
    }

    // Glints
    c.globalCompositeOperation='screen';
    const sv=sunVis();
    for(let i=0;i<30;i++){
        const gx=((i*47+t*4.5)%(W+80))-40+ox;
        const nx2=gx/W;const curve=n1.fbm(nx2*2.5+18,4)*16;
        const gy=stY+curve+oy+n1.n(i*2+6500)*stW*.2;
        const gl=Math.sin(t*2.5+i*1.8+nx2*6)*.5+.5;
        if(gl>.5){
            c.beginPath();c.ellipse(gx,gy,1.5+n1.n(i*1.3+6510)*2,.4,n1.n(i+6520)*.4,0,Math.PI*2);
            const gc=lC([200,220,248],[60,80,120],dk);
            c.fillStyle=rgba(gc[0],gc[1],gc[2],(gl-.5)*.25*(.3+sv*.7));c.fill();
        }
    }
    c.globalCompositeOperation='source-over';
}

// ===== MIST =====
function drawMist(c,bY,cnt,spd,mA,sx,sy,col,px){
    const drift=t*spd,ox2=(smx-.5)*px,oy2=(smy-.5)*px*.15;
    const dk=darkness();const nc=lC(col,[col[0]*.3,col[1]*.3,col[2]*.4],dk);
    for(let i=0;i<cnt;i++){
        const sd=i*3.7+.5;
        const x=((n1.n(sd)*W*1.9+drift*20+ox2)%(W*2.4))-W*.7;
        const y=bY+n1.fbm(drift*.035+sd,2)*22+n1.n(sd+100)*18+oy2;
        const rx=(110+n1.n(sd+200)*100)*sx;const ry=(18+n1.n(sd+300)*14)*sy;
        const al=mA*(.35+n1.fbm(drift*.05+sd,2)*.65);
        for(let p=2;p>=0;p--){
            const pr=1+p*.3,a=al*(1-p*.25);
            const g=c.createRadialGradient(x,y,0,x,y,rx*pr);
            g.addColorStop(0,rgba(nc[0],nc[1],nc[2],a));
            g.addColorStop(.3,rgba(nc[0],nc[1],nc[2],a*.6));
            g.addColorStop(.6,rgba(nc[0]+3,nc[1]+3,nc[2]+3,a*.18));
            g.addColorStop(1,'transparent');
            c.fillStyle=g;c.beginPath();c.ellipse(x,y,rx*pr,ry*pr,n1.n(sd+400)*.2,0,Math.PI*2);c.fill();
        }
    }
}
function drawWispy(c,bY,cnt,spd,al,px){
    const drift=t*spd,ox2=(smx-.5)*px;const dk=darkness();
    const nc=lC([188,198,205],[45,50,65],dk);
    for(let i=0;i<cnt;i++){
        const sd=i*5.1+77;const sx2=((n1.n(sd)*W*2+drift*16+ox2)%(W*1.7))-W*.35;
        const y=bY+n1.n(sd+50)*22;c.beginPath();const len=100+n1.n(sd+80)*120;
        for(let x=0;x<len;x+=2){const py2=y+n1.fbm((sx2+x)*.003+sd+drift*.012,4)*10;
            x===0?c.moveTo(sx2+x,py2):c.lineTo(sx2+x,py2);}
        c.strokeStyle=rgba(nc[0],nc[1],nc[2],al);c.lineWidth=1.5+n1.n(sd+90)*3;c.lineCap='round';
        c.shadowColor=rgba(nc[0],nc[1],nc[2],al*.4);c.shadowBlur=5;c.stroke();c.shadowBlur=0;
    }
}

// ===== FOOD FOREST FLOOR =====
function drawFloor(c){
    const baseY=H*.74; // moved up since stream is closer
    const px=(smx-.5)*28;const dk=darkness();

    const grd=c.createLinearGradient(0,baseY-20,0,H);
    const fc1=lC([20,36,16],[6,12,6],dk);const fc2=lC([3,7,2],[1,2,1],dk);
    grd.addColorStop(0,rgba(fc1[0],fc1[1],fc1[2],0));
    grd.addColorStop(.025,rgba(fc1[0],fc1[1],fc1[2],1));
    grd.addColorStop(.3,rgba(L(fc1[0],fc2[0],.5),L(fc1[1],fc2[1],.5),L(fc1[2],fc2[2],.5),1));
    grd.addColorStop(1,rgba(fc2[0],fc2[1],fc2[2],1));
    c.fillStyle=grd;c.fillRect(0,baseY-20,W,H-baseY+20);

    // Ground texture
    try{const gD=c.getImageData(0,Math.max(0,baseY|0),W,Math.min(40,H-(baseY|0)));const gd=gD.data;
    for(let i=0;i<gd.length;i+=4){const px2=(i/4)%W,py2=(i/4)/W|0;
        const tex=n4.fbm2(px2*.02,py2*.04,3)*4;
        gd[i]=cl(gd[i]+tex,0,255);gd[i+1]=cl(gd[i+1]+tex*1.1,0,255);gd[i+2]=cl(gd[i+2]+tex*.4,0,255);}
    c.putImageData(gD,0,Math.max(0,baseY|0));}catch(e){}

    const fAlpha=L(.28,.08,dk);

    // Ground cover flowers
    for(let i=0;i<30;i++){
        const fx=(n1.n(i*1.8+7000)*.5+.5)*W*1.1-W*.05+px;
        const fy=baseY+2+(n1.n(i*2.2+7010)*.5+.5)*14;
        if(i%3<2&&dk<.5){
            const fSz=1.8+n1.n(i*2+7030)*1.2;
            const colors=[[220,180,200],[200,200,120],[180,140,200],[240,200,130],[200,220,180]][i%5];
            c.beginPath();c.moveTo(fx,fy);c.lineTo(fx+Math.sin(t*.2+i)*.8,fy-fSz*2.2);
            c.strokeStyle=rgba(20,45,15,fAlpha);c.lineWidth=.4;c.stroke();
            const petals=4+Math.floor(n1.n(i*3+7020)*2);
            for(let p=0;p<petals;p++){const ang=(p/petals)*Math.PI*2+t*.04;
                c.beginPath();c.ellipse(fx+Math.cos(ang)*fSz*.5+Math.sin(t*.2+i)*.8,
                    fy-fSz*2.2+Math.sin(ang)*fSz*.5,fSz*.35,fSz*.17,ang,0,Math.PI*2);
                c.fillStyle=rgba(colors[0],colors[1],colors[2],fAlpha);c.fill();}
            c.beginPath();c.arc(fx+Math.sin(t*.2+i)*.8,fy-fSz*2.2,fSz*.14,0,Math.PI*2);
            c.fillStyle=rgba(200,180,50,fAlpha);c.fill();
        }
    }

    // Shrubs with berries
    for(let i=0;i<10;i++){
        const sx2=(i/10)*W*1.1-W*.05+px+n1.n(i*3.8+7100)*30;
        const sy2=baseY+n1.n(i*2.5+7110)*4;const sh=7+n1.n(i*1.9+7120)*8;
        for(let cc=0;cc<4;cc++){
            const cx2=sx2+n1.n(i*5+cc*3+7140)*6;
            const cy=sy2-sh*(.3+cc*.12)+n1.n(i*4+cc*7+7150)*3;
            c.beginPath();c.arc(cx2,cy,3+n1.n(i*6+cc*5+7160)*2,0,Math.PI*2);
            c.fillStyle=rgba(18+n1.n(i*.2+cc)*3,40+n1.n(i*.2+cc)*5+cc*2,14,fAlpha);c.fill();
        }
        if(i%2===0)for(let f=0;f<2;f++){
            c.beginPath();c.arc(sx2+n1.n(i*7+f*4+7170)*5,sy2-sh*.4+n1.n(i*6+f*6+7180)*sh*.3,1.2,0,Math.PI*2);
            c.fillStyle=rgba(i%4===0?180:200,i%4===0?50:160,i%4===0?40:40,fAlpha*.7);c.fill();}
    }

    // Tree ferns
    for(let i=0;i<5;i++){
        const x=(i/5)*W*1.1-W*.05+px+n1.n(i*4.2+7200)*45;
        const y=baseY+n1.n(i*3+7210)*3;const h=22+n1.n(i*2+7220)*15;
        const sw=Math.sin(t*.18+i*.8)*2;
        c.beginPath();c.moveTo(x,y);c.quadraticCurveTo(x+sw*.4,y-h*.5,x+sw,y-h);
        c.strokeStyle=rgba(30,22,14,fAlpha*1.2);c.lineWidth=2.2;c.stroke();
        const fc=5+Math.floor(n1.n(i*5+7230)*2);
        for(let f=0;f<fc;f++){
            const ang=(f/fc)*Math.PI*1.1-Math.PI*.55+n1.n(f*2+i*7+7235)*.2;
            const fLen=12+n1.n(f*3+i*5+7240)*9;const droop=.35+n1.n(f*2+7260)*.2;
            const fSw=Math.sin(t*.2+i+f*.3)*1.2;
            const ex2=x+sw+Math.cos(ang)*fLen+fSw;const ey=y-h+Math.sin(ang)*fLen+droop*fLen;
            c.beginPath();c.moveTo(x+sw,y-h);
            c.quadraticCurveTo(x+sw+Math.cos(ang)*fLen*.5+fSw*.5,y-h+Math.sin(ang)*fLen*.4,ex2,ey);
            c.strokeStyle=rgba(18,44,15,fAlpha);c.lineWidth=.9;c.stroke();
            for(let p=1;p<=4;p++){const pt=p/5;
                const ppx=L(x+sw,ex2,pt);const ppy=L(y-h,ey,pt);const pLen=(1-pt)*4+1;
                for(const s of[-1,1]){c.beginPath();c.moveTo(ppx,ppy);
                    c.lineTo(ppx+Math.cos(ang+s*.35)*pLen,ppy+Math.sin(ang+s*.35)*pLen+.6);
                    c.strokeStyle=rgba(16,40+pt*6,12,fAlpha*.7);c.lineWidth=.4;c.stroke();}
            }
        }
    }

    // Banana plants
    for(let i=0;i<3;i++){
        const bx=W*(.12+i*.38)+px+n1.n(i*8+7300)*35;
        const by=baseY+n1.n(i*5+7310)*2;const bh=18+n1.n(i*3+7320)*10;
        c.beginPath();c.moveTo(bx-1.5,by);c.lineTo(bx-1,by-bh);c.lineTo(bx+1,by-bh);c.lineTo(bx+1.5,by);
        c.fillStyle=rgba(35,50,25,fAlpha);c.fill();
        for(let l=0;l<4;l++){
            const lAng=(l/4)*Math.PI*1.5-Math.PI*.75+n1.n(l*3+i*9+7330)*.3;
            const lLen=12+n1.n(l*4+i*7+7340)*6;const lSw=Math.sin(t*.15+i+l*.5)*2;
            const tipX=bx+Math.cos(lAng)*lLen+lSw;
            const tipY=by-bh+Math.sin(lAng)*lLen*.6+lLen*.2;
            c.beginPath();c.moveTo(bx,by-bh);
            c.bezierCurveTo(bx+Math.cos(lAng)*lLen*.3+Math.sin(lAng)*2.5+lSw*.3,
                by-bh+Math.sin(lAng)*lLen*.3-Math.cos(lAng)*2.5,
                bx+Math.cos(lAng)*lLen*.7+Math.sin(lAng)*1.5+lSw*.7,
                by-bh+Math.sin(lAng)*lLen*.6+lLen*.08,tipX,tipY);
            c.bezierCurveTo(bx+Math.cos(lAng)*lLen*.7-Math.sin(lAng)*1.5+lSw*.7,
                by-bh+Math.sin(lAng)*lLen*.6+lLen*.08,
                bx+Math.cos(lAng)*lLen*.3-Math.sin(lAng)*2.5+lSw*.3,
                by-bh+Math.sin(lAng)*lLen*.3+Math.cos(lAng)*2.5,bx,by-bh);
            c.fillStyle=rgba(14,38+l*2,10,fAlpha*.85);c.fill();
        }
    }
}

// ===== TREES =====
function drawTree(c,bxF,tw,px2){
    const px=(smx-.5)*px2,py=(smy-.5)*px2*.1;
    const x=bxF*W+px;const lean=n1.n(bxF*10)*10;const dk=darkness();

    // Buttress roots
    for(let r=0;r<4;r++){
        const side=(r<2?-1:1)*(1+(r%2)*.6);
        const spread=tw*(1.6+r*.3);const rH=tw*(.5+n1.n(r*5+bxF*20)*.25);
        c.beginPath();c.moveTo(x+side*tw*.2,H*.77-rH);
        c.bezierCurveTo(x+side*spread*.4,H*.77-rH*.4,x+side*spread*.7,H*.77-rH*.08,x+side*spread,H*.77+3);
        c.lineTo(x+side*spread*.6,H*.77+3);
        c.bezierCurveTo(x+side*spread*.4,H*.77-rH*.04,x+side*spread*.2,H*.77-rH*.25,x+side*tw*.12,H*.77-rH*.45);
        c.closePath();c.fillStyle=rgba(7,5,2,L(.6,.3,dk));c.fill();
    }

    // Trunk
    c.beginPath();
    for(let y=H+10;y>=py-10;y-=2){const f=(H-y)/H;const tp=1-f*.28;const w=n1.n(y*.003+bxF*10)*2.5;
        c.lineTo(x+lean*f-tw*tp+w,y);}
    for(let y=py-10;y<=H+10;y+=2){const f=(H-y)/H;const tp=1-f*.28;const w=n1.n(y*.003+bxF*10)*2.5;
        c.lineTo(x+lean*f+tw*tp-w,y);}
    c.closePath();
    const bG=c.createLinearGradient(x-tw*1.5,0,x+tw*1.5,0);
    bG.addColorStop(0,rgba(3,2,1,1));bG.addColorStop(.12,rgba(12,8,3,1));
    bG.addColorStop(.35,rgba(22,15,6,1));bG.addColorStop(.5,rgba(25,18,8,1));
    bG.addColorStop(.65,rgba(20,13,5,1));bG.addColorStop(.88,rgba(10,7,2,1));bG.addColorStop(1,rgba(3,2,1,1));
    c.fillStyle=bG;c.fill();

    // Bark
    for(let i=0;i<10;i++){const bxx=x+(i-5)*tw*.14+lean*.3;c.beginPath();
        for(let y=H;y>0;y-=5){const f2=(H-y)/H;
            c.lineTo(bxx+lean*f2+n1.fbm(y*.002+i*1.9+bxF*8,4)*3.5,y);}
        c.strokeStyle=rgba(2,1,0,.15+n1.n(i+bxF*5)*.05);c.lineWidth=.5;c.stroke();}

    // Epiphytes & moss
    for(let i=0;i<8;i++){const my=H*(.1+i*.09);const f=(H-my)/H;const lX=lean*f;
        const side=n1.n(i*4+bxF*10+100)>0?1:-1;
        const mx2=x+lX+side*tw*(.22+n1.n(i*2+110)*.15);
        for(let j=0;j<3;j++){c.beginPath();
            c.arc(mx2+n1.n(i*3+j*5+130)*tw*.1,my+py+n1.n(i*3+j*7+140)*3,
                tw*(.05+n1.n(i*3+j*9+150)*.03),0,Math.PI*2);
            c.fillStyle=rgba(28+j*3,55+j*5,20,.08+j*.01);c.fill();}
        if(i%4===2&&dk<.4){c.beginPath();c.arc(mx2,my+py-2,1.3,0,Math.PI*2);
            c.fillStyle=rgba(200,150,180,L(.1,.02,dk));c.fill();}
    }

    // Vines
    const vc=2+Math.floor(n1.n(bxF*20+200)*1.5);
    for(let v=0;v<vc;v++){
        const bY2=H*(.12+v*.13+n1.n(v*3+bxF*15+210)*.05);
        const f=(H-bY2)/H;const lX=lean*f;const dir=bxF<.5?1:-1;
        const bSX=x+lX+tw*.35*dir+px;const bSY=bY2+py;
        const bLen=tw*(3+n1.n(v*5+bxF*20+220)*2);
        c.beginPath();c.moveTo(bSX,bSY);
        c.quadraticCurveTo(bSX+dir*bLen*.5,bSY-20,bSX+dir*bLen,bSY-10+n1.n(v*4+230)*15);
        c.strokeStyle=rgba(12,9,3,.65);c.lineWidth=tw*.14;c.lineCap='round';c.stroke();
        const vX=L(bSX,bSX+dir*bLen,.45);const vY=bSY-8;
        const vLen=30+n1.n(v*6+250)*45;const vSw=Math.sin(t*.17+v*1.3)*3.5;
        c.beginPath();c.moveTo(vX,vY);
        c.bezierCurveTo(vX+vSw*.3,vY+vLen*.25,vX+vSw*.8,vY+vLen*.55,vX+vSw*.6,vY+vLen);
        c.strokeStyle=rgba(16,28,10,.25);c.lineWidth=.9;c.stroke();
        for(let l=0;l<3;l++){const lt=(l+1)/4;
            c.beginPath();c.ellipse(vX+vSw*lt*.8+n1.n(l*3+v*10+260)*2,vY+vLen*lt,2,1.2,n1.n(l+v+270)*Math.PI*.4,0,Math.PI*2);
            c.fillStyle=rgba(12,36,9,.15);c.fill();}
    }
}

// ===== CANOPY =====
function drawCanopy(c){
    const px=(smx-.5)*30,py=(smy-.5)*15;const dk=darkness();
    const cd=lC([3,6,2],[1,2,1],dk);
    c.fillStyle=rgba(cd[0],cd[1],cd[2],1);c.fillRect(0,0,W,H*.05);
    const tG=c.createLinearGradient(0,0,0,H*.14);
    tG.addColorStop(0,rgba(cd[0],cd[1],cd[2],1));tG.addColorStop(1,'transparent');
    c.fillStyle=tG;c.fillRect(0,0,W,H*.14);
    const cls=[
        [-.05,.04,.32,.18,.97],[.08,.06,.25,.15,.94],[.20,.05,.18,.11,.90],[.29,.10,.14,.07,.82],
        [1.05,.04,.32,.18,.97],[.92,.06,.25,.15,.94],[.80,.05,.18,.11,.90],[.71,.10,.14,.07,.82],
        [.41,.05,.065,.035,.38],[.54,.04,.055,.028,.30],[.63,.07,.058,.030,.34],[.47,.09,.042,.022,.26],
    ];
    for(const[cx,cy,rx,ry,d]of cls){
        const gx=cx*W+px,gy=cy*H+py;
        const cc=lC([4,10,3],[1,3,1],dk);
        const g=c.createRadialGradient(gx,gy,0,gx,gy,rx*W);
        g.addColorStop(0,rgba(cc[0],cc[1],cc[2],d));g.addColorStop(.35,rgba(cc[0]+2,cc[1]+4,cc[2]+1,d*.7));
        g.addColorStop(.65,rgba(cc[0]+3,cc[1]+6,cc[2]+2,d*.3));g.addColorStop(1,'transparent');
        c.fillStyle=g;c.beginPath();c.ellipse(gx,gy,rx*W,ry*H,0,0,Math.PI*2);c.fill();
        if(rx>.06)for(let i=0;i<4;i++){const a=n1.n(cx*10+i*3.2)*Math.PI*2;
            const dist=rx*W*(.45+n1.n(cx*10+i*7.1)*.35);
            c.beginPath();c.arc(gx+Math.cos(a)*dist,gy+Math.sin(a)*dist*(ry/rx),rx*W*(.13+n1.n(cx*10+i*11)*.08),0,Math.PI*2);
            c.fillStyle=rgba(cc[0]+1,cc[1]+2,cc[2]+1,d*.5);c.fill();}
    }
    for(let i=0;i<28;i++){
        const lx=W*(.18+(i/28)*.64)+px+n1.n(i*1.1+1200)*38;
        const ly=H*(.04+n1.n(i*.65+1250)*.10)+py;
        const sw=Math.sin(t*.25+i*.45)*3.5;const len=8+n1.n(i*1.3+1260)*12;
        c.beginPath();c.moveTo(lx+sw,ly);
        c.bezierCurveTo(lx+sw+3,ly+len*.25,lx+sw+2,ly+len*.65,lx+sw+.5,ly+len);
        c.bezierCurveTo(lx+sw-2,ly+len*.65,lx+sw-3,ly+len*.25,lx+sw,ly);
        const lc=lC([9,26,7],[3,10,3],dk);
        c.fillStyle=rgba(lc[0],lc[1],lc[2],.18+n1.n(i*.3+1270)*.07);c.fill();
    }
}

// ===== SKY =====
function drawSky(c){
    // Color stops for different times
    const skyStops={
        night:  [[3,4,12],[5,6,18],[8,10,28],[12,15,38],[18,20,45],[15,18,40],[10,12,30],[6,8,20]],
        dawn:   [[8,12,28],[18,25,48],[42,60,92],[90,110,135],[165,150,125],[215,140,80],[205,90,40],[125,45,22]],
        day:    [[25,60,120],[40,80,150],[60,110,180],[90,140,200],[130,170,210],[160,190,215],[140,170,200],[100,140,180]],
        sunset: [[15,18,40],[25,30,55],[50,50,80],[100,80,100],[180,120,90],[220,130,60],[210,85,35],[130,45,22]],
    };
    let stops;
    const td=timeOfDay;
    if(td<.2){stops=skyStops.night.map((c2,i)=>lC(c2,c2,0));}
    else if(td<.35){const f=(td-.2)/.15;stops=skyStops.night.map((c2,i)=>lC(c2,skyStops.dawn[i],f));}
    else if(td<.45){const f=(td-.35)/.1;stops=skyStops.dawn.map((c2,i)=>lC(c2,skyStops.day[i],f));}
    else if(td<.6){stops=skyStops.day.map(c2=>c2);}
    else if(td<.72){const f=(td-.6)/.12;stops=skyStops.day.map((c2,i)=>lC(c2,skyStops.sunset[i],f));}
    else if(td<.85){const f=(td-.72)/.13;stops=skyStops.sunset.map((c2,i)=>lC(c2,skyStops.night[i],f));}
    else{stops=skyStops.night.map(c2=>c2);}

    for(let y=0;y<H*.74;y++){
        const f=y/(H*.74);let idx=cl(f*7,0,6.99);const lo=idx|0;const hi=Math.min(lo+1,7);
        const fr=idx-lo;const cc=lC(stops[lo],stops[hi],fr);
        const nv=n1.n(y*.006+100)*2;
        c.fillStyle=rgba(cc[0]+nv,cc[1]+nv*.4,cc[2]-nv*.12);c.fillRect(0,y,W,1);
    }
}

function drawSunMoon(c){
    const sv=sunVis(),mv=moonVis();
    // Sun
    if(sv>.01){
        const sx2=sunX()*W+(smx-.5)*W*.01;const sy2=sunY()*H+(smy-.5)*H*.005;
        for(let i=4;i>=0;i--){const r=85+i*60;
            const g=c.createRadialGradient(sx2,sy2,0,sx2,sy2,r);
            g.addColorStop(0,rgba(255,245,215,(.03-i*.004)*sv));g.addColorStop(1,'transparent');
            c.fillStyle=g;c.beginPath();c.arc(sx2,sy2,r,0,Math.PI*2);c.fill();}
        const d=c.createRadialGradient(sx2,sy2,0,sx2,sy2,24);
        d.addColorStop(0,rgba(255,252,240,.7*sv));d.addColorStop(.3,rgba(255,235,180,.4*sv));
        d.addColorStop(.65,rgba(245,200,110,.1*sv));d.addColorStop(1,'transparent');
        c.fillStyle=d;c.beginPath();c.arc(sx2,sy2,24,0,Math.PI*2);c.fill();
    }
    // Moon
    if(mv>.01){
        const mx2=W*(.55+(smx-.5)*.01);const my2=H*(.28+(smy-.5)*.005);
        for(let i=2;i>=0;i--){const r=45+i*35;
            const g=c.createRadialGradient(mx2,my2,0,mx2,my2,r);
            g.addColorStop(0,rgba(180,195,220,(.018-i*.004)*mv));g.addColorStop(1,'transparent');
            c.fillStyle=g;c.beginPath();c.arc(mx2,my2,r,0,Math.PI*2);c.fill();}
        const md=c.createRadialGradient(mx2,my2,0,mx2,my2,16);
        md.addColorStop(0,rgba(230,235,245,.6*mv));md.addColorStop(.4,rgba(210,218,230,.4*mv));
        md.addColorStop(.8,rgba(180,190,210,.15*mv));md.addColorStop(1,'transparent');
        c.fillStyle=md;c.beginPath();c.arc(mx2,my2,16,0,Math.PI*2);c.fill();
        c.beginPath();c.arc(mx2+5,my2-1.5,12,0,Math.PI*2);c.fillStyle=rgba(8,10,20,.45*mv);c.fill();

        // Stars
        for(let i=0;i<50;i++){
            const stx=(n1.n(i*2.3+8000)*.5+.5)*W;const sty=(n1.n(i*3.1+8050)*.5+.5)*H*.42;
            const b=(.25+Math.sin(t*.4+i*1.7)*.25)*mv;
            if(b>.08&&sty<H*.38){c.beginPath();c.arc(stx,sty,.35+n1.n(i*4+8100)*.5,0,Math.PI*2);
                c.fillStyle=rgba(220,225,240,b*.3);c.fill();}
        }
    }
}

// ===== LIGHT RAYS =====
function drawRays(c){
    const sv=sunVis();if(sv<.01)return;
    c.globalCompositeOperation='screen';
    const rays=[{x:.37,a:3.5,w:38,ph:0},{x:.46,a:-1.2,w:26,ph:2},{x:.54,a:5.5,w:20,ph:4},{x:.41,a:.8,w:14,ph:1.5}];
    for(const r of rays){
        const int=cl(.5+Math.sin(t*.2+r.ph)*.5)*.04*sv;if(int<.002)continue;
        c.save();c.translate(r.x*W,0);c.rotate(r.a*Math.PI/180);
        const g=c.createLinearGradient(0,0,0,H*.78);
        g.addColorStop(0,rgba(255,238,178,int));g.addColorStop(.25,rgba(255,232,168,int*.45));
        g.addColorStop(.55,rgba(255,228,158,int*.1));g.addColorStop(1,'transparent');
        c.fillStyle=g;c.fillRect(-r.w/2,0,r.w,H*.78);c.restore();
    }
    c.globalCompositeOperation='source-over';
}

// ===== CREATURES =====
const bflies=Array.from({length:10},(_,i)=>({
    x:.2+n1.n(i*3+9000)*.6,y:.55+n1.n(i*3.5+9050)*.2, // near flowers/floor
    ph:n1.n(i*4+9100)*Math.PI*2,sp:.06+n1.n(i*2+9150)*.12,
    sz:2+n1.n(i*5+9200)*1.5,
    col:[[200,140,60],[180,80,120],[100,140,200],[200,180,80],[160,100,180]][i%5],
    wph:n1.n(i*6+9250)*Math.PI*2
}));
const fflies=Array.from({length:14},(_,i)=>({
    x:.15+n1.n(i*3+9300)*.7,y:.62+n1.n(i*3.4+9350)*.18, // NEAR FOREST FLOOR
    ph:n1.n(i*4.1+9400)*Math.PI*2,sp:.08+n1.n(i*1.9+9450)*.2,
    sz:1+n1.n(i*4.8+9500)*1.5
}));

function drawCreatures(c){
    const dk=darkness();
    // Butterflies (day)
    if(dk<.5){
        const bA=1-dk*2;
        for(const b of bflies){
            const x=b.x*W+Math.sin(t*b.sp+b.ph)*45;
            const y=b.y*H+Math.cos(t*b.sp*.7+b.ph+1)*20+Math.sin(t*b.sp*1.5+b.ph)*10;
            const wb=Math.sin(t*5.5+b.wph);
            c.save();c.translate(x,y);
            c.beginPath();c.ellipse(0,0,b.sz*.15,b.sz*.5,0,0,Math.PI*2);
            c.fillStyle=rgba(30,20,10,bA*.25);c.fill();
            const fs=.25+Math.abs(wb)*.75;
            for(const s of[-1,1]){
                c.beginPath();c.ellipse(s*b.sz*.45*fs,-b.sz*.15,b.sz*.45*fs,b.sz*.4,s*.2,0,Math.PI*2);
                c.fillStyle=rgba(b.col[0],b.col[1],b.col[2],bA*.16);c.fill();
                c.beginPath();c.ellipse(s*b.sz*.3*fs,-b.sz*.1,b.sz*.22*fs,b.sz*.25,s*.2,0,Math.PI*2);
                c.fillStyle=rgba(b.col[0]+25,b.col[1]+15,b.col[2]+10,bA*.08);c.fill();
            }
            c.restore();
        }
    }
    // Fireflies (night) — near forest floor
    if(dk>.25){
        const fA=cl((dk-.25)*1.3);
        for(const f of fflies){
            const x=f.x*W+Math.sin(t*f.sp+f.ph)*30;
            const y=f.y*H+Math.cos(t*f.sp*.45+f.ph+1)*15;
            const b=cl(Math.sin(t*.8+f.ph));
            if(b>.4){
                const g=c.createRadialGradient(x,y,0,x,y,f.sz*6);
                g.addColorStop(0,rgba(175,195,65,b*fA*.35));
                g.addColorStop(.25,rgba(175,195,65,b*fA*.06));g.addColorStop(1,'transparent');
                c.fillStyle=g;c.beginPath();c.arc(x,y,f.sz*6,0,Math.PI*2);c.fill();
                c.beginPath();c.arc(x,y,f.sz*.35,0,Math.PI*2);
                c.fillStyle=rgba(240,242,155,b*fA*.8);c.fill();
            }
        }
    }
    // Dust motes
    const dA=L(1,.25,dk);
    for(let i=0;i<30;i++){
        const dx=(.2+n1.n(i*1.5+9600)*.6)*W+Math.sin(t*(.03+n1.n(i*1.1+9650)*.12)*.5+n1.n(i*3.8+9700)*Math.PI*2)*25;
        const dy=((.2+n1.n(i*1.9+9750)*.5)*H+t*(.03+n1.n(i*1.1+9650)*.12)*3)%(H*.55)+H*.15;
        const v=(.04+n1.n(i*2.3+9800)*.08)*(.5+Math.sin(t*.6+n1.n(i*3.8+9700)*Math.PI*2)*.5)*dA;
        if(v>.01){c.beginPath();c.arc(dx,dy,.3+n1.n(i*2.8+9850)*.9,0,Math.PI*2);
            c.fillStyle=rgba(200,190,160,v);c.fill();}
    }
}

// ===== VIGNETTE =====
function drawVignette(c){
    const dk=darkness();const vc=lC([2,4,1],[1,1,3],dk);
    const v=c.createRadialGradient(W/2,H*.38,W*.15,W/2,H*.38,W*.72);
    v.addColorStop(0,'transparent');v.addColorStop(.45,'transparent');
    v.addColorStop(.75,rgba(vc[0],vc[1],vc[2],.22+dk*.15));
    v.addColorStop(1,rgba(vc[0],vc[1],vc[2],.52+dk*.22));
    c.fillStyle=v;c.fillRect(0,0,W,H);
    const b=c.createLinearGradient(0,H*.84,0,H);
    b.addColorStop(0,'transparent');b.addColorStop(1,rgba(vc[0],vc[1],vc[2],.32+dk*.15));
    c.fillStyle=b;c.fillRect(0,H*.84,W,H*.16);
}

// ===== RENDER =====
function drawStatic(){
    bg.clearRect(0,0,W,H);
    drawSky(bg);drawSunMoon(bg);
    // Cirrus
    bg.globalAlpha=L(.025,.008,darkness());
    for(let i=0;i<4;i++){const cy=H*(.08+i*.05),cx=W*(.12+i*.22);bg.beginPath();
        for(let x=-130;x<130;x+=2){const ht=1-(x/130)**2;
            const y=cy+n1.fbm(x*.013+i*4.5,3)*5*ht;x===-130?bg.moveTo(cx+x,y):bg.lineTo(cx+x,y);}
        bg.strokeStyle=rgba(185,180,170,1);bg.lineWidth=5;bg.lineCap='round';bg.stroke();}
    bg.globalAlpha=1;

    // Hills with mist between
    drawHill(bg,hillTex[0],W*.28,W*.55,H*.15,H*.48,n1,1.2,4);
    drawMist(bg,H*.43,7,.065,.07,2.2,1.3,[162,178,195],5);
    drawWispy(bg,H*.41,3,.055,.02,5);
    drawHill(bg,hillTex[1],W*.68,W*.48,H*.12,H*.52,n2,3.4,9);
    drawHill(bg,hillTex[2],W*.40,W*.38,H*.09,H*.51,n2,4.1,10);
    drawMist(bg,H*.49,9,.10,.08,1.8,1.2,[178,192,200],10);
    drawWispy(bg,H*.47,4,.08,.025,8);
    drawHill(bg,hillTex[3],W*.50,W*.65,H*.10,H*.57,n3,5.8,15);
    drawStream(bg);
    drawMist(bg,H*.60,11,.13,.09,1.9,1.4,[183,196,202],14);
    drawWispy(bg,H*.58,5,.11,.03,12);
    drawFloor(bg);
    drawTree(bg,.30,11,16);drawTree(bg,.68,9,16);
    drawTree(bg,.06,42,34);drawTree(bg,-.04,52,40);
    drawTree(bg,.90,38,34);drawTree(bg,1.04,48,40);
    drawCanopy(bg);
}

function drawAnimated(){
    fgCtx.clearRect(0,0,W,H);
    drawMist(fgCtx,H*.42,4,.07,.035,1.8,1,[160,175,192],5);
    drawMist(fgCtx,H*.49,5,.11,.04,1.5,1.1,[175,190,198],10);
    drawMist(fgCtx,H*.59,6,.14,.05,1.7,1.2,[180,195,200],14);
    drawWispy(fgCtx,H*.45,2,.07,.012,6);drawWispy(fgCtx,H*.55,3,.10,.018,10);
    drawRays(fgCtx);drawCreatures(fgCtx);drawVignette(fgCtx);
}

let lastTOD=-1;
function render(){
    t+=.016;smx=L(smx,mx,.018);smy=L(smy,my,.018);
    tLabel.textContent=getTimeLabel(timeOfDay);

    const moved=Math.abs(smx-psmx)>.001||Math.abs(smy-psmy)>.001;
    const todChanged=Math.abs(timeOfDay-lastTOD)>.001;
    if(needsRedraw||moved||todChanged){drawStatic();psmx=smx;psmy=smy;lastTOD=timeOfDay;needsRedraw=false;}
    drawAnimated();
    requestAnimationFrame(render);
}
genTex();render();
</script>
