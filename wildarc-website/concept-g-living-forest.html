<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WildArc — Coorg Living Forest</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{overflow:hidden;background:#040804;cursor:none}
        canvas{display:block;position:fixed;top:0;left:0}
        #bg{z-index:0}#fg{z-index:1}
        .brand{position:fixed;bottom:9%;left:50%;transform:translateX(-50%);
            text-align:center;z-index:50;opacity:0;animation:fadeIn 6s ease-out 3s forwards;pointer-events:none}
        .brand h1{font-family:Georgia,'Times New Roman',serif;color:rgba(220,208,172,0.65);
            font-size:3rem;font-weight:400;letter-spacing:14px;text-shadow:0 2px 30px rgba(0,0,0,0.8)}
        .brand p{color:rgba(190,185,165,0.35);font-family:Georgia,serif;font-size:0.75rem;
            letter-spacing:7px;margin-top:14px;text-transform:uppercase}
        @keyframes fadeIn{to{opacity:1}}
        .time-toggle{position:fixed;top:20px;right:20px;z-index:100;background:rgba(10,20,10,0.6);
            border:1px solid rgba(100,120,100,0.3);border-radius:20px;padding:6px 14px;
            color:rgba(200,200,180,0.7);font-family:Georgia,serif;font-size:12px;letter-spacing:2px;
            cursor:pointer;backdrop-filter:blur(5px);transition:all 0.3s;user-select:none}
        .time-toggle:hover{background:rgba(20,40,20,0.7);color:rgba(220,220,200,0.9)}
    </style>
</head>
<body>
<canvas id="bg"></canvas>
<canvas id="fg"></canvas>
<div class="brand"><h1>wildarc</h1><p>Where nature leads, we follow</p></div>
<div class="time-toggle" id="timeBtn">☀ DAY</div>

<script>
const bgC=document.getElementById('bg'),fgC=document.getElementById('fg');
const bg=bgC.getContext('2d'),fg=fgC.getContext('2d');
let W,H;
let mx=.5,my=.5,smx=.5,smy=.5,psmx=.5,psmy=.5;
let t=0;
let isNight=false, nightBlend=0; // 0=day, 1=night
let needsRedraw=true;

const timeBtn=document.getElementById('timeBtn');
timeBtn.addEventListener('click',()=>{
    isNight=!isNight;
    timeBtn.textContent=isNight?'☾ NIGHT':'☀ DAY';
});

function resize(){W=bgC.width=fgC.width=innerWidth;H=bgC.height=fgC.height=innerHeight;needsRedraw=true;genTextures();}
addEventListener('resize',resize);resize();
addEventListener('mousemove',e=>{mx=e.clientX/W;my=e.clientY/H;});

// ===== NOISE =====
class Ns{
    constructor(s=42){this.p=new Uint8Array(512);const pm=new Uint8Array(256);
    for(let i=0;i<256;i++)pm[i]=i;for(let i=255;i>0;i--){s=(s*16807)%2147483647;
    const j=s%(i+1);[pm[i],pm[j]]=[pm[j],pm[i]];}for(let i=0;i<512;i++)this.p[i]=pm[i&255];}
    f(t){return t*t*t*(t*(t*6-15)+10)}
    g2(h,x,y){const u=(h&2)?y:x,v=(h&2)?x:y;return((h&1)?-u:u)+((h&4)?-v:v)}
    n(x){const X=Math.floor(x)&255,xf=x-Math.floor(x),u=this.f(xf);
    return((this.p[X]&1)?-xf:xf)*(1-u)+((this.p[X+1]&1)?-(xf-1):(xf-1))*u}
    n2(x,y){const X=Math.floor(x)&255,Y=Math.floor(y)&255,xf=x-Math.floor(x),yf=y-Math.floor(y);
    const u=this.f(xf),v=this.f(yf),a=this.p[X]+Y,b=this.p[X+1]+Y;
    return(1-v)*((1-u)*this.g2(this.p[a],xf,yf)+u*this.g2(this.p[b],xf-1,yf))+v*((1-u)*this.g2(this.p[a+1],xf,yf-1)+u*this.g2(this.p[b+1],xf-1,yf-1))}
    fbm(x,o=6){let v=0,a=1,f=1,m=0;for(let i=0;i<o;i++){v+=this.n(x*f)*a;m+=a;a*=.5;f*=2}return v/m}
    fbm2(x,y,o=5){let v=0,a=1,f=1,m=0;for(let i=0;i<o;i++){v+=this.n2(x*f,y*f)*a;m+=a;a*=.5;f*=2}return v/m}
}
const n1=new Ns(137),n2=new Ns(283),n3=new Ns(419),n4=new Ns(557),n5=new Ns(691);
function rgba(r,g,b,a=1){return`rgba(${r|0},${g|0},${b|0},${a})`}
function lerp(a,b,t){return a+(b-a)*t}
function clamp(v,l=0,h=1){return Math.max(l,Math.min(h,v))}
function lerpC(c1,c2,t){return[lerp(c1[0],c2[0],t),lerp(c1[1],c2[1],t),lerp(c1[2],c2[2],t)]}

// ===== DAY/NIGHT COLOR SYSTEM =====
function dayNight(dayColor, nightColor) {
    return lerpC(dayColor, nightColor, nightBlend);
}

// ===== TERRAIN TEXTURES =====
let hillTextures=[];
function createTex(w,h,cfg){
    const c=document.createElement('canvas');c.width=w;c.height=h;
    const cx=c.getContext('2d');const img=cx.createImageData(w,h);const d=img.data;
    for(let y=0;y<h;y++)for(let x=0;x<w;x++){
        const i=(y*w+x)*4,nx=x/w,ny=y/h;
        const tex=cfg.nObj.fbm2(nx*cfg.ns+cfg.sd,ny*cfg.ns*2+cfg.sd,5);
        const tex2=cfg.nObj.fbm2(nx*cfg.ns*3+cfg.sd+10,ny*cfg.ns*4+cfg.sd+10,3);
        const bc=cfg.bc;
        let r=lerp(bc[0][0],bc[1][0],ny)+tex*14+tex2*7;
        let g=lerp(bc[0][1],bc[1][1],ny)+tex*18+tex2*9;
        let b=lerp(bc[0][2],bc[1][2],ny)+tex*7+tex2*4;
        if(ny<(cfg.fl||.6)){
            const fo=cfg.nObj.fbm2(nx*40+cfg.sd,ny*40+cfg.sd,4);
            const fd=cfg.nObj.fbm2(nx*80+cfg.sd+5,ny*80+cfg.sd+5,3);
            r+=fo*11-5+fd*4;g+=fo*16-1+fd*7;b+=fo*5-2;
            if(fd<-.3){r-=7;g-=4;b-=2}if(fd>.35&&ny<.3){r+=3;g+=7;b+=1}
        }
        r=lerp(r,cfg.hr,cfg.ha);g=lerp(g,cfg.hg,cfg.ha);b=lerp(b,cfg.hb,cfg.ha);
        d[i]=clamp(r,0,255);d[i+1]=clamp(g,0,255);d[i+2]=clamp(b,0,255);d[i+3]=255;
    }
    cx.putImageData(img,0,0);return c;
}
function genTextures(){
    const tw=Math.min(W,800),th=200;
    hillTextures=[
        createTex(tw,th,{bc:[[72,98,112],[52,78,92]],ns:8,nObj:n1,sd:1.5,hr:155,hg:175,hb:198,ha:.35,fl:.7}),
        createTex(tw,th,{bc:[[40,65,36],[26,48,22]],ns:10,nObj:n2,sd:3.5,hr:130,hg:155,hb:165,ha:.15,fl:.8}),
        createTex(tw,th,{bc:[[36,60,33],[23,44,20]],ns:10,nObj:n2,sd:4.2,hr:125,hg:148,hb:158,ha:.12,fl:.8}),
        createTex(tw,th,{bc:[[28,52,26],[16,36,14]],ns:12,nObj:n3,sd:6,hr:90,hg:120,hb:115,ha:.05,fl:.9}),
    ];
}

// ===== HILLS =====
function hillY(cx,w,pk,nO,sd,x,ox){
    const nx=(x+ox-cx)/w;return Math.exp(-nx*nx*2.2)*(1+nO.fbm(nx*4.5+sd,6)*.35)*pk;
}
function drawHill(ctx,tex,cx,w,pk,by,nO,sd,px){
    const ox=(smx-.5)*px,oy=(smy-.5)*px*.18;
    const pts=[];let mY=by;
    ctx.beginPath();ctx.moveTo(-20,H);
    for(let x=-20;x<=W+20;x+=2){const h=hillY(cx,w,pk,nO,sd,x,ox);const y=by-h+oy;pts.push({x,y});
        x===-20?ctx.moveTo(x,y):ctx.lineTo(x,y);if(y<mY)mY=y;}
    ctx.lineTo(W+20,H);ctx.lineTo(-20,H);ctx.closePath();
    ctx.save();ctx.clip();
    ctx.drawImage(tex,-20+ox*.3,mY-5,W+40,by-mY+40);
    // Night darkening
    if(nightBlend>0){ctx.fillStyle=rgba(5,8,20,nightBlend*.45);ctx.fillRect(-20,mY-5,W+40,by-mY+40);}
    const sg=ctx.createLinearGradient(0,mY,0,mY+(by-mY)*.4);
    sg.addColorStop(0,'transparent');sg.addColorStop(.5,rgba(0,5,0,.07));sg.addColorStop(1,rgba(0,5,0,.14));
    ctx.fillStyle=sg;ctx.fill();
    ctx.restore();return pts;
}

// ===== MOUNTAIN STREAM =====
function drawStream(ctx){
    const ox=(smx-.5)*14,oy=(smy-.5)*5;
    // The stream sits in a valley/ravine — we see it from above on our hill
    // There's a slope going DOWN from our position to the stream
    const streamY=H*.665;
    const streamW=22;

    // SLOPE going down from our hill to the stream
    // Draw the slope with trees growing up from it
    const slopeTop=H*.72; // where our hill ends
    const slopeBot=streamY+streamW*.6; // where stream bank is
    const slopeGrad=ctx.createLinearGradient(0,slopeTop-10,0,slopeBot+10);
    slopeGrad.addColorStop(0,rgba(16,32,14,0));
    slopeGrad.addColorStop(.08,rgba(22,40,18,.6));
    slopeGrad.addColorStop(.5,rgba(18,35,15,.8));
    slopeGrad.addColorStop(1,rgba(25,42,20,.5));
    ctx.fillStyle=slopeGrad;
    ctx.fillRect(0,slopeTop-10,W,slopeBot-slopeTop+20);
    if(nightBlend>0){ctx.fillStyle=rgba(3,5,12,nightBlend*.35);ctx.fillRect(0,slopeTop-10,W,slopeBot-slopeTop+20);}

    // Trees growing UP from the slope (their canopy rises toward us)
    for(let i=0;i<25;i++){
        const tx=(n1.n(i*2.7+2000)*.5+.5)*W+ox;
        const ty=lerp(slopeTop,slopeBot-.5,n1.n(i*1.8+2010)*.5+.5);
        const th=10+n1.n(i*2.3+2020)*12;
        const tw2=3+n1.n(i*1.5+2030)*3;
        // Trunk going up
        ctx.beginPath();ctx.moveTo(tx,ty);ctx.lineTo(tx+n1.n(i*3+2040)*2,ty-th);
        ctx.strokeStyle=rgba(18,14,8,.3);ctx.lineWidth=tw2*.4;ctx.stroke();
        // Canopy cluster
        for(let c=0;c<3;c++){
            const ccx=tx+n1.n(i*4+c*3+2050)*tw2*1.5;
            const ccy=ty-th-c*2+n1.n(i*3+c*5+2060)*3;
            const cr=tw2*(0.6+n1.n(i*5+c*7+2070)*.4);
            ctx.beginPath();ctx.arc(ccx,ccy,cr,0,Math.PI*2);
            const shade=n1.n(i*.3+c)*5;
            ctx.fillStyle=rgba(16+shade,38+shade*1.5,12+shade,.35);
            ctx.fill();
        }
    }

    // BOULDERS along and in the stream
    const boulders=[];
    for(let i=0;i<18;i++){
        const bx=(n1.n(i*3.5+2100)*.5+.5)*W+ox;
        const nx2=bx/W;
        const curve=n1.fbm(nx2*2.5+18,4)*18;
        const inStream=n1.n(i*1.8+2110)>.1;
        const by2=streamY+curve+oy+(inStream?n1.n(i*2.5+2115)*streamW*.3:
            (n1.n(i*1.3+2120)>0?-1:1)*streamW*(.5+n1.n(i*2+2125)*.3));
        const bsz=4+n1.n(i*2.2+2130)*8;
        boulders.push({x:bx,y:by2,sz:bsz,inStream});

        // Boulder shape — irregular, large
        ctx.beginPath();
        const pts2=10;
        for(let j=0;j<=pts2;j++){
            const ang=(j/pts2)*Math.PI*2;
            const r=bsz*(0.7+n1.n(i*8+j*4+2140)*.35);
            const px2=bx+Math.cos(ang)*r;
            const py2=by2+Math.sin(ang)*r*.55; // flattened perspective
            j===0?ctx.moveTo(px2,py2):ctx.lineTo(px2,py2);
        }
        ctx.closePath();

        // Rock gradient — grey with lichen
        const rBase=38+n1.n(i*1.4+2150)*15;
        const rg=ctx.createLinearGradient(bx,by2-bsz,bx,by2+bsz*.4);
        rg.addColorStop(0,rgba(rBase+15,rBase+12,rBase+8,.7));
        rg.addColorStop(.4,rgba(rBase+5,rBase+2,rBase-2,.65));
        rg.addColorStop(1,rgba(rBase-8,rBase-10,rBase-12,.55));
        ctx.fillStyle=rg;ctx.fill();

        // Lichen/moss patches
        if(n1.n(i*3+2160)>.2){
            ctx.beginPath();
            ctx.ellipse(bx-bsz*.15,by2-bsz*.2,bsz*.3,bsz*.15,.2,0,Math.PI*2);
            ctx.fillStyle=rgba(35,58,28,.18);ctx.fill();
        }
        // Wet base (if in stream)
        if(inStream){
            ctx.beginPath();
            ctx.ellipse(bx,by2+bsz*.25,bsz*.8,bsz*.12,0,0,Math.PI*2);
            ctx.fillStyle=rgba(60,90,110,.08);ctx.fill();
        }
    }

    // WATER — blue/white mountain stream
    // Multiple passes: deep channel dark blue, shallow edges lighter, white foam
    const waterPasses=[
        {ws:1.0, col:[45,75,105], a:.12},   // full width — shallow edge
        {ws:.85, col:[38,68,100], a:.15},
        {ws:.65, col:[30,58,92], a:.18},    // mid
        {ws:.45, col:[25,52,88], a:.20},    // deep channel
        {ws:.25, col:[50,85,120], a:.10},   // sky reflection in center
    ];

    for(const wp of waterPasses){
        ctx.beginPath();
        for(let x=-50;x<=W+50;x+=2){
            const nx2=x/W;
            const curve=n1.fbm(nx2*2.5+18,4)*18;
            const wave=Math.sin(nx2*20+t*.35+wp.ws*2)*1.2+Math.sin(nx2*35+t*.5)*.5;
            const y=streamY+curve+wave+oy;
            x===-50?ctx.moveTo(x+ox,y-streamW*wp.ws*.5):ctx.lineTo(x+ox,y-streamW*wp.ws*.5);
        }
        for(let x=W+50;x>=-50;x-=2){
            const nx2=x/W;
            const curve=n1.fbm(nx2*2.5+18,4)*18;
            const wave=Math.sin(nx2*20+t*.35+wp.ws*2+.5)*1+Math.sin(nx2*35+t*.5+.3)*.4;
            ctx.lineTo(x+ox,streamY+curve+wave+oy+streamW*wp.ws*.5);
        }
        ctx.closePath();
        // Night: water gets darker, more reflective
        const c=dayNight(wp.col,[wp.col[0]*.4,wp.col[1]*.4,wp.col[2]*.5]);
        ctx.fillStyle=rgba(c[0],c[1],c[2],wp.a);
        ctx.fill();
    }

    // White water / foam around boulders
    for(const b of boulders){
        if(!b.inStream)continue;
        // Foam arc downstream
        ctx.beginPath();
        ctx.ellipse(b.x+b.sz*.8,b.y,b.sz*1.2,b.sz*.2,.2,0,Math.PI*2);
        ctx.fillStyle=rgba(200,215,230,.06+Math.sin(t*2+b.x)*.02);
        ctx.fill();
        // White splash
        for(let s=0;s<3;s++){
            const sx2=b.x+b.sz*(.5+s*.3)+n1.n(b.x+s*5)*3;
            const sy2=b.y+n1.n(b.x+s*7)*b.sz*.2;
            ctx.beginPath();ctx.arc(sx2,sy2,1+n1.n(b.x+s*3)*.8,0,Math.PI*2);
            ctx.fillStyle=rgba(220,235,248,.08+Math.sin(t*3+s)*0.03);
            ctx.fill();
        }
    }

    // Water surface glints — white/blue highlights
    ctx.globalCompositeOperation='screen';
    for(let i=0;i<30;i++){
        const gx=((i*47+t*4)%(W+80))-40+ox;
        const nx2=gx/W;
        const curve=n1.fbm(nx2*2.5+18,4)*18;
        const gy=streamY+curve+oy+(n1.n(i*2+2200)*streamW*.25);
        const gl=Math.sin(t*2.5+i*1.8+nx2*6)*.5+.5;
        if(gl>.5){
            const streak=1.5+n1.n(i*1.3+2210)*2.5;
            ctx.beginPath();ctx.ellipse(gx,gy,streak,.4,n1.n(i+2220)*.4,0,Math.PI*2);
            const gc=dayNight([200,220,245],[80,100,140]);
            ctx.fillStyle=rgba(gc[0],gc[1],gc[2],(gl-.5)*.3);
            ctx.fill();
        }
    }
    ctx.globalCompositeOperation='source-over';
}

// ===== MIST =====
function drawMist(ctx,bY,cnt,spd,mA,sx,sy,col,px){
    const drift=t*spd,ox2=(smx-.5)*px;
    for(let i=0;i<cnt;i++){
        const sd=i*3.7+.5;
        const x=((n1.n(sd)*W*1.9+drift*20+ox2)%(W*2.4))-W*.7;
        const y=bY+n1.fbm(drift*.035+sd,2)*22+n1.n(sd+100)*18;
        const rx=(110+n1.n(sd+200)*100)*sx;
        const ry=(18+n1.n(sd+300)*14)*sy;
        const al=mA*(.35+n1.fbm(drift*.05+sd,2)*.65);
        const nc=dayNight(col,[col[0]*.35,col[1]*.35,col[2]*.45]);
        for(let p=2;p>=0;p--){
            const pr=1+p*.3,a=al*(1-p*.25);
            const g=ctx.createRadialGradient(x,y,0,x,y,rx*pr);
            g.addColorStop(0,rgba(nc[0],nc[1],nc[2],a));
            g.addColorStop(.3,rgba(nc[0],nc[1],nc[2],a*.6));
            g.addColorStop(.6,rgba(nc[0]+4,nc[1]+4,nc[2]+4,a*.18));
            g.addColorStop(1,'transparent');
            ctx.fillStyle=g;ctx.beginPath();ctx.ellipse(x,y,rx*pr,ry*pr,n1.n(sd+400)*.2,0,Math.PI*2);ctx.fill();
        }
    }
}
function drawWispy(ctx,bY,cnt,spd,al,px){
    const drift=t*spd,ox2=(smx-.5)*px;
    const nc=dayNight([188,198,205],[50,55,70]);
    for(let i=0;i<cnt;i++){
        const sd=i*5.1+77;
        const sx2=((n1.n(sd)*W*2+drift*16+ox2)%(W*1.7))-W*.35;
        const y=bY+n1.n(sd+50)*22;
        ctx.beginPath();const len=100+n1.n(sd+80)*120;
        for(let x=0;x<len;x+=2){
            const py2=y+n1.fbm((sx2+x)*.003+sd+drift*.012,4)*10;
            x===0?ctx.moveTo(sx2+x,py2):ctx.lineTo(sx2+x,py2);
        }
        ctx.strokeStyle=rgba(nc[0],nc[1],nc[2],al);
        ctx.lineWidth=1.5+n1.n(sd+90)*3;ctx.lineCap='round';
        ctx.shadowColor=rgba(nc[0],nc[1],nc[2],al*.4);ctx.shadowBlur=5;ctx.stroke();ctx.shadowBlur=0;
    }
}

// ===== MULTI-STORY FOOD FOREST =====
function drawFoodForest(ctx){
    const baseY=H*.775;
    const px=(smx-.5)*28;

    // Ground layer
    const grd=ctx.createLinearGradient(0,baseY-20,0,H);
    const gc1=dayNight([20,36,16],[6,12,6]);
    const gc2=dayNight([3,7,2],[1,2,1]);
    grd.addColorStop(0,'rgba(14,28,12,0)');
    grd.addColorStop(.025,rgba(gc1[0],gc1[1],gc1[2],1));
    grd.addColorStop(.3,rgba(lerp(gc1[0],gc2[0],.5),lerp(gc1[1],gc2[1],.5),lerp(gc1[2],gc2[2],.5),1));
    grd.addColorStop(1,rgba(gc2[0],gc2[1],gc2[2],1));
    ctx.fillStyle=grd;ctx.fillRect(0,baseY-20,W,H-baseY+20);

    // Pixel texture on ground
    try{
        const gData=ctx.getImageData(0,Math.max(0,baseY|0),W,Math.min(50,H-(baseY|0)));
        const gd=gData.data;
        for(let i=0;i<gd.length;i+=4){
            const px2=((i/4)%W),py2=((i/4)/W)|0;
            const tex=n4.fbm2(px2*.02,py2*.04,3)*5;
            gd[i]=clamp(gd[i]+tex,0,255);gd[i+1]=clamp(gd[i+1]+tex*1.1,0,255);gd[i+2]=clamp(gd[i+2]+tex*.4,0,255);
        }
        ctx.putImageData(gData,0,Math.max(0,baseY|0));
    }catch(e){}

    // === GROUND COVER — flowers, low herbs, leaf litter ===
    // Flowers (day: visible and bright, night: subtle)
    for(let i=0;i<40;i++){
        const fx=(n1.n(i*1.8+3000)*.5+.5)*W*1.1-W*.05+px;
        const fy=baseY+2+(n1.n(i*2.2+3010)*.5+.5)*18;
        const type=i%5;

        if(type<2){
            // Small wildflower
            const petals=4+Math.floor(n1.n(i*3+3020)*2);
            const fSize=2+n1.n(i*2+3030)*1.5;
            const flowerAlpha=lerp(.25,.05,nightBlend);

            // Stem
            ctx.beginPath();ctx.moveTo(fx,fy);ctx.lineTo(fx+Math.sin(t*.2+i)*1,fy-fSize*2.5);
            ctx.strokeStyle=rgba(20,45,15,flowerAlpha);ctx.lineWidth=.5;ctx.stroke();

            // Petals
            const colors=[[220,180,200],[200,200,120],[180,140,200],[240,200,130],[200,220,180]];
            const pc=colors[i%5];
            for(let p=0;p<petals;p++){
                const ang=(p/petals)*Math.PI*2+t*.05;
                ctx.beginPath();
                ctx.ellipse(
                    fx+Math.cos(ang)*fSize*.6+Math.sin(t*.2+i)*1,
                    fy-fSize*2.5+Math.sin(ang)*fSize*.6,
                    fSize*.4,fSize*.2,ang,0,Math.PI*2);
                ctx.fillStyle=rgba(pc[0],pc[1],pc[2],flowerAlpha);
                ctx.fill();
            }
            // Center
            ctx.beginPath();ctx.arc(fx+Math.sin(t*.2+i)*1,fy-fSize*2.5,fSize*.2,0,Math.PI*2);
            ctx.fillStyle=rgba(200,180,60,flowerAlpha);ctx.fill();
        } else if(type===2){
            // Low herb/ground cover
            const h=3+n1.n(i*1.4+3040)*3;
            for(let s=0;s<3;s++){
                const sx2=fx+n1.n(i*4+s*5+3050)*3;
                ctx.beginPath();ctx.moveTo(sx2,fy);
                ctx.quadraticCurveTo(sx2+Math.sin(t*.2+i+s)*1,fy-h*.6,sx2+Math.sin(t*.25+i+s)*1.5,fy-h);
                ctx.strokeStyle=rgba(18,42,14,lerp(.3,.1,nightBlend));ctx.lineWidth=.6;ctx.stroke();
            }
        } else {
            // Leaf litter
            const sz=1.5+n1.n(i*2+3060)*2;
            ctx.save();ctx.translate(fx,fy);ctx.rotate(n1.n(i*3+3070)*Math.PI);
            ctx.beginPath();ctx.ellipse(0,0,sz,sz*.35,0,0,Math.PI*2);
            const tone=n1.n(i*.7+3080);
            ctx.fillStyle=tone>.2?rgba(40+tone*10,28+tone*5,14,.08):rgba(18,28,14,.06);
            ctx.fill();ctx.restore();
        }
    }

    // === UNDERSTORY — shrubs, herbs, small fruit plants ===
    for(let i=0;i<12;i++){
        const sx2=(i/12)*W*1.15-W*.075+px+n1.n(i*3.8+3100)*35;
        const sy2=baseY+n1.n(i*2.5+3110)*4;
        const sh=8+n1.n(i*1.9+3120)*10;
        const sw2=5+n1.n(i*2.1+3130)*6;

        // Bush shape — multiple overlapping leaf masses
        for(let c=0;c<4;c++){
            const cx2=sx2+n1.n(i*5+c*3+3140)*sw2;
            const cy=sy2-sh*(0.3+c*.15)+n1.n(i*4+c*7+3150)*3;
            const cr=sw2*(0.3+n1.n(i*6+c*5+3160)*.2);
            ctx.beginPath();ctx.arc(cx2,cy,cr,0,Math.PI*2);
            const shade=n1.n(i*.2+c)*4;
            ctx.fillStyle=rgba(18+shade,42+shade*1.5+c*2,14+shade,lerp(.25,.1,nightBlend));
            ctx.fill();
        }

        // Small fruits on some bushes
        if(i%3===0){
            for(let f=0;f<3;f++){
                const frx=sx2+n1.n(i*7+f*4+3170)*sw2*.8;
                const fry=sy2-sh*.4+n1.n(i*6+f*6+3180)*sh*.3;
                ctx.beginPath();ctx.arc(frx,fry,1.5,0,Math.PI*2);
                const fruitColor=i%6===0?[180,50,40]:[200,160,40]; // red or yellow fruits
                ctx.fillStyle=rgba(fruitColor[0],fruitColor[1],fruitColor[2],lerp(.2,.08,nightBlend));
                ctx.fill();
            }
        }
    }

    // === MID-STORY — tree ferns, banana/plantain, small fruit trees ===
    // Tree ferns
    for(let i=0;i<6;i++){
        const x=((i/6)*W*1.1-W*.05)+px+n1.n(i*4.2+3200)*45;
        const y=baseY+n1.n(i*3+3210)*4;
        const h=25+n1.n(i*2+3220)*18;
        const sw=Math.sin(t*.18+i*.8)*2.5;
        ctx.beginPath();ctx.moveTo(x,y);ctx.quadraticCurveTo(x+sw*.4,y-h*.5,x+sw,y-h);
        ctx.strokeStyle=rgba(30,22,14,lerp(.35,.15,nightBlend));ctx.lineWidth=2.5;ctx.stroke();
        // Fronds
        const fc=5+Math.floor(n1.n(i*5+3230)*3);
        for(let f=0;f<fc;f++){
            const ang=(f/fc)*Math.PI*1.1-Math.PI*.55+n1.n(f*2+i*7+3235)*.25;
            const fLen=14+n1.n(f*3+i*5+3240)*10;
            const droop=.35+n1.n(f*2+3260)*.25;
            const fSw=Math.sin(t*.22+i+f*.35)*1.5;
            const ex2=x+sw+Math.cos(ang)*fLen+fSw;
            const ey=y-h+Math.sin(ang)*fLen+droop*fLen;
            ctx.beginPath();ctx.moveTo(x+sw,y-h);
            ctx.quadraticCurveTo(x+sw+Math.cos(ang)*fLen*.5+fSw*.5,y-h+Math.sin(ang)*fLen*.4,ex2,ey);
            ctx.strokeStyle=rgba(18,44,15,lerp(.32,.12,nightBlend));ctx.lineWidth=1;ctx.stroke();
            for(let p=1;p<=5;p++){
                const pt=p/6;const ppx=lerp(x+sw,ex2,pt);const ppy=lerp(y-h,ey,pt);
                const pLen=(1-pt)*5+1.5;
                for(const s of[-1,1]){
                    ctx.beginPath();ctx.moveTo(ppx,ppy);
                    ctx.lineTo(ppx+Math.cos(ang+s*.35)*pLen,ppy+Math.sin(ang+s*.35)*pLen+.8);
                    ctx.strokeStyle=rgba(16,40+pt*8,12,lerp(.2,.08,nightBlend));ctx.lineWidth=.5;ctx.stroke();
                }
            }
        }
    }

    // Banana/plantain plants
    for(let i=0;i<3;i++){
        const bx=W*(.15+i*.35)+px+n1.n(i*8+3300)*40;
        const by=baseY+n1.n(i*5+3310)*3;
        const bh=20+n1.n(i*3+3320)*12;

        // Pseudo-stem
        ctx.beginPath();ctx.moveTo(bx-2,by);ctx.lineTo(bx-1,by-bh);ctx.lineTo(bx+1,by-bh);ctx.lineTo(bx+2,by);
        ctx.fillStyle=rgba(35,50,25,lerp(.3,.12,nightBlend));ctx.fill();

        // Large leaves — the signature banana leaf shape
        for(let l=0;l<4;l++){
            const lAng=(l/4)*Math.PI*1.5-Math.PI*.75+n1.n(l*3+i*9+3330)*.4;
            const lLen=15+n1.n(l*4+i*7+3340)*8;
            const lSw=Math.sin(t*.15+i+l*.5)*3;
            const tipX=bx+Math.cos(lAng)*lLen+lSw;
            const tipY=by-bh+Math.sin(lAng)*lLen*0.6+lLen*.2;

            // Leaf blade (wide, elongated)
            ctx.beginPath();ctx.moveTo(bx,by-bh);
            ctx.bezierCurveTo(
                bx+Math.cos(lAng)*lLen*.3+Math.sin(lAng)*3+lSw*.3,
                by-bh+Math.sin(lAng)*lLen*.3-Math.cos(lAng)*3,
                bx+Math.cos(lAng)*lLen*.7+Math.sin(lAng)*2+lSw*.7,
                by-bh+Math.sin(lAng)*lLen*.6-Math.cos(lAng)*1.5+lLen*.1,
                tipX,tipY
            );
            ctx.bezierCurveTo(
                bx+Math.cos(lAng)*lLen*.7-Math.sin(lAng)*2+lSw*.7,
                by-bh+Math.sin(lAng)*lLen*.6+Math.cos(lAng)*1.5+lLen*.1,
                bx+Math.cos(lAng)*lLen*.3-Math.sin(lAng)*3+lSw*.3,
                by-bh+Math.sin(lAng)*lLen*.3+Math.cos(lAng)*3,
                bx,by-bh
            );
            ctx.fillStyle=rgba(14,38+l*3,10,lerp(.22,.08,nightBlend));
            ctx.fill();
            // Midrib
            ctx.beginPath();ctx.moveTo(bx,by-bh);ctx.lineTo(tipX,tipY);
            ctx.strokeStyle=rgba(18,45,14,lerp(.12,.04,nightBlend));ctx.lineWidth=.3;ctx.stroke();
        }
    }

    // Mossy rocks
    for(let i=0;i<4;i++){
        const rx=(n1.n(i*7+3400)*.5+.5)*W+px;
        const ry=baseY+1+n1.n(i*5+3410)*6;
        const w2=6+n1.n(i*3+3420)*7;const rh=3+n1.n(i*4+3430)*4;
        ctx.beginPath();
        for(let j=0;j<=8;j++){const a=(j/8)*Math.PI*2;const r=w2*(0.75+n1.n(i*10+j*3+3440)*.25);
            const p2x=rx+Math.cos(a)*r;const p2y=ry+Math.sin(a)*rh*(0.8+n1.n(i*10+j*5+3450)*.2);
            j===0?ctx.moveTo(p2x,p2y):ctx.lineTo(p2x,p2y);}
        ctx.closePath();ctx.fillStyle=rgba(30,28,23,lerp(.2,.1,nightBlend));ctx.fill();
        ctx.beginPath();ctx.ellipse(rx,ry-rh*.3,w2*.7,rh*.35,0,Math.PI,0);
        ctx.fillStyle=rgba(25,50,20,lerp(.16,.06,nightBlend));ctx.fill();
    }
}

// ===== FOREGROUND RAINFOREST TREES =====
function drawTree(ctx,bxF,tw,px2){
    const px=(smx-.5)*px2,py=(smy-.5)*px2*.1;
    const x=bxF*W+px;const lean=n1.n(bxF*10)*10;

    // Buttress roots
    for(let r=0;r<5;r++){
        const side=(r<3?-1:1)*(1+(r%3)*.5);
        const spread=tw*(1.8+r*.4);const rH=tw*(.6+n1.n(r*5+bxF*20)*.3);
        const rootY=H*.80;
        ctx.beginPath();ctx.moveTo(x+side*tw*.2,rootY-rH);
        ctx.bezierCurveTo(x+side*spread*.4,rootY-rH*.5,x+side*spread*.7,rootY-rH*.1,x+side*spread,rootY+3);
        ctx.lineTo(x+side*spread*.65,rootY+3);
        ctx.bezierCurveTo(x+side*spread*.45,rootY-rH*.05,x+side*spread*.25,rootY-rH*.3,x+side*tw*.15,rootY-rH*.5);
        ctx.closePath();ctx.fillStyle=rgba(8,6,2,.6);ctx.fill();
    }

    // Trunk
    ctx.beginPath();
    for(let y=H+10;y>=py-10;y-=2){
        const f=(H-y)/H;const taper=1-f*.28;const w=n1.n(y*.003+bxF*10)*2.5;
        ctx.lineTo(x+lean*f-tw*taper+w,y);}
    for(let y=py-10;y<=H+10;y+=2){
        const f=(H-y)/H;const taper=1-f*.28;const w=n1.n(y*.003+bxF*10)*2.5;
        ctx.lineTo(x+lean*f+tw*taper-w,y);}
    ctx.closePath();
    const bkG=ctx.createLinearGradient(x-tw*1.5,0,x+tw*1.5,0);
    bkG.addColorStop(0,rgba(3,2,1,1));bkG.addColorStop(.12,rgba(12,8,3,1));
    bkG.addColorStop(.35,rgba(22,15,6,1));bkG.addColorStop(.5,rgba(25,18,8,1));
    bkG.addColorStop(.65,rgba(20,13,5,1));bkG.addColorStop(.88,rgba(10,7,2,1));
    bkG.addColorStop(1,rgba(3,2,1,1));
    ctx.fillStyle=bkG;ctx.fill();

    // Bark
    for(let i=0;i<10;i++){
        const bxx=x+(i-5)*tw*.14+lean*.3;
        ctx.beginPath();for(let y=H;y>0;y-=5){const f2=(H-y)/H;
            ctx.lineTo(bxx+lean*f2+n1.fbm(y*.002+i*1.9+bxF*8,4)*3.5,y);}
        ctx.strokeStyle=rgba(2,1,0,.16+n1.n(i+bxF*5)*.05);ctx.lineWidth=.5+n1.n(i*.4)*.3;ctx.stroke();
    }

    // Epiphytes, moss, orchids
    for(let i=0;i<8;i++){
        const my2=H*(.1+i*.09);const f=(H-my2)/H;const lX=lean*f;
        const side=n1.n(i*4+bxF*10+100)>0?1:-1;
        const mx2=x+lX+side*tw*(.22+n1.n(i*2+110)*.18);
        for(let j=0;j<3;j++){
            ctx.beginPath();ctx.arc(mx2+n1.n(i*3+j*5+130)*tw*.12,my2+py+n1.n(i*3+j*7+140)*4,
                tw*(.06+n1.n(i*3+j*9+150)*.04),0,Math.PI*2);
            ctx.fillStyle=rgba(28+j*3,55+j*5,20,.1+j*.015);ctx.fill();
        }
        // Tiny orchid (occasional)
        if(i%4===2 && nightBlend < .5){
            ctx.beginPath();ctx.arc(mx2,my2+py-3,1.5,0,Math.PI*2);
            ctx.fillStyle=rgba(200,150,180,lerp(.12,.02,nightBlend));ctx.fill();
        }
    }

    // Vines
    const vc=2+Math.floor(n1.n(bxF*20+200)*1.5);
    for(let v=0;v<vc;v++){
        const bY2=H*(.12+v*.14+n1.n(v*3+bxF*15+210)*.06);
        const f=(H-bY2)/H;const lX=lean*f;
        const dir=bxF<.5?1:-1;const bSX=x+lX+tw*.35*dir+px;const bSY=bY2+py;
        const bLen=tw*(3.5+n1.n(v*5+bxF*20+220)*2.5);
        ctx.beginPath();ctx.moveTo(bSX,bSY);
        ctx.quadraticCurveTo(bSX+dir*bLen*.5,bSY-22,bSX+dir*bLen,bSY-12+n1.n(v*4+230)*18);
        ctx.strokeStyle=rgba(12,9,3,.7);ctx.lineWidth=tw*.15;ctx.lineCap='round';ctx.stroke();

        const vX=lerp(bSX,bSX+dir*bLen,.45+n1.n(v*7+240)*.3);
        const vY=bSY-10;const vLen=35+n1.n(v*6+250)*55;
        const vSw=Math.sin(t*.17+v*1.3)*4;
        ctx.beginPath();ctx.moveTo(vX,vY);
        ctx.bezierCurveTo(vX+vSw*.3,vY+vLen*.25,vX+vSw*.8,vY+vLen*.55,vX+vSw*.6,vY+vLen);
        ctx.strokeStyle=rgba(16,28,10,.28);ctx.lineWidth=1;ctx.stroke();
        for(let l=0;l<4;l++){
            const lt=(l+1)/5;
            ctx.beginPath();ctx.ellipse(vX+vSw*lt*.8+n1.n(l*3+v*10+260)*3,vY+vLen*lt,2.5,1.5,n1.n(l+v+270)*Math.PI*.5,0,Math.PI*2);
            ctx.fillStyle=rgba(12,36,9,.18);ctx.fill();
        }
    }
}

// ===== CANOPY =====
function drawCanopy(ctx){
    const px=(smx-.5)*30,py=(smy-.5)*15;
    const cd=dayNight([3,6,2],[1,2,1]);
    ctx.fillStyle=rgba(cd[0],cd[1],cd[2],1);ctx.fillRect(0,0,W,H*.05);
    const tG=ctx.createLinearGradient(0,0,0,H*.14);
    tG.addColorStop(0,rgba(cd[0],cd[1],cd[2],1));tG.addColorStop(1,'transparent');
    ctx.fillStyle=tG;ctx.fillRect(0,0,W,H*.14);

    const cls=[
        [-.05,.04,.32,.18,.97],[.08,.06,.25,.15,.94],[.20,.05,.18,.11,.90],[.29,.10,.14,.07,.82],
        [1.05,.04,.32,.18,.97],[.92,.06,.25,.15,.94],[.80,.05,.18,.11,.90],[.71,.10,.14,.07,.82],
        [.41,.05,.065,.035,.38],[.54,.04,.055,.028,.30],[.63,.07,.058,.030,.34],[.47,.09,.042,.022,.26],
    ];
    for(const[cx,cy,rx,ry,d]of cls){
        const gx=cx*W+px,gy=cy*H+py;
        const cc=dayNight([4,10,3],[1,3,1]);
        const g=ctx.createRadialGradient(gx,gy,0,gx,gy,rx*W);
        g.addColorStop(0,rgba(cc[0],cc[1],cc[2],d));g.addColorStop(.35,rgba(cc[0]+2,cc[1]+4,cc[2]+1,d*.7));
        g.addColorStop(.65,rgba(cc[0]+3,cc[1]+6,cc[2]+2,d*.3));g.addColorStop(1,'transparent');
        ctx.fillStyle=g;ctx.beginPath();ctx.ellipse(gx,gy,rx*W,ry*H,0,0,Math.PI*2);ctx.fill();
        if(rx>.06)for(let i=0;i<4;i++){
            const a=n1.n(cx*10+i*3.2)*Math.PI*2;
            const dist=rx*W*(.45+n1.n(cx*10+i*7.1)*.35);
            ctx.beginPath();ctx.arc(gx+Math.cos(a)*dist,gy+Math.sin(a)*dist*(ry/rx),rx*W*(.15+n1.n(cx*10+i*11)*.1),0,Math.PI*2);
            ctx.fillStyle=rgba(cc[0]+1,cc[1]+2,cc[2]+1,d*.5);ctx.fill();
        }
    }
    // Hanging leaves
    for(let i=0;i<30;i++){
        const lx=W*(.18+(i/30)*.64)+px+n1.n(i*1.1+1200)*38;
        const ly=H*(.04+n1.n(i*.65+1250)*.10)+py;
        const sw=Math.sin(t*.25+i*.45)*3.5;
        const len=8+n1.n(i*1.3+1260)*14;
        ctx.beginPath();ctx.moveTo(lx+sw,ly);
        ctx.bezierCurveTo(lx+sw+3,ly+len*.25,lx+sw+2,ly+len*.65,lx+sw+.5,ly+len);
        ctx.bezierCurveTo(lx+sw-2,ly+len*.65,lx+sw-3,ly+len*.25,lx+sw,ly);
        const lc=dayNight([9,26,7],[3,10,3]);
        ctx.fillStyle=rgba(lc[0],lc[1],lc[2],.2+n1.n(i*.3+1270)*.08);ctx.fill();
    }
}

// ===== LIGHT RAYS =====
function drawRays(ctx){
    const intensity=lerp(1,.15,nightBlend); // much dimmer at night
    ctx.globalCompositeOperation='screen';
    const rays=[{x:.37,a:3.5,w:38,ph:0},{x:.46,a:-1.2,w:26,ph:2},{x:.54,a:5.5,w:20,ph:4},{x:.41,a:.8,w:14,ph:1.5}];
    for(const r of rays){
        const int=clamp(.5+Math.sin(t*.2+r.ph)*.5)*.04*intensity;
        if(int<.002)continue;
        ctx.save();ctx.translate(r.x*W,0);ctx.rotate(r.a*Math.PI/180);
        const rc=dayNight([255,238,178],[100,120,180]);
        const g=ctx.createLinearGradient(0,0,0,H*.78);
        g.addColorStop(0,rgba(rc[0],rc[1],rc[2],int));
        g.addColorStop(.25,rgba(rc[0],rc[1],rc[2],int*.45));
        g.addColorStop(.55,rgba(rc[0],rc[1],rc[2],int*.1));
        g.addColorStop(1,'transparent');
        ctx.fillStyle=g;ctx.fillRect(-r.w/2,0,r.w,H*.78);ctx.restore();
    }
    ctx.globalCompositeOperation='source-over';
}

// ===== BUTTERFLIES (day) & FIREFLIES (night) =====
const butterflies=Array.from({length:12},(_,i)=>({
    x:.15+n1.n(i*3+4000)*.7,y:.3+n1.n(i*3.5+4050)*.4,
    ph:n1.n(i*4+4100)*Math.PI*2,sp:.08+n1.n(i*2+4150)*.15,
    sz:2+n1.n(i*5+4200)*2,
    col:[[200,140,60],[180,80,120],[100,140,200],[200,180,80],[160,100,180]][i%5],
    wingPhase:n1.n(i*6+4250)*Math.PI*2
}));

const fireflies=Array.from({length:12},(_,i)=>({
    x:.2+n1.n(i*3+4300)*.6,y:.25+n1.n(i*3.4+4350)*.45,
    ph:n1.n(i*4.1+4400)*Math.PI*2,sp:.1+n1.n(i*1.9+4450)*.22,
    sz:1.2+n1.n(i*4.8+4500)*1.5
}));

function drawCreatures(ctx){
    // BUTTERFLIES — only during day
    if(nightBlend<.7){
        const bAlpha=1-nightBlend*1.4;
        for(const b of butterflies){
            const x=b.x*W+Math.sin(t*b.sp+b.ph)*50;
            const y=b.y*H+Math.cos(t*b.sp*.7+b.ph+1)*30+Math.sin(t*b.sp*1.5+b.ph)*15;
            const wingBeat=Math.sin(t*6+b.wingPhase); // fast wing flapping

            ctx.save();ctx.translate(x,y);
            // Body
            ctx.beginPath();ctx.ellipse(0,0,b.sz*.2,b.sz*.6,0,0,Math.PI*2);
            ctx.fillStyle=rgba(30,20,10,bAlpha*.3);ctx.fill();

            // Wings — flapping
            const wingW=b.sz*1.2;const wingH=b.sz*.8;
            const flapScale=.3+Math.abs(wingBeat)*.7; // perspective flap

            for(const side of[-1,1]){
                ctx.beginPath();
                ctx.ellipse(side*wingW*.5*flapScale,-wingH*.2,wingW*.5*flapScale,wingH*.5,side*.2,0,Math.PI*2);
                ctx.fillStyle=rgba(b.col[0],b.col[1],b.col[2],bAlpha*.18);
                ctx.fill();
                // Inner wing pattern
                ctx.beginPath();
                ctx.ellipse(side*wingW*.35*flapScale,-wingH*.15,wingW*.25*flapScale,wingH*.3,side*.2,0,Math.PI*2);
                ctx.fillStyle=rgba(b.col[0]+30,b.col[1]+20,b.col[2]+10,bAlpha*.1);
                ctx.fill();
            }
            ctx.restore();
        }
    }

    // FIREFLIES — only at night
    if(nightBlend>.3){
        const fAlpha=clamp((nightBlend-.3)*1.4);
        for(const f of fireflies){
            const x=f.x*W+Math.sin(t*f.sp+f.ph)*35;
            const y=f.y*H+Math.cos(t*f.sp*.5+f.ph+1)*22;
            const b=clamp(Math.sin(t*.85+f.ph));

            if(b>.4){
                const g=ctx.createRadialGradient(x,y,0,x,y,f.sz*7);
                g.addColorStop(0,rgba(180,200,70,b*fAlpha*.4));
                g.addColorStop(.25,rgba(180,200,70,b*fAlpha*.08));
                g.addColorStop(1,'transparent');
                ctx.fillStyle=g;ctx.beginPath();ctx.arc(x,y,f.sz*7,0,Math.PI*2);ctx.fill();
                ctx.beginPath();ctx.arc(x,y,f.sz*.4,0,Math.PI*2);
                ctx.fillStyle=rgba(240,245,160,b*fAlpha*.85);ctx.fill();
            }
        }
    }

    // Dust motes (always, but dimmer at night)
    const dAlpha=lerp(1,.3,nightBlend);
    for(let i=0;i<35;i++){
        const dx=(.2+n1.n(i*1.5+4600)*.6)*W+Math.sin(t*(.03+n1.n(i*1.1+4650)*.15)*.55+n1.n(i*3.8+4700)*Math.PI*2)*28;
        const dy=((.2+n1.n(i*1.9+4750)*.55)*H+t*(.03+n1.n(i*1.1+4650)*.15)*3.5)%(H*.6)+H*.14;
        const v=(.05+n1.n(i*2.3+4800)*.1)*(.5+Math.sin(t*.7+n1.n(i*3.8+4700)*Math.PI*2)*.5)*dAlpha;
        if(v>.012){ctx.beginPath();ctx.arc(dx,dy,.3+n1.n(i*2.8+4850)*1.1,0,Math.PI*2);
            ctx.fillStyle=rgba(200,190,160,v);ctx.fill();}
    }
}

// ===== VIGNETTE =====
function drawVignette(ctx){
    const vc=dayNight([2,4,1],[1,1,2]);
    const v=ctx.createRadialGradient(W/2,H*.40,W*.16,W/2,H*.40,W*.72);
    v.addColorStop(0,'transparent');v.addColorStop(.45,'transparent');
    v.addColorStop(.75,rgba(vc[0],vc[1],vc[2],.25+nightBlend*.15));
    v.addColorStop(1,rgba(vc[0],vc[1],vc[2],.55+nightBlend*.2));
    ctx.fillStyle=v;ctx.fillRect(0,0,W,H);
    const b=ctx.createLinearGradient(0,H*.85,0,H);
    b.addColorStop(0,'transparent');b.addColorStop(1,rgba(vc[0],vc[1],vc[2],.35+nightBlend*.15));
    ctx.fillStyle=b;ctx.fillRect(0,H*.85,W,H*.15);
}

// ===== SKY =====
function drawSky(ctx){
    // Day sky gradient stops
    const dayStops=[[8,12,28],[18,25,48],[42,60,92],[90,110,135],[165,150,125],[215,140,80],[205,90,40],[125,45,22]];
    const nightStops=[[3,4,12],[5,6,18],[8,10,28],[12,15,38],[18,20,45],[15,18,40],[10,12,30],[6,8,20]];

    for(let y=0;y<H*.78;y++){
        const f=y/(H*.78);
        let idx=clamp(f*7,0,6.99);const lo=idx|0;const hi=Math.min(lo+1,7);const frac=idx-lo;
        const dc=lerpC(dayStops[lo],dayStops[hi],frac);
        const nc=lerpC(nightStops[lo],nightStops[hi],frac);
        const c=lerpC(dc,nc,nightBlend);
        const nv=n1.n(y*.006+100)*2;
        ctx.fillStyle=rgba(c[0]+nv,c[1]+nv*.4,c[2]-nv*.15);
        ctx.fillRect(0,y,W,1);
    }
}

function drawSunMoon(ctx){
    const sx=W*(.38+(smx-.5)*.012);
    // Day: sun, Night: moon
    if(nightBlend<.8){
        // Sun
        const sunAlpha=1-nightBlend*1.25;
        const sy=H*(.54+(smy-.5)*.006);
        for(let i=4;i>=0;i--){
            const r=(85+i*65);
            const g=ctx.createRadialGradient(sx,sy,0,sx,sy,r);
            g.addColorStop(0,rgba(255,245,215,(.032-i*.004)*sunAlpha));g.addColorStop(1,'transparent');
            ctx.fillStyle=g;ctx.beginPath();ctx.arc(sx,sy,r,0,Math.PI*2);ctx.fill();
        }
        const d=ctx.createRadialGradient(sx,sy,0,sx,sy,26);
        d.addColorStop(0,rgba(255,252,240,.75*sunAlpha));d.addColorStop(.3,rgba(255,235,180,.45*sunAlpha));
        d.addColorStop(.65,rgba(245,200,110,.12*sunAlpha));d.addColorStop(1,'transparent');
        ctx.fillStyle=d;ctx.beginPath();ctx.arc(sx,sy,26,0,Math.PI*2);ctx.fill();
    }
    if(nightBlend>.2){
        // Moon
        const moonAlpha=clamp((nightBlend-.2)*1.25);
        const my2=H*(.30+(smy-.5)*.006);
        const mx2=W*(.55+(smx-.5)*.012);
        // Moon glow
        for(let i=3;i>=0;i--){
            const r=(50+i*40);
            const g=ctx.createRadialGradient(mx2,my2,0,mx2,my2,r);
            g.addColorStop(0,rgba(180,195,220,(.02-i*.004)*moonAlpha));g.addColorStop(1,'transparent');
            ctx.fillStyle=g;ctx.beginPath();ctx.arc(mx2,my2,r,0,Math.PI*2);ctx.fill();
        }
        // Moon disc
        const md=ctx.createRadialGradient(mx2,my2,0,mx2,my2,18);
        md.addColorStop(0,rgba(230,235,245,.65*moonAlpha));
        md.addColorStop(.4,rgba(210,218,230,.45*moonAlpha));
        md.addColorStop(.8,rgba(180,190,210,.2*moonAlpha));
        md.addColorStop(1,'transparent');
        ctx.fillStyle=md;ctx.beginPath();ctx.arc(mx2,my2,18,0,Math.PI*2);ctx.fill();
        // Crescent shadow
        ctx.beginPath();ctx.arc(mx2+6,my2-2,14,0,Math.PI*2);
        ctx.fillStyle=rgba(8,10,20,.5*moonAlpha);ctx.fill();

        // Stars
        for(let i=0;i<60;i++){
            const stx=(n1.n(i*2.3+5000)*.5+.5)*W;
            const sty=(n1.n(i*3.1+5050)*.5+.5)*H*.45;
            const brightness=(.3+Math.sin(t*.5+i*1.7)*.3)*moonAlpha;
            if(brightness>.1&&sty<H*.4){
                ctx.beginPath();ctx.arc(stx,sty,.4+n1.n(i*4+5100)*.6,0,Math.PI*2);
                ctx.fillStyle=rgba(220,225,240,brightness*.3);ctx.fill();
            }
        }
    }
}

// ===== MAIN RENDER =====
function drawStatic(){
    bg.clearRect(0,0,W,H);
    drawSky(bg);
    drawSunMoon(bg);
    // Cirrus
    bg.globalAlpha=lerp(.03,.01,nightBlend);
    for(let i=0;i<4;i++){
        const cy=H*(.10+i*.06),cx=W*(.12+i*.22);
        bg.beginPath();for(let x=-140;x<140;x+=2){const ht=1-(x/140)**2;
            const y=cy+n1.fbm(x*.013+i*4.5,3)*5.5*ht;x===-140?bg.moveTo(cx+x,y):bg.lineTo(cx+x,y);}
        bg.strokeStyle=rgba(185,180,170,1);bg.lineWidth=5.5;bg.lineCap='round';bg.stroke();
    }
    bg.globalAlpha=1;

    // Hills with interleaved mist
    drawHill(bg,hillTextures[0],W*.28,W*.55,H*.15,H*.52,n1,1.2,4);
    drawMist(bg,H*.46,7,.065,.08,2.2,1.3,[162,178,195],5);
    drawWispy(bg,H*.44,3,.055,.022,5);
    drawHill(bg,hillTextures[1],W*.68,W*.48,H*.12,H*.56,n2,3.4,9);
    drawHill(bg,hillTextures[2],W*.40,W*.38,H*.09,H*.55,n2,4.1,10);
    drawMist(bg,H*.53,9,.10,.09,1.8,1.2,[178,192,200],10);
    drawWispy(bg,H*.51,4,.08,.03,8);
    drawHill(bg,hillTextures[3],W*.50,W*.65,H*.10,H*.62,n3,5.8,15);
    drawStream(bg);
    drawMist(bg,H*.63,11,.13,.10,1.9,1.4,[183,196,202],14);
    drawWispy(bg,H*.61,5,.11,.035,12);
    drawFoodForest(bg);
    drawTree(bg,.30,12,16);drawTree(bg,.68,10,16);
    drawTree(bg,.06,44,34);drawTree(bg,-.04,54,40);
    drawTree(bg,.90,40,34);drawTree(bg,1.04,48,40);
    drawCanopy(bg);
}

function drawAnimated(){
    fg.clearRect(0,0,W,H);
    drawMist(fg,H*.45,4,.07,.04,1.8,1,[160,175,192],5);
    drawMist(fg,H*.52,5,.11,.05,1.5,1.1,[175,190,198],10);
    drawMist(fg,H*.62,6,.14,.06,1.7,1.2,[180,195,200],14);
    drawWispy(fg,H*.48,2,.07,.015,6);drawWispy(fg,H*.58,3,.10,.02,10);
    drawRays(fg);
    drawCreatures(fg);
    drawVignette(fg);
}

let lastNB=-1;
function render(){
    t+=.016;
    // Smooth day/night transition
    const target=isNight?1:0;
    nightBlend=lerp(nightBlend,target,.015);
    smx=lerp(smx,mx,.018);smy=lerp(smy,my,.018);

    const moved=Math.abs(smx-psmx)>.001||Math.abs(smy-psmy)>.001;
    const nbChanged=Math.abs(nightBlend-lastNB)>.002;
    if(needsRedraw||moved||nbChanged){
        drawStatic();psmx=smx;psmy=smy;lastNB=nightBlend;needsRedraw=false;
    }
    drawAnimated();
    requestAnimationFrame(render);
}
genTextures();render();
</script>
