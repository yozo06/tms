<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WildArc — Coorg</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background: #040804; cursor: none; }
        canvas { display: block; position: fixed; top: 0; left: 0; }
        #bg { z-index: 0; }
        #fg { z-index: 1; }
        .brand {
            position: fixed; bottom: 9%; left: 50%; transform: translateX(-50%);
            text-align: center; z-index: 50; opacity: 0;
            animation: fadeIn 6s ease-out 3s forwards; pointer-events: none;
        }
        .brand h1 {
            font-family: Georgia, 'Times New Roman', serif;
            color: rgba(220, 208, 172, 0.65); font-size: 3rem;
            font-weight: 400; letter-spacing: 14px;
            text-shadow: 0 2px 30px rgba(0,0,0,0.8);
        }
        .brand p {
            color: rgba(190, 185, 165, 0.35); font-family: Georgia, serif;
            font-size: 0.75rem; letter-spacing: 7px; margin-top: 14px;
            text-transform: uppercase;
        }
        @keyframes fadeIn { to { opacity: 1; } }
    </style>
</head>
<body>
<canvas id="bg"></canvas>
<canvas id="fg"></canvas>
<div class="brand"><h1>wildarc</h1><p>Where nature leads, we follow</p></div>

<script>
// Two canvases: bg (static terrain, redrawn rarely) + fg (animated mist, particles, light)
const bgC = document.getElementById('bg');
const fgC = document.getElementById('fg');
const bg = bgC.getContext('2d');
const fg = fgC.getContext('2d');
let W, H;
let mx=0.5,my=0.5,smx=0.5,smy=0.5,prevSmx=0.5,prevSmy=0.5;
let t=0;
let needsRedraw = true;

function resize(){
    W=bgC.width=fgC.width=innerWidth;
    H=bgC.height=fgC.height=innerHeight;
    needsRedraw=true;
}
addEventListener('resize',resize);resize();
addEventListener('mousemove',e=>{mx=e.clientX/W;my=e.clientY/H;});

// ===== NOISE =====
class N{
    constructor(s=42){
        this.p=new Uint8Array(512);
        const pm=new Uint8Array(256);
        for(let i=0;i<256;i++)pm[i]=i;
        for(let i=255;i>0;i--){s=(s*16807)%2147483647;const j=s%(i+1);[pm[i],pm[j]]=[pm[j],pm[i]];}
        for(let i=0;i<512;i++)this.p[i]=pm[i&255];
    }
    f(t){return t*t*t*(t*(t*6-15)+10);}
    g(h,x){return(h&1)?-x:x;}
    g2(h,x,y){const u=(h&2)?y:x,v=(h&2)?x:y;return((h&1)?-u:u)+((h&4)?-v:v);}
    n(x){const X=Math.floor(x)&255,xf=x-Math.floor(x),u=this.f(xf);
        return this.g(this.p[X],xf)*(1-u)+this.g(this.p[X+1],xf-1)*u;}
    n2(x,y){
        const X=Math.floor(x)&255,Y=Math.floor(y)&255;
        const xf=x-Math.floor(x),yf=y-Math.floor(y);
        const u=this.f(xf),v=this.f(yf);
        const a=this.p[X]+Y,b=this.p[X+1]+Y;
        return(1-v)*((1-u)*this.g2(this.p[a],xf,yf)+u*this.g2(this.p[b],xf-1,yf))+
            v*((1-u)*this.g2(this.p[a+1],xf,yf-1)+u*this.g2(this.p[b+1],xf-1,yf-1));
    }
    fbm(x,o=6,l=2,g=0.5){let v=0,a=1,f=1,m=0;for(let i=0;i<o;i++){v+=this.n(x*f)*a;m+=a;a*=g;f*=l;}return v/m;}
    fbm2(x,y,o=5){let v=0,a=1,f=1,m=0;for(let i=0;i<o;i++){v+=this.n2(x*f,y*f)*a;m+=a;a*=0.5;f*=2;}return v/m;}
}
const n1=new N(137),n2=new N(283),n3=new N(419),n4=new N(557),n5=new N(691);

function rgba(r,g,b,a=1){return`rgba(${r|0},${g|0},${b|0},${a})`;}
function lerp(a,b,t){return a+(b-a)*t;}
function clamp(v,l=0,h=1){return Math.max(l,Math.min(h,v));}

// ===== PRE-COMPUTE TERRAIN TEXTURES =====
// Generate off-screen texture strips for hills using ImageData for pixel-level detail
function createTerrainTexture(width, height, config) {
    const cvs = document.createElement('canvas');
    cvs.width = width; cvs.height = height;
    const c = cvs.getContext('2d');
    const img = c.createImageData(width, height);
    const d = img.data;
    const { baseColors, noiseScale, noiseObj, seed, hazeR, hazeG, hazeB, hazeAmt, forestLine } = config;

    for (let y = 0; y < height; y++) {
        for (let x = 0; x < width; x++) {
            const i = (y * width + x) * 4;
            const nx = x / width, ny = y / height;

            // Multi-octave 2D noise for surface texture
            const tex = noiseObj.fbm2(nx * noiseScale + seed, ny * noiseScale * 2 + seed, 5);
            const tex2 = noiseObj.fbm2(nx * noiseScale * 3 + seed + 10, ny * noiseScale * 4 + seed + 10, 3);

            // Base color from gradient
            const bc = baseColors;
            let r = lerp(bc[0][0], bc[1][0], ny) + tex * 15 + tex2 * 8;
            let g = lerp(bc[0][1], bc[1][1], ny) + tex * 20 + tex2 * 10;
            let b = lerp(bc[0][2], bc[1][2], ny) + tex * 8 + tex2 * 5;

            // Forest canopy texture — dense foliage variation
            if (ny < (forestLine || 0.6)) {
                const foliage = noiseObj.fbm2(nx * 40 + seed, ny * 40 + seed, 4);
                const fDetail = noiseObj.fbm2(nx * 80 + seed + 5, ny * 80 + seed + 5, 3);
                // Clumps of darker and lighter greens
                r += foliage * 12 - 6 + fDetail * 5;
                g += foliage * 18 - 2 + fDetail * 8;
                b += foliage * 6 - 3;

                // Occasional darker shadows between trees
                if (fDetail < -0.3) {
                    r -= 8; g -= 5; b -= 3;
                }
                // Occasional highlights (canopy tops catching light)
                if (fDetail > 0.35 && ny < 0.3) {
                    r += 4; g += 8; b += 2;
                }
            }

            // Atmospheric haze blend
            r = lerp(r, hazeR, hazeAmt);
            g = lerp(g, hazeG, hazeAmt);
            b = lerp(b, hazeB, hazeAmt);

            d[i] = clamp(r, 0, 255);
            d[i+1] = clamp(g, 0, 255);
            d[i+2] = clamp(b, 0, 255);
            d[i+3] = 255;
        }
    }
    c.putImageData(img, 0, 0);
    return cvs;
}

// Pre-generate hill textures
let hillTextures = [];
function generateTextures() {
    const texW = Math.min(W, 800);
    const texH = 200;

    hillTextures = [
        // Hill 1 (far) — blue-grey, heavily hazed
        createTerrainTexture(texW, texH, {
            baseColors: [[75, 100, 115], [55, 80, 95]],
            noiseScale: 8, noiseObj: n1, seed: 1.5,
            hazeR: 155, hazeG: 175, hazeB: 198, hazeAmt: 0.35,
            forestLine: 0.7
        }),
        // Hill 2 (mid) — green, moderate haze
        createTerrainTexture(texW, texH, {
            baseColors: [[42, 68, 38], [28, 50, 24]],
            noiseScale: 10, noiseObj: n2, seed: 3.5,
            hazeR: 130, hazeG: 155, hazeB: 165, hazeAmt: 0.15,
            forestLine: 0.8
        }),
        // Hill 2b (mid-adjacent)
        createTerrainTexture(texW, texH, {
            baseColors: [[38, 62, 35], [25, 46, 22]],
            noiseScale: 10, noiseObj: n2, seed: 4.2,
            hazeR: 125, hazeG: 148, hazeB: 158, hazeAmt: 0.12,
            forestLine: 0.8
        }),
        // Hill 3 (near) — dark green, minimal haze
        createTerrainTexture(texW, texH, {
            baseColors: [[30, 55, 28], [18, 38, 16]],
            noiseScale: 12, noiseObj: n3, seed: 6.0,
            hazeR: 90, hazeG: 120, hazeB: 115, hazeAmt: 0.05,
            forestLine: 0.9
        }),
    ];
}

// ===== DRAW TEXTURED HILL =====
function getHillY(centerX, width, peak, nObj, seed, x, ox) {
    const nx = (x + ox - centerX) / width;
    const bell = Math.exp(-nx * nx * 2.2);
    const d = nObj.fbm(nx * 4.5 + seed, 6) * 0.35;
    return bell * (1 + d) * peak;
}

function drawTexturedHill(ctx, texture, centerX, width, peak, baseY, nObj, seed, parallax) {
    const ox = (smx - 0.5) * parallax;
    const oy = (smy - 0.5) * parallax * 0.18;

    // Find the visible profile
    const step = 2;
    const points = [];
    let minY = baseY;
    for (let x = -20; x <= W + 20; x += step) {
        const h = getHillY(centerX, width, peak, nObj, seed, x, ox);
        const y = baseY - h + oy;
        points.push({x, y});
        if (y < minY) minY = y;
    }

    // Clip to hill shape
    ctx.save();
    ctx.beginPath();
    ctx.moveTo(-20, H);
    for (const p of points) ctx.lineTo(p.x, p.y);
    ctx.lineTo(W + 20, H);
    ctx.closePath();
    ctx.clip();

    // Draw the texture stretched to fit the hill area
    const texH = baseY - minY + 40;
    ctx.drawImage(texture, -20 + ox * 0.3, minY - 5, W + 40, texH + 20);

    // Add ridge highlight (light catching the top edge)
    ctx.beginPath();
    for (let i = 0; i < points.length; i++) {
        i === 0 ? ctx.moveTo(points[i].x, points[i].y) : ctx.lineTo(points[i].x, points[i].y);
    }
    ctx.strokeStyle = rgba(180, 195, 175, 0.06);
    ctx.lineWidth = 2;
    ctx.stroke();

    // Add shadow on the north-facing slopes
    ctx.beginPath();
    ctx.moveTo(-20, H);
    for (const p of points) ctx.lineTo(p.x, p.y);
    ctx.lineTo(W + 20, H);
    ctx.closePath();
    // Gradient shadow from top
    const shGrad = ctx.createLinearGradient(0, minY, 0, minY + texH * 0.4);
    shGrad.addColorStop(0, 'transparent');
    shGrad.addColorStop(0.5, rgba(0, 5, 0, 0.08));
    shGrad.addColorStop(1, rgba(0, 5, 0, 0.15));
    ctx.fillStyle = shGrad;
    ctx.fill();

    ctx.restore();
    return points;
}

// ===== RIVER =====
function drawRiver(ctx) {
    const ox = (smx - 0.5) * 14;
    const oy = (smy - 0.5) * 5;
    const rY = H * 0.665;
    const rW = 16;

    // River banks with earth and stone texture
    for (let bank = 0; bank < 2; bank++) {
        const side = bank === 0 ? -1 : 1;
        ctx.beginPath();
        for (let x = -50; x <= W + 50; x += 3) {
            const nx = x / W;
            const curve = n1.fbm(nx * 2.5 + 18, 4) * 20;
            const y = rY + curve + oy + side * rW * (0.55 + n1.n(nx * 10 + bank * 5 + 30) * 0.15);
            x === -50 ? ctx.moveTo(x + ox, y) : ctx.lineTo(x + ox, y);
        }
        for (let x = W + 50; x >= -50; x -= 3) {
            const nx = x / W;
            const curve = n1.fbm(nx * 2.5 + 18, 4) * 20;
            const y = rY + curve + oy + side * rW * (0.85 + n1.n(nx * 8 + bank * 7 + 40) * 0.2);
            ctx.lineTo(x + ox, y);
        }
        ctx.closePath();
        // Sandy/earthy bank
        const bankGrad = ctx.createLinearGradient(0, rY - rW, 0, rY + rW);
        bankGrad.addColorStop(0, rgba(55, 50, 35, 0.4));
        bankGrad.addColorStop(0.5, rgba(45, 42, 30, 0.35));
        bankGrad.addColorStop(1, rgba(30, 40, 22, 0.3));
        ctx.fillStyle = bankGrad;
        ctx.fill();
    }

    // Water — multiple passes for depth
    // Deep channel (dark blue-green center)
    for (let pass = 0; pass < 5; pass++) {
        const wScale = [1.0, 0.82, 0.6, 0.38, 0.18][pass];
        const alpha = [0.18, 0.15, 0.2, 0.15, 0.08][pass];
        const colors = [
            [50, 80, 95],   // outer edge — shallow
            [45, 75, 92],
            [35, 65, 88],   // mid
            [40, 72, 95],   // deep with slight reflection
            [80, 120, 145], // bright center reflection
        ][pass];

        ctx.beginPath();
        for (let x = -50; x <= W + 50; x += 2) {
            const nx = x / W;
            const curve = n1.fbm(nx * 2.5 + 18, 4) * 20;
            const wave = Math.sin(nx * 18 + t * 0.3 + pass * 0.7) * 1.2;
            const y = rY + curve + wave + oy;
            x === -50 ? ctx.moveTo(x+ox, y - rW * wScale * 0.5) : ctx.lineTo(x+ox, y - rW * wScale * 0.5);
        }
        for (let x = W + 50; x >= -50; x -= 2) {
            const nx = x / W;
            const curve = n1.fbm(nx * 2.5 + 18, 4) * 20;
            const wave = Math.sin(nx * 18 + t * 0.3 + pass * 0.7 + 0.5) * 1.0;
            ctx.lineTo(x+ox, rY + curve + wave + oy + rW * wScale * 0.5);
        }
        ctx.closePath();
        ctx.fillStyle = rgba(colors[0], colors[1], colors[2], alpha);
        ctx.fill();
    }

    // Rocks — varied sizes, some submerged, some exposed
    const rocks = [];
    for (let i = 0; i < 20; i++) {
        const rx = (n1.n(i * 3.7 + 500) * 0.5 + 0.5) * W;
        const nx = rx / W;
        const curve = n1.fbm(nx * 2.5 + 18, 4) * 20;
        const ry = rY + curve + oy;
        const sz = 2 + n1.n(i * 2.3 + 550) * 4;
        const exposed = n1.n(i * 1.9 + 580);
        rocks.push({x: rx + ox, y: ry, sz, exposed});

        if (exposed > -0.15) {
            // Main rock body
            ctx.beginPath();
            // Irregular shape using multiple arcs
            const pts = 8;
            for (let j = 0; j <= pts; j++) {
                const angle = (j / pts) * Math.PI * 2;
                const r = sz * (0.7 + n1.n(i * 5 + j * 3 + 600) * 0.35);
                const px = rx + ox + Math.cos(angle) * r;
                const py = ry - sz * 0.25 + Math.sin(angle) * r * 0.45;
                j === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
            }
            ctx.closePath();

            // Rock color with surface variation
            const rockBase = 35 + n1.n(i * 1.5 + 620) * 18;
            const rockGrad = ctx.createLinearGradient(rx + ox, ry - sz, rx + ox, ry + sz * 0.3);
            rockGrad.addColorStop(0, rgba(rockBase + 12, rockBase + 8, rockBase, 0.65));
            rockGrad.addColorStop(0.5, rgba(rockBase, rockBase - 5, rockBase - 8, 0.6));
            rockGrad.addColorStop(1, rgba(rockBase - 10, rockBase - 12, rockBase - 15, 0.5));
            ctx.fillStyle = rockGrad;
            ctx.fill();

            // Wet sheen on top
            ctx.beginPath();
            ctx.ellipse(rx + ox, ry - sz * 0.35, sz * 0.5, sz * 0.15, -0.2, 0, Math.PI * 2);
            ctx.fillStyle = rgba(140, 165, 180, 0.1);
            ctx.fill();

            // Moss on rock
            if (exposed > 0.2) {
                ctx.beginPath();
                ctx.ellipse(rx + ox - sz * 0.15, ry - sz * 0.2, sz * 0.35, sz * 0.15, 0, Math.PI, 0);
                ctx.fillStyle = rgba(30, 55, 25, 0.2);
                ctx.fill();
            }
        }

        // Water ripples around all rocks
        for (let r = 0; r < 2; r++) {
            ctx.beginPath();
            ctx.ellipse(rx + ox + sz * 0.3 * (r + 1), ry + r * 2, sz * (1.2 + r * 0.5), sz * 0.2, 0.15, 0, Math.PI * 2);
            ctx.strokeStyle = rgba(120, 155, 175, 0.06 - r * 0.02);
            ctx.lineWidth = 0.6;
            ctx.stroke();
        }
    }

    // Water surface — moving highlights
    ctx.globalCompositeOperation = 'screen';
    for (let i = 0; i < 35; i++) {
        const gx = ((i * 43 + t * 4.5) % (W + 80)) - 40 + ox;
        const nx = gx / W;
        const curve = n1.fbm(nx * 2.5 + 18, 4) * 20;
        const gy = rY + curve + oy + (n1.n(i * 2.1 + 700) * rW * 0.3);
        const gl = Math.sin(t * 2.2 + i * 1.7 + nx * 5) * 0.5 + 0.5;
        if (gl > 0.55) {
            const streak = 2 + n1.n(i * 1.4 + 710) * 3;
            ctx.beginPath();
            ctx.ellipse(gx, gy, streak, 0.5, n1.n(i + 720) * 0.5, 0, Math.PI * 2);
            ctx.fillStyle = rgba(190, 215, 240, (gl - 0.55) * 0.35);
            ctx.fill();
        }
    }
    ctx.globalCompositeOperation = 'source-over';

    // Bank vegetation
    for (let i = 0; i < 35; i++) {
        const vx = (n1.n(i * 2.0 + 750) * 0.5 + 0.5) * W + ox;
        const nx = vx / W;
        const curve = n1.fbm(nx * 2.5 + 18, 4) * 20;
        const side = i % 2 === 0 ? -1 : 1;
        const vy = rY + curve + oy + side * rW * (0.65 + n1.n(i * 1.3 + 770) * 0.25);
        const h = 4 + n1.n(i * 1.5 + 780) * 5;

        // Reed/grass clump
        const blades = 3 + Math.floor(n1.n(i * 3 + 790) * 2 + 2);
        for (let b = 0; b < blades; b++) {
            const bx = vx + n1.n(i * 4 + b * 7 + 800) * 4;
            const sway = Math.sin(t * 0.25 + i * 0.4 + b * 0.3) * 2;
            ctx.beginPath(); ctx.moveTo(bx, vy);
            ctx.quadraticCurveTo(bx + sway * 0.5, vy - h * 0.6, bx + sway, vy - h);
            ctx.strokeStyle = rgba(18 + b * 2, 38 + b * 4, 14, 0.3);
            ctx.lineWidth = 0.7;
            ctx.stroke();
        }
    }
}

// ===== MIST =====
function drawMist(ctx, baseY, count, speed, maxA, sx, sy, col, parallax) {
    const drift = t * speed;
    const ox = (smx - 0.5) * parallax;
    for (let i = 0; i < count; i++) {
        const sd = i * 3.7 + 0.5;
        const x = ((n1.n(sd) * W * 1.9 + drift * 20 + ox) % (W * 2.4)) - W * 0.7;
        const yOff = n1.fbm(drift * 0.035 + sd, 2) * 22;
        const y = baseY + yOff + n1.n(sd + 100) * 18;
        const rx = (110 + n1.n(sd + 200) * 100) * sx;
        const ry = (18 + n1.n(sd + 300) * 14) * sy;
        const alpha = maxA * (0.35 + n1.fbm(drift * 0.05 + sd, 2) * 0.65);

        for (let p = 2; p >= 0; p--) {
            const pr = 1 + p * 0.3;
            const a = alpha * (1 - p * 0.25);
            const g = ctx.createRadialGradient(x, y, 0, x, y, rx * pr);
            g.addColorStop(0, rgba(col[0], col[1], col[2], a));
            g.addColorStop(0.3, rgba(col[0], col[1], col[2], a * 0.6));
            g.addColorStop(0.6, rgba(col[0]+5, col[1]+5, col[2]+5, a * 0.2));
            g.addColorStop(1, 'transparent');
            ctx.fillStyle = g;
            ctx.beginPath(); ctx.ellipse(x, y, rx * pr, ry * pr, n1.n(sd + 400) * 0.2, 0, Math.PI * 2);
            ctx.fill();
        }
    }
}

function drawWispyMist(ctx, baseY, count, speed, alpha, parallax) {
    const drift = t * speed;
    const ox = (smx - 0.5) * parallax;
    for (let i = 0; i < count; i++) {
        const sd = i * 5.1 + 77;
        const sx = ((n1.n(sd) * W * 2 + drift * 16 + ox) % (W * 1.7)) - W * 0.35;
        const y = baseY + n1.n(sd + 50) * 22;
        const len = 100 + n1.n(sd + 80) * 120;

        ctx.beginPath();
        for (let x = 0; x < len; x += 2) {
            const py = y + n1.fbm((sx + x) * 0.003 + sd + drift * 0.012, 4) * 10;
            x === 0 ? ctx.moveTo(sx + x, py) : ctx.lineTo(sx + x, py);
        }
        ctx.strokeStyle = rgba(188, 198, 205, alpha);
        ctx.lineWidth = 1.5 + n1.n(sd + 90) * 3;
        ctx.lineCap = 'round';
        // Use shadow for blur effect instead of filter (better performance)
        ctx.shadowColor = rgba(190, 200, 208, alpha * 0.5);
        ctx.shadowBlur = 6;
        ctx.stroke();
        ctx.shadowBlur = 0;
    }
}

// ===== RAINFOREST FLOOR =====
function drawFloor(ctx) {
    const baseY = H * 0.775;
    const px = (smx - 0.5) * 28;

    const g = ctx.createLinearGradient(0, baseY - 20, 0, H);
    g.addColorStop(0, 'rgba(14,28,12,0)');
    g.addColorStop(0.025, rgba(20, 36, 16, 1));
    g.addColorStop(0.08, rgba(14, 26, 11, 1));
    g.addColorStop(0.3, rgba(8, 15, 6, 1));
    g.addColorStop(1, rgba(3, 7, 2, 1));
    ctx.fillStyle = g;
    ctx.fillRect(0, baseY - 20, W, H - baseY + 20);

    // Pixel-noise ground texture
    const groundData = ctx.getImageData(0, Math.max(0, baseY|0), W, Math.min(60, H - baseY));
    const gd = groundData.data;
    for (let i = 0; i < gd.length; i += 4) {
        const px2 = ((i / 4) % W);
        const py2 = ((i / 4) / W) | 0;
        const tex = n4.fbm2(px2 * 0.02, py2 * 0.04, 3) * 6;
        gd[i] = clamp(gd[i] + tex, 0, 255);
        gd[i+1] = clamp(gd[i+1] + tex * 1.2, 0, 255);
        gd[i+2] = clamp(gd[i+2] + tex * 0.5, 0, 255);
    }
    ctx.putImageData(groundData, 0, Math.max(0, baseY|0));

    // Leaf litter
    for (let i = 0; i < 60; i++) {
        const x = (n1.n(i * 1.1 + 200) * 0.5 + 0.5) * W * 1.15 - W * 0.075 + px;
        const y = baseY + 2 + (n1.n(i * 1.5 + 300) * 0.5 + 0.5) * 25;
        const sz = 1.5 + n1.n(i * 2 + 400) * 2.5;
        const rot = n1.n(i * 3 + 450) * Math.PI;
        const tone = n1.n(i * 0.7 + 470);

        ctx.save(); ctx.translate(x, y); ctx.rotate(rot);
        ctx.beginPath(); ctx.ellipse(0, 0, sz, sz * 0.35, 0, 0, Math.PI * 2);
        ctx.fillStyle = tone > 0.2
            ? rgba(42 + tone * 12, 30 + tone * 6, 16, 0.1)
            : tone > -0.2
            ? rgba(25, 35, 18, 0.08)
            : rgba(18, 15, 10, 0.06);
        ctx.fill();
        ctx.restore();
    }

    // TREE FERNS — signature Coorg understory
    for (let i = 0; i < 7; i++) {
        const x = (i / 7) * W * 1.15 - W * 0.075 + px + n1.n(i * 4.2 + 800) * 45;
        const y = baseY + n1.n(i * 3 + 810) * 4;
        const h = 28 + n1.n(i * 2 + 820) * 18;
        const sw = Math.sin(t * 0.18 + i * 0.8) * 2.5;

        // Fibrous trunk
        ctx.beginPath(); ctx.moveTo(x, y);
        ctx.quadraticCurveTo(x + sw * 0.4, y - h * 0.5, x + sw, y - h);
        ctx.strokeStyle = rgba(32, 24, 16, 0.35);
        ctx.lineWidth = 2.5;
        ctx.stroke();
        // Trunk texture
        for (let tt = 0; tt < 3; tt++) {
            ctx.beginPath(); ctx.moveTo(x + tt * 0.8 - 0.8, y);
            ctx.quadraticCurveTo(x + sw * 0.4 + tt * 0.5 - 0.5, y - h * 0.5, x + sw + tt * 0.3, y - h);
            ctx.strokeStyle = rgba(22, 16, 10, 0.12);
            ctx.lineWidth = 0.4; ctx.stroke();
        }

        // Fronds
        const fc = 5 + Math.floor(n1.n(i * 5 + 830) * 3);
        for (let f = 0; f < fc; f++) {
            const angle = (f / fc) * Math.PI * 1.1 - Math.PI * 0.55 + n1.n(f * 2 + i * 7 + 835) * 0.25;
            const fLen = 14 + n1.n(f * 3 + i * 5 + 840) * 10;
            const droop = 0.35 + n1.n(f * 2 + 860) * 0.25;
            const fSw = Math.sin(t * 0.22 + i + f * 0.35) * 1.5;

            const sx = x + sw, sy = y - h;
            const ex = sx + Math.cos(angle) * fLen + fSw;
            const ey = sy + Math.sin(angle) * fLen + droop * fLen;

            ctx.beginPath(); ctx.moveTo(sx, sy);
            ctx.quadraticCurveTo(sx + Math.cos(angle) * fLen * 0.5 + fSw * 0.5, sy + Math.sin(angle) * fLen * 0.4, ex, ey);
            ctx.strokeStyle = rgba(18, 44, 15, 0.32);
            ctx.lineWidth = 1;
            ctx.stroke();

            // Pinnae
            for (let p = 1; p <= 5; p++) {
                const pt = p / 6;
                const ppx = lerp(sx, ex, pt);
                const ppy = lerp(sy, ey, pt);
                const pLen = (1 - pt) * 5 + 1.5;
                for (const s of [-1, 1]) {
                    const pa = angle + s * 0.35;
                    ctx.beginPath(); ctx.moveTo(ppx, ppy);
                    ctx.lineTo(ppx + Math.cos(pa) * pLen, ppy + Math.sin(pa) * pLen + 0.8);
                    ctx.strokeStyle = rgba(16, 40 + pt * 8, 12, 0.2);
                    ctx.lineWidth = 0.5; ctx.stroke();
                }
            }
        }
    }

    // Ground ferns, small palms, moss rocks
    for (let i = 0; i < 15; i++) {
        const x = (i / 15) * W * 1.2 - W * 0.1 + px;
        const y = baseY + n1.n(i * 0.55 + 950) * 5;
        const h = 10 + n1.n(i * 0.75 + 960) * 10;
        const sw = Math.sin(t * 0.25 + i * 0.55) * 1.8;

        ctx.beginPath(); ctx.moveTo(x, y);
        ctx.quadraticCurveTo(x + sw, y - h * 0.5, x + sw * 1.5, y - h);
        ctx.strokeStyle = rgba(18, 42, 14, 0.35);
        ctx.lineWidth = 0.7; ctx.stroke();

        for (let j = 1; j < 5; j++) {
            const ft = j / 5;
            const fx = lerp(x, x + sw * 1.5, ft);
            const fy = lerp(y, y - h, ft);
            const lLen = (1 - ft) * 6 + 1;
            for (const s of [-1, 1]) {
                ctx.beginPath(); ctx.moveTo(fx, fy);
                ctx.quadraticCurveTo(fx + s * lLen * 0.5, fy - 0.5, fx + s * lLen, fy + 1);
                ctx.strokeStyle = rgba(20, 45, 16, 0.2);
                ctx.lineWidth = 0.5; ctx.stroke();
            }
        }
    }

    // Mossy rocks
    for (let i = 0; i < 4; i++) {
        const rx = (n1.n(i * 7 + 1000) * 0.5 + 0.5) * W + px;
        const ry = baseY + 1 + n1.n(i * 5 + 1010) * 6;
        const w = 7 + n1.n(i * 3 + 1020) * 8;
        const rh = 4 + n1.n(i * 4 + 1030) * 5;

        // Irregular rock
        ctx.beginPath();
        for (let j = 0; j <= 8; j++) {
            const a = (j / 8) * Math.PI * 2;
            const r = (j % 2 === 0 ? w : w * 0.85) * (0.8 + n1.n(i * 10 + j * 3) * 0.2);
            const px2 = rx + Math.cos(a) * r;
            const py = ry + Math.sin(a) * rh * (0.8 + n1.n(i * 10 + j * 5) * 0.2);
            j === 0 ? ctx.moveTo(px2, py) : ctx.lineTo(px2, py);
        }
        ctx.closePath();
        ctx.fillStyle = rgba(32, 30, 25, 0.22);
        ctx.fill();
        // Moss
        ctx.beginPath();
        ctx.ellipse(rx, ry - rh * 0.3, w * 0.7, rh * 0.35, 0, Math.PI, 0);
        ctx.fillStyle = rgba(28, 52, 22, 0.18);
        ctx.fill();
    }
}

// ===== RAINFOREST TREES =====
function drawTree(ctx, bx, tw, parallax) {
    const px = (smx - 0.5) * parallax;
    const py = (smy - 0.5) * parallax * 0.1;
    const x = bx * W + px;
    const lean = n1.n(bx * 10) * 10;

    // BUTTRESS ROOTS
    for (let r = 0; r < 5; r++) {
        const side = (r < 3 ? -1 : 1) * (1 + (r % 3) * 0.5);
        const spread = tw * (1.8 + r * 0.4);
        const rH = tw * (0.6 + n1.n(r * 5 + bx * 20) * 0.3);
        const rootY = H * 0.80;

        ctx.beginPath();
        ctx.moveTo(x + side * tw * 0.2, rootY - rH);
        ctx.bezierCurveTo(
            x + side * spread * 0.4, rootY - rH * 0.5,
            x + side * spread * 0.7, rootY - rH * 0.1,
            x + side * spread, rootY + 3
        );
        ctx.lineTo(x + side * spread * 0.65, rootY + 3);
        ctx.bezierCurveTo(
            x + side * spread * 0.45, rootY - rH * 0.05,
            x + side * spread * 0.25, rootY - rH * 0.3,
            x + side * tw * 0.15, rootY - rH * 0.5
        );
        ctx.closePath();
        ctx.fillStyle = rgba(10, 7, 3, 0.65);
        ctx.fill();
    }

    // TRUNK
    ctx.beginPath();
    for (let y = H + 10; y >= py - 10; y -= 2) {
        const f = (H - y) / H;
        const taper = 1 - f * 0.28;
        const w = n1.n(y * 0.003 + bx * 10) * 2.5;
        ctx.lineTo(x + lean * f - tw * taper + w, y);
    }
    for (let y = py - 10; y <= H + 10; y += 2) {
        const f = (H - y) / H;
        const taper = 1 - f * 0.28;
        const w = n1.n(y * 0.003 + bx * 10) * 2.5;
        ctx.lineTo(x + lean * f + tw * taper - w, y);
    }
    ctx.closePath();

    const barkG = ctx.createLinearGradient(x - tw * 1.5, 0, x + tw * 1.5, 0);
    barkG.addColorStop(0, rgba(4, 2, 1, 1));
    barkG.addColorStop(0.12, rgba(14, 9, 4, 1));
    barkG.addColorStop(0.35, rgba(24, 17, 7, 1));
    barkG.addColorStop(0.5, rgba(28, 20, 9, 1));
    barkG.addColorStop(0.65, rgba(22, 15, 6, 1));
    barkG.addColorStop(0.88, rgba(12, 8, 3, 1));
    barkG.addColorStop(1, rgba(4, 2, 1, 1));
    ctx.fillStyle = barkG;
    ctx.fill();

    // Bark grooves
    for (let i = 0; i < 12; i++) {
        const bxx = x + (i - 6) * tw * 0.14 + lean * 0.3;
        ctx.beginPath();
        for (let y = H; y > 0; y -= 5) {
            const f = (H - y) / H;
            const w = n1.fbm(y * 0.002 + i * 1.9 + bx * 8, 4) * 3.5;
            y === H ? ctx.moveTo(bxx + lean * f + w, y) : ctx.lineTo(bxx + lean * f + w, y);
        }
        ctx.strokeStyle = rgba(3, 2, 0, 0.18 + n1.n(i + bx * 5) * 0.06);
        ctx.lineWidth = 0.5 + n1.n(i * 0.4) * 0.3;
        ctx.stroke();
    }

    // EPIPHYTES — orchids, ferns, moss
    for (let i = 0; i < 10; i++) {
        const my = H * (0.08 + i * 0.08);
        const f = (H - my) / H;
        const lX = lean * f;
        const side = n1.n(i * 4 + bx * 10 + 100) > 0 ? 1 : -1;
        const mx = x + lX + side * tw * (0.22 + n1.n(i * 2 + 110) * 0.18);

        // Moss blob
        for (let j = 0; j < 3; j++) {
            const jx = mx + n1.n(i * 3 + j * 5 + 130) * tw * 0.12;
            const jy = my + py + n1.n(i * 3 + j * 7 + 140) * 4;
            ctx.beginPath();
            ctx.arc(jx, jy, tw * (0.06 + n1.n(i * 3 + j * 9 + 150) * 0.04), 0, Math.PI * 2);
            ctx.fillStyle = rgba(28 + j * 3, 55 + j * 5, 20, 0.1 + j * 0.015);
            ctx.fill();
        }

        // Epiphytic fern (every 3rd)
        if (i % 3 === 1) {
            const fh = 6 + n1.n(i * 3 + 160) * 4;
            for (let f2 = 0; f2 < 3; f2++) {
                const a = (f2 / 3) * Math.PI * 0.6 - Math.PI * 0.3;
                ctx.beginPath(); ctx.moveTo(mx, my + py);
                ctx.quadraticCurveTo(
                    mx + side * Math.cos(a) * fh * 0.5,
                    my + py + Math.sin(a) * fh * 0.5,
                    mx + side * Math.cos(a) * fh,
                    my + py + Math.sin(a) * fh + fh * 0.15
                );
                ctx.strokeStyle = rgba(16, 42, 13, 0.2);
                ctx.lineWidth = 0.6; ctx.stroke();
            }
        }
    }

    // VINES / LIANAS
    const vc = 2 + Math.floor(n1.n(bx * 20 + 200) * 1.5);
    for (let v = 0; v < vc; v++) {
        const bY = H * (0.12 + v * 0.14 + n1.n(v * 3 + bx * 15 + 210) * 0.06);
        const f = (H - bY) / H;
        const lX = lean * f;
        const dir = bx < 0.5 ? 1 : -1;
        const bSX = x + lX + tw * 0.35 * dir + px;
        const bSY = bY + py;

        // Branch
        const bLen = tw * (3.5 + n1.n(v * 5 + bx * 20 + 220) * 2.5);
        ctx.beginPath(); ctx.moveTo(bSX, bSY);
        const bEX = bSX + dir * bLen;
        const bEY = bSY - 12 + n1.n(v * 4 + 230) * 18;
        ctx.quadraticCurveTo(bSX + dir * bLen * 0.5, bSY - 22, bEX, bEY);
        ctx.strokeStyle = rgba(14, 10, 4, 0.75);
        ctx.lineWidth = tw * 0.15;
        ctx.lineCap = 'round';
        ctx.stroke();

        // Hanging vine
        const vX = lerp(bSX, bEX, 0.45 + n1.n(v * 7 + 240) * 0.3);
        const vY = lerp(bSY, bEY, 0.4) - 8;
        const vLen = 35 + n1.n(v * 6 + 250) * 55;
        const vSw = Math.sin(t * 0.17 + v * 1.3) * 4;

        ctx.beginPath(); ctx.moveTo(vX, vY);
        ctx.bezierCurveTo(vX + vSw * 0.3, vY + vLen * 0.25, vX + vSw * 0.8, vY + vLen * 0.55, vX + vSw * 0.6, vY + vLen);
        ctx.strokeStyle = rgba(18, 30, 10, 0.3);
        ctx.lineWidth = 1;
        ctx.stroke();

        // Vine leaves
        for (let l = 0; l < 4; l++) {
            const lt = (l + 1) / 5;
            const lx = vX + vSw * lt * 0.8;
            const ly = vY + vLen * lt;
            ctx.beginPath();
            ctx.ellipse(lx + n1.n(l * 3 + v * 10 + 260) * 3, ly, 2.5, 1.5, n1.n(l + v + 270) * Math.PI * 0.5, 0, Math.PI * 2);
            ctx.fillStyle = rgba(14, 38, 10, 0.2);
            ctx.fill();
        }
    }
}

// ===== CANOPY =====
function drawCanopy(ctx) {
    const px = (smx - 0.5) * 30;
    const py = (smy - 0.5) * 15;

    ctx.fillStyle = rgba(3, 6, 2, 1);
    ctx.fillRect(0, 0, W, H * 0.05);

    const tG = ctx.createLinearGradient(0, 0, 0, H * 0.14);
    tG.addColorStop(0, rgba(3, 6, 2, 1));
    tG.addColorStop(1, 'transparent');
    ctx.fillStyle = tG;
    ctx.fillRect(0, 0, W, H * 0.14);

    // Dense clusters with organic sub-blobs
    const cls = [
        [-0.05, 0.04, 0.32, 0.18, 0.97], [0.08, 0.06, 0.25, 0.15, 0.94],
        [0.20, 0.05, 0.18, 0.11, 0.90], [0.29, 0.10, 0.14, 0.07, 0.82],
        [1.05, 0.04, 0.32, 0.18, 0.97], [0.92, 0.06, 0.25, 0.15, 0.94],
        [0.80, 0.05, 0.18, 0.11, 0.90], [0.71, 0.10, 0.14, 0.07, 0.82],
        [0.41, 0.05, 0.065, 0.035, 0.38], [0.54, 0.04, 0.055, 0.028, 0.30],
        [0.63, 0.07, 0.058, 0.030, 0.34], [0.47, 0.09, 0.042, 0.022, 0.26],
    ];

    for (const [cx, cy, rx, ry, d] of cls) {
        const gx = cx * W + px, gy = cy * H + py;
        const g = ctx.createRadialGradient(gx, gy, 0, gx, gy, rx * W);
        g.addColorStop(0, rgba(4, 10, 3, d));
        g.addColorStop(0.35, rgba(6, 14, 4, d * 0.7));
        g.addColorStop(0.65, rgba(7, 16, 5, d * 0.3));
        g.addColorStop(1, 'transparent');
        ctx.fillStyle = g;
        ctx.beginPath(); ctx.ellipse(gx, gy, rx * W, ry * H, 0, 0, Math.PI * 2); ctx.fill();

        // Organic edge sub-blobs
        if (rx > 0.06) {
            for (let i = 0; i < 5; i++) {
                const a = n1.n(cx * 10 + i * 3.2) * Math.PI * 2;
                const dist = rx * W * (0.45 + n1.n(cx * 10 + i * 7.1) * 0.35);
                const bx = gx + Math.cos(a) * dist;
                const by = gy + Math.sin(a) * dist * (ry / rx);
                ctx.beginPath();
                ctx.arc(bx, by, rx * W * (0.15 + n1.n(cx * 10 + i * 11) * 0.1), 0, Math.PI * 2);
                ctx.fillStyle = rgba(5, 12, 3, d * 0.5);
                ctx.fill();
            }
        }
    }

    // Diverse hanging leaves
    for (let i = 0; i < 35; i++) {
        const lx = W * (0.18 + (i / 35) * 0.64) + px + n1.n(i * 1.1 + 1200) * 38;
        const ly = H * (0.04 + n1.n(i * 0.65 + 1250) * 0.10) + py;
        const sw = Math.sin(t * 0.25 + i * 0.45) * 3.5;
        const type = i % 4;

        if (type === 0) {
            // Long tropical leaf with drip tip
            const len = 10 + n1.n(i * 1.3 + 1260) * 14;
            ctx.beginPath(); ctx.moveTo(lx + sw, ly);
            ctx.bezierCurveTo(lx + sw + 3.5, ly + len * 0.25, lx + sw + 2, ly + len * 0.65, lx + sw + 0.5, ly + len);
            ctx.bezierCurveTo(lx + sw - 2, ly + len * 0.65, lx + sw - 3.5, ly + len * 0.25, lx + sw, ly);
            ctx.fillStyle = rgba(9, 26, 7, 0.2 + n1.n(i * 0.3 + 1270) * 0.08);
            ctx.fill();
            // Midrib
            ctx.beginPath(); ctx.moveTo(lx + sw, ly + 1); ctx.lineTo(lx + sw + 0.5, ly + len - 1);
            ctx.strokeStyle = rgba(12, 30, 10, 0.1);
            ctx.lineWidth = 0.3; ctx.stroke();
        } else if (type === 1) {
            const sz = 4 + n1.n(i * 1.5 + 1280) * 3;
            ctx.beginPath();
            ctx.ellipse(lx + sw, ly + sz * 0.4, sz * 0.35, sz, n1.n(i * 2 + 1290) * 0.35, 0, Math.PI * 2);
            ctx.fillStyle = rgba(11, 30, 8, 0.16);
            ctx.fill();
        } else if (type === 2) {
            // Compound leaf cluster
            for (let j = 0; j < 4; j++) {
                const jx = lx + sw + n1.n(j * 4 + i * 3 + 1310) * 4;
                const jy = ly + j * 3.5 + n1.n(j * 5 + i * 2 + 1315) * 2;
                ctx.beginPath();
                ctx.ellipse(jx, jy, 2.5, 1.2, n1.n(j + i + 1320) * 0.4, 0, Math.PI * 2);
                ctx.fillStyle = rgba(12, 33, 9, 0.15);
                ctx.fill();
            }
        } else {
            // Small round leaf
            const r = 2 + n1.n(i * 1.8 + 1330) * 1.5;
            ctx.beginPath(); ctx.arc(lx + sw, ly + r, r, 0, Math.PI * 2);
            ctx.fillStyle = rgba(10, 28, 8, 0.14);
            ctx.fill();
        }
    }
}

// ===== LIGHT RAYS =====
function drawRays(ctx) {
    ctx.globalCompositeOperation = 'screen';
    const rays = [
        {x:0.37,a:3.5,w:38,ph:0},{x:0.46,a:-1.2,w:26,ph:2},
        {x:0.54,a:5.5,w:20,ph:4},{x:0.41,a:0.8,w:14,ph:1.5},
        {x:0.50,a:2,w:10,ph:3},
    ];
    for (const r of rays) {
        const int = clamp(0.5 + Math.sin(t * 0.2 + r.ph) * 0.5) * 0.04;
        if (int < 0.002) continue;
        ctx.save(); ctx.translate(r.x * W, 0); ctx.rotate(r.a * Math.PI / 180);
        const g = ctx.createLinearGradient(0, 0, 0, H * 0.78);
        g.addColorStop(0, rgba(255, 238, 178, int));
        g.addColorStop(0.25, rgba(255, 232, 168, int * 0.45));
        g.addColorStop(0.55, rgba(255, 228, 158, int * 0.1));
        g.addColorStop(1, 'transparent');
        ctx.fillStyle = g; ctx.fillRect(-r.w / 2, 0, r.w, H * 0.78);
        ctx.restore();
    }
    ctx.globalCompositeOperation = 'source-over';
}

// ===== PARTICLES & FIREFLIES =====
const dust = Array.from({length:50},(_,i)=>({
    x:n1.n(i*1.5+1400)*.5+.5,y:n1.n(i*1.9+1450)*.55+.2,
    sz:.3+n1.n(i*2.8+1500)*1.1,sp:.03+n1.n(i*1.1+1550)*.18,
    ph:n1.n(i*3.8+1600)*Math.PI*2,br:.05+n1.n(i*2.3+1650)*.1
}));
const flies=Array.from({length:9},(_,i)=>({
    x:.22+n1.n(i*3+1700)*.55,y:.28+n1.n(i*3.4+1750)*.38,
    ph:n1.n(i*4.1+1800)*Math.PI*2,sp:.1+n1.n(i*1.9+1850)*.22,
    sz:1.2+n1.n(i*4.8+1900)*1.5
}));

function drawAtmosphere(ctx) {
    // Dust motes
    for (const p of dust) {
        const x = p.x * W + Math.sin(t * p.sp * 0.55 + p.ph) * 28;
        const y = ((p.y * H + t * p.sp * 3.5) % (H * 0.6)) + H * 0.14;
        const v = p.br * (0.5 + Math.sin(t * 0.7 + p.ph) * 0.5);
        if (v > 0.012) {
            ctx.beginPath(); ctx.arc(x, y, p.sz, 0, Math.PI * 2);
            ctx.fillStyle = rgba(200, 190, 160, v); ctx.fill();
        }
    }
    // Fireflies
    for (const f of flies) {
        const x = f.x * W + Math.sin(t * f.sp + f.ph) * 32;
        const y = f.y * H + Math.cos(t * f.sp * 0.5 + f.ph + 1) * 20;
        const b = clamp(Math.sin(t * 0.85 + f.ph));
        if (b > 0.4) {
            const g = ctx.createRadialGradient(x, y, 0, x, y, f.sz * 6);
            g.addColorStop(0, rgba(205, 190, 70, b * 0.35));
            g.addColorStop(0.25, rgba(205, 190, 70, b * 0.06));
            g.addColorStop(1, 'transparent');
            ctx.fillStyle = g; ctx.beginPath(); ctx.arc(x, y, f.sz * 6, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(x, y, f.sz * 0.35, 0, Math.PI * 2);
            ctx.fillStyle = rgba(245, 238, 160, b * 0.8); ctx.fill();
        }
    }
}

function drawVignette(ctx) {
    const v = ctx.createRadialGradient(W / 2, H * 0.40, W * 0.16, W / 2, H * 0.40, W * 0.72);
    v.addColorStop(0, 'transparent'); v.addColorStop(0.45, 'transparent');
    v.addColorStop(0.75, rgba(2, 4, 1, 0.25)); v.addColorStop(1, rgba(2, 4, 1, 0.55));
    ctx.fillStyle = v; ctx.fillRect(0, 0, W, H);
    const b = ctx.createLinearGradient(0, H * 0.85, 0, H);
    b.addColorStop(0, 'transparent'); b.addColorStop(1, rgba(2, 4, 1, 0.35));
    ctx.fillStyle = b; ctx.fillRect(0, H * 0.85, W, H * 0.15);
}

// ===== RENDER =====
function drawStatic() {
    bg.clearRect(0, 0, W, H);

    // Sky (pixel-by-pixel for realism)
    for (let y = 0; y < H * 0.78; y++) {
        const f = y / (H * 0.78);
        let r, g, b;
        if (f < 0.10) { r = lerp(8, 18, f / 0.1); g = lerp(12, 25, f / 0.1); b = lerp(28, 48, f / 0.1); }
        else if (f < 0.25) { const s = (f - 0.10) / 0.15; r = lerp(18, 42, s); g = lerp(25, 60, s); b = lerp(48, 92, s); }
        else if (f < 0.40) { const s = (f - 0.25) / 0.15; r = lerp(42, 90, s); g = lerp(60, 110, s); b = lerp(92, 135, s); }
        else if (f < 0.52) { const s = (f - 0.40) / 0.12; r = lerp(90, 165, s); g = lerp(110, 150, s); b = lerp(135, 125, s); }
        else if (f < 0.64) { const s = (f - 0.52) / 0.12; r = lerp(165, 215, s); g = lerp(150, 140, s); b = lerp(125, 80, s); }
        else if (f < 0.78) { const s = (f - 0.64) / 0.14; r = lerp(215, 205, s); g = lerp(140, 90, s); b = lerp(80, 40, s); }
        else { const s = (f - 0.78) / 0.22; r = lerp(205, 125, s); g = lerp(90, 45, s); b = lerp(40, 22, s); }
        const nv = n1.n(y * 0.006 + 100) * 2.5;
        bg.fillStyle = rgba(r + nv, g + nv * 0.4, b - nv * 0.15);
        bg.fillRect(0, y, W, 1);
    }

    // Sun
    const sx = W * 0.38 + (smx - 0.5) * W * 0.012;
    const sy = H * 0.54 + (smy - 0.5) * H * 0.006;
    for (let i = 4; i >= 0; i--) {
        const r = (85 + i * 65);
        const g2 = bg.createRadialGradient(sx, sy, 0, sx, sy, r);
        g2.addColorStop(0, rgba(255, 245, 215, 0.032 - i * 0.004));
        g2.addColorStop(1, 'transparent');
        bg.fillStyle = g2; bg.beginPath(); bg.arc(sx, sy, r, 0, Math.PI * 2); bg.fill();
    }
    const d = bg.createRadialGradient(sx, sy, 0, sx, sy, 26);
    d.addColorStop(0, 'rgba(255,252,240,0.75)'); d.addColorStop(0.3, 'rgba(255,235,180,0.45)');
    d.addColorStop(0.65, 'rgba(245,200,110,0.12)'); d.addColorStop(1, 'transparent');
    bg.fillStyle = d; bg.beginPath(); bg.arc(sx, sy, 26, 0, Math.PI * 2); bg.fill();

    // Cirrus
    bg.globalAlpha = 0.03;
    for (let i = 0; i < 4; i++) {
        const cy = H * (0.10 + i * 0.06), cx = W * (0.12 + i * 0.22);
        bg.beginPath();
        for (let x = -140; x < 140; x += 2) {
            const ht = 1 - (x / 140) ** 2;
            const y = cy + n1.fbm(x * 0.013 + i * 4.5, 3) * 5.5 * ht;
            x === -140 ? bg.moveTo(cx + x, y) : bg.lineTo(cx + x, y);
        }
        bg.strokeStyle = 'rgba(185,180,170,1)'; bg.lineWidth = 5.5; bg.lineCap = 'round'; bg.stroke();
    }
    bg.globalAlpha = 1;

    // HILL 1 (farthest)
    if (hillTextures.length === 0) generateTextures();
    drawTexturedHill(bg, hillTextures[0], W * 0.28, W * 0.55, H * 0.15, H * 0.52, n1, 1.2, 4);

    // Mist between hill 1 and 2
    drawMist(bg, H * 0.46, 7, 0.065, 0.08, 2.2, 1.3, [162, 178, 195], 5);
    drawWispyMist(bg, H * 0.44, 3, 0.055, 0.022, 5);

    // HILL 2 (middle)
    drawTexturedHill(bg, hillTextures[1], W * 0.68, W * 0.48, H * 0.12, H * 0.56, n2, 3.4, 9);
    drawTexturedHill(bg, hillTextures[2], W * 0.40, W * 0.38, H * 0.09, H * 0.55, n2, 4.1, 10);

    // Mist between hill 2 and 3
    drawMist(bg, H * 0.53, 9, 0.10, 0.09, 1.8, 1.2, [178, 192, 200], 10);
    drawWispyMist(bg, H * 0.51, 4, 0.08, 0.03, 8);

    // HILL 3 (nearest bg hill)
    drawTexturedHill(bg, hillTextures[3], W * 0.50, W * 0.65, H * 0.10, H * 0.62, n3, 5.8, 15);

    // River
    drawRiver(bg);

    // Valley mist (heaviest)
    drawMist(bg, H * 0.63, 11, 0.13, 0.10, 1.9, 1.4, [183, 196, 202], 14);
    drawWispyMist(bg, H * 0.61, 5, 0.11, 0.035, 12);

    // Floor
    drawFloor(bg);

    // Mid trees
    drawTree(bg, 0.30, 12, 16);
    drawTree(bg, 0.68, 10, 16);

    // Foreground trees
    drawTree(bg, 0.06, 44, 34);
    drawTree(bg, -0.04, 54, 40);
    drawTree(bg, 0.90, 40, 34);
    drawTree(bg, 1.04, 48, 40);

    // Canopy
    drawCanopy(bg);
}

function drawAnimated() {
    fg.clearRect(0, 0, W, H);

    // Animated mist overlays (on top of static scene)
    drawMist(fg, H * 0.45, 4, 0.07, 0.04, 1.8, 1.0, [160, 175, 192], 5);
    drawMist(fg, H * 0.52, 5, 0.11, 0.05, 1.5, 1.1, [175, 190, 198], 10);
    drawMist(fg, H * 0.62, 6, 0.14, 0.06, 1.7, 1.2, [180, 195, 200], 14);

    // Moving wisps
    drawWispyMist(fg, H * 0.48, 2, 0.07, 0.015, 6);
    drawWispyMist(fg, H * 0.58, 3, 0.10, 0.02, 10);

    // Light rays
    drawRays(fg);

    // Particles & fireflies
    drawAtmosphere(fg);

    // Vignette
    drawVignette(fg);
}

function render() {
    t += 0.016;
    smx = lerp(smx, mx, 0.018);
    smy = lerp(smy, my, 0.018);

    // Only redraw static layer when mouse moves significantly or on resize
    const moved = Math.abs(smx - prevSmx) > 0.001 || Math.abs(smy - prevSmy) > 0.001;
    if (needsRedraw || moved) {
        drawStatic();
        prevSmx = smx; prevSmy = smy;
        needsRedraw = false;
    }

    // Animated layer always redraws
    drawAnimated();

    requestAnimationFrame(render);
}

generateTextures();
render();
</script>
