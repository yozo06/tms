<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WildArc — Coorg Immersive</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{overflow:hidden;background:#030603;cursor:none}
canvas{display:block;position:fixed;top:0;left:0}
#bg{z-index:0}#fg{z-index:1}
.brand{position:fixed;bottom:8%;left:50%;transform:translateX(-50%);
    text-align:center;z-index:50;opacity:0;animation:fi 6s ease-out 3s forwards;pointer-events:none}
.brand h1{font-family:Georgia,serif;color:rgba(220,208,172,0.55);font-size:2.8rem;
    font-weight:400;letter-spacing:14px;text-shadow:0 2px 30px rgba(0,0,0,0.8)}
.brand p{color:rgba(190,185,165,0.25);font-family:Georgia,serif;font-size:0.72rem;
    letter-spacing:7px;margin-top:14px;text-transform:uppercase}
@keyframes fi{to{opacity:1}}

/* Time dial */
.dial-wrap{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:100;
    display:flex;align-items:center;gap:12px;background:rgba(8,16,8,0.6);
    border:1px solid rgba(80,100,80,0.2);border-radius:24px;padding:8px 18px;
    backdrop-filter:blur(8px);user-select:none;transition:opacity .4s}
.dial-wrap:hover{background:rgba(8,16,8,0.75)}
.dial-label{color:rgba(200,200,180,0.55);font-family:Georgia,serif;font-size:11px;
    letter-spacing:2px;min-width:75px;text-align:center;transition:color .3s}
.dial-icons{display:flex;gap:2px;align-items:center}
.dial-icons span{font-size:12px;opacity:0.45}
input[type=range]{-webkit-appearance:none;width:220px;height:4px;border-radius:2px;
    background:linear-gradient(90deg,#1a1a3a,#3a2a1a,#5a4a20,#e8c050,#5a4a20,#3a2a1a,#1a1a3a);
    outline:none;cursor:pointer}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;
    border-radius:50%;background:rgba(220,210,180,0.8);border:2px solid rgba(100,120,100,0.5);
    cursor:pointer;box-shadow:0 0 10px rgba(200,180,100,0.25)}
</style>
</head>
<body>
<canvas id="bg"></canvas>
<canvas id="fg"></canvas>
<div class="brand"><h1>wildarc</h1><p>Where nature leads, we follow</p></div>
<div class="dial-wrap">
    <div class="dial-icons"><span>🌙</span></div>
    <input type="range" id="timeDial" min="0" max="1000" value="300">
    <div class="dial-icons"><span>☀️</span></div>
    <div class="dial-label" id="timeLabel">DAWN</div>
</div>

<script>
const bgC=document.getElementById('bg'),fgC=document.getElementById('fg');
const bg=bgC.getContext('2d'),fg=fgC.getContext('2d');
let W,H;
let mx=.5,my=.5,smx=.5,smy=.5,psmx=-1,psmy=-1;
let t=0,needsRedraw=true;

// Time of day: 0=midnight, 0.25=sunrise, 0.5=noon, 0.75=sunset, 1=midnight
let timeOfDay=0.3;
const dial=document.getElementById('timeDial');
const tLabel=document.getElementById('timeLabel');
dial.addEventListener('input',()=>{timeOfDay=dial.value/1000;needsRedraw=true;});

function getTimeLabel(td){
    if(td<.05||td>.95)return'MIDNIGHT';if(td<.15)return'PRE-DAWN';if(td<.28)return'DAWN';
    if(td<.38)return'SUNRISE';if(td<.45)return'MORNING';if(td<.55)return'MIDDAY';
    if(td<.65)return'AFTERNOON';if(td<.75)return'EVENING';if(td<.82)return'SUNSET';
    if(td<.90)return'DUSK';return'NIGHT';
}

function resize(){W=bgC.width=fgC.width=innerWidth;H=bgC.height=fgC.height=innerHeight;needsRedraw=true;genTex();}
addEventListener('resize',resize);
addEventListener('mousemove',e=>{mx=e.clientX/W;my=e.clientY/H;});

// ===== NOISE (Improved with gradient table) =====
class NS{
constructor(s=42){this.p=new Uint8Array(512);const pm=new Uint8Array(256);
for(let i=0;i<256;i++)pm[i]=i;for(let i=255;i>0;i--){s=(s*16807)%2147483647;
const j=s%(i+1);[pm[i],pm[j]]=[pm[j],pm[i]];}for(let i=0;i<512;i++)this.p[i]=pm[i&255];
// Gradient vectors for better 2D noise
this.gx=new Float32Array(256);this.gy=new Float32Array(256);
for(let i=0;i<256;i++){const a=(pm[i]/256)*Math.PI*2;this.gx[i]=Math.cos(a);this.gy[i]=Math.sin(a);}}
f(t){return t*t*t*(t*(t*6-15)+10)}
dot2(i,x,y){return this.gx[i&255]*x+this.gy[i&255]*y}
n(x){const X=Math.floor(x)&255,xf=x-Math.floor(x),u=this.f(xf);
return((this.p[X]&1)?-xf:xf)*(1-u)+((this.p[X+1]&1)?-(xf-1):(xf-1))*u}
n2(x,y){const X=Math.floor(x)&255,Y=Math.floor(y)&255,xf=x-Math.floor(x),yf=y-Math.floor(y);
const u=this.f(xf),v=this.f(yf);
const a=this.p[X]+Y,b=this.p[X+1]+Y;
return(1-v)*((1-u)*this.dot2(this.p[a],xf,yf)+u*this.dot2(this.p[b],xf-1,yf))+
v*((1-u)*this.dot2(this.p[a+1],xf,yf-1)+u*this.dot2(this.p[b+1],xf-1,yf-1))}
fbm(x,o=6){let v=0,a=1,f=1,m=0;for(let i=0;i<o;i++){v+=this.n(x*f)*a;m+=a;a*=.5;f*=2;}return v/m}
fbm2(x,y,o=5){let v=0,a=1,f=1,m=0;for(let i=0;i<o;i++){v+=this.n2(x*f,y*f)*a;m+=a;a*=.5;f*=2;}return v/m}
}
const n1=new NS(137),n2=new NS(283),n3=new NS(419),n4=new NS(557),n5=new NS(691);

function rgba(r,g,b,a=1){return`rgba(${r|0},${g|0},${b|0},${a})`}
function L(a,b,t){return a+(b-a)*t}
function cl(v,lo=0,hi=1){return Math.max(lo,Math.min(hi,v))}
function lC(a,b,t){return[L(a[0],b[0],t),L(a[1],b[1],t),L(a[2],b[2],t)]}

// ===== TIME-BASED COLOR SYSTEM =====
function timeColor(stops){
    const td=timeOfDay;
    for(let i=0;i<stops.length-1;i++){
        if(td>=stops[i][0]&&td<=stops[i+1][0]){
            const f=(td-stops[i][0])/(stops[i+1][0]-stops[i][0]);
            return lC(stops[i][1],stops[i+1][1],f);}}
    return stops[stops.length-1][1];
}
function darkness(){
    const td=timeOfDay;
    if(td<.18)return L(1,.35,td/.18);
    if(td<.3)return L(.35,0,(td-.18)/.12);
    if(td<.7)return 0;
    if(td<.82)return L(0,.35,(td-.7)/.12);
    return L(.35,1,(td-.82)/.18);
}
function sunVis(){
    const td=timeOfDay;
    if(td<.2||td>.85)return 0;
    if(td<.3)return(td-.2)/.1;
    if(td>.75)return(.85-td)/.1;
    return 1;
}
function moonVis(){
    const td=timeOfDay;
    if(td>.15&&td<.8)return 0;
    if(td<.05||td>.95)return 1;
    if(td<.15)return 1-(td-.05)/.1;
    return(td-.8)/.15;
}
function sunY(){
    const td=cl((timeOfDay-.25)/.5,0,1);
    return .55-.24*Math.sin(td*Math.PI);
}
function sunX(){
    const td=cl((timeOfDay-.25)/.5,0,1);
    return L(.2,.8,td);
}

// ===== TERRAIN TEXTURES (High quality pixel-level) =====
let hillTex=[];
function createTex(w,h,cfg){
    const c=document.createElement('canvas');c.width=w;c.height=h;
    const cx=c.getContext('2d');const img=cx.createImageData(w,h);const d=img.data;
    for(let y=0;y<h;y++)for(let x=0;x<w;x++){
        const i=(y*w+x)*4,nx=x/w,ny=y/h;
        // Multi-octave terrain texture
        const tex1=cfg.nO.fbm2(nx*cfg.ns+cfg.sd,ny*cfg.ns*2+cfg.sd,6);
        const tex2=cfg.nO.fbm2(nx*cfg.ns*3+cfg.sd+10,ny*cfg.ns*4+cfg.sd+10,4);
        const tex3=cfg.nO.fbm2(nx*cfg.ns*6+cfg.sd+20,ny*cfg.ns*8+cfg.sd+20,3);
        const bc=cfg.bc;
        // Base gradient from top to bottom of hill
        let r=L(bc[0][0],bc[1][0],ny)+tex1*16+tex2*8+tex3*3;
        let g=L(bc[0][1],bc[1][1],ny)+tex1*22+tex2*11+tex3*4;
        let b=L(bc[0][2],bc[1][2],ny)+tex1*8+tex2*4+tex3*2;

        // Forest canopy patches (clusters of darker/lighter areas)
        if(ny<(cfg.fl||.65)){
            const fo=cfg.nO.fbm2(nx*45+cfg.sd,ny*50+cfg.sd,5);
            const fd=cfg.nO.fbm2(nx*90+cfg.sd+5,ny*90+cfg.sd+5,4);
            const tr=cfg.nO.fbm2(nx*25+cfg.sd+15,ny*30+cfg.sd+15,3);
            // Canopy variation - distinct tree crowns
            r+=fo*14-6+fd*5;g+=fo*20+2+fd*8;b+=fo*6-2;
            // Shadow pockets between trees
            if(fd<-.28){r-=9;g-=5;b-=3;}
            // Lighter canopy tops catching light
            if(fd>.32&&ny<.35){r+=4;g+=9;b+=2;}
            // Occasional lighter trees (different species)
            if(tr>.3&&tr<.38){r+=6;g+=12;b+=3;}
            // Dark ravines
            if(fo<-.35){r-=6;g-=3;b-=4;}
        }
        // Ridge vegetation (thinner at top)
        if(ny<.12){const edge=ny/.12;r=L(bc[0][0]+10,r,edge);g=L(bc[0][1]+5,g,edge);b=L(bc[0][2]+8,b,edge);}
        // Atmospheric haze blend
        r=L(r,cfg.hr,cfg.ha);g=L(g,cfg.hg,cfg.ha);b=L(b,cfg.hb,cfg.ha);
        d[i]=cl(r,0,255);d[i+1]=cl(g,0,255);d[i+2]=cl(b,0,255);d[i+3]=255;
    }
    cx.putImageData(img,0,0);return c;
}

function genTex(){
    const tw=Math.min(W,1100),th=260;
    hillTex=[
        // Distant hill 1 — bluish-green, heavy haze
        createTex(tw,th,{bc:[[75,100,118],[55,82,98]],ns:10,nO:n1,sd:1.5,hr:160,hg:178,hb:200,ha:.38,fl:.7}),
        // Mid hill 2 — green with blue haze
        createTex(tw,th,{bc:[[42,68,38],[28,50,24]],ns:12,nO:n2,sd:3.5,hr:135,hg:158,hb:170,ha:.18,fl:.8}),
        // Mid hill 3
        createTex(tw,th,{bc:[[38,62,35],[24,46,22]],ns:12,nO:n2,sd:4.2,hr:128,hg:152,hb:162,ha:.14,fl:.8}),
        // Near hill — rich green, minimal haze
        createTex(tw,th,{bc:[[30,55,28],[18,38,16]],ns:14,nO:n3,sd:6,hr:95,hg:125,hb:118,ha:.06,fl:.9}),
    ];
}

// ===== HILLS =====
function hillY(cx,w,pk,nO,sd,x,ox){
    const nx=(x+ox-cx)/w;
    return Math.exp(-nx*nx*2.0)*(1+nO.fbm(nx*4.5+sd,7)*.38)*pk;
}
function drawHill(c,tex,cx,w,pk,by,nO,sd,px){
    const ox=(smx-.5)*px,oy=(smy-.5)*px*.16;
    const pts=[];let mY=by;
    c.beginPath();c.moveTo(-20,H);
    for(let x=-20;x<=W+20;x+=2){
        const h=hillY(cx,w,pk,nO,sd,x,ox);
        const y=by-h+oy;pts.push({x,y});
        x===-20?c.moveTo(x,y):c.lineTo(x,y);if(y<mY)mY=y;
    }
    c.lineTo(W+20,H);c.lineTo(-20,H);c.closePath();
    c.save();c.clip();
    c.drawImage(tex,-20+ox*.3,mY-5,W+40,by-mY+45);
    const dk=darkness();
    if(dk>0){c.fillStyle=rgba(4,6,16,dk*.55);c.fillRect(-20,mY-5,W+40,by-mY+45);}
    // Subtle highlight on sunlit side
    const sv=sunVis();
    if(sv>.1){
        const sunSide=sunX();
        const hlG=c.createLinearGradient(sunSide*W-W*.3,0,sunSide*W+W*.3,0);
        hlG.addColorStop(0,'transparent');
        hlG.addColorStop(.5,rgba(255,245,200,.015*sv));
        hlG.addColorStop(1,'transparent');
        c.fillRect(-20,mY-5,W+40,by-mY+45);
    }
    c.restore();
    // Ridge line — subtle
    c.beginPath();for(const p of pts)c.lineTo(p.x,p.y);
    const ridgeA=(.035-dk*.025)*cl(sv+.3,0,1);
    c.strokeStyle=rgba(175,190,170,ridgeA);c.lineWidth=1.2;c.stroke();
    return pts;
}

// ===== STREAM =====
function drawStream(c){
    const ox=(smx-.5)*14,oy=(smy-.5)*6;
    const stY=H*.63;
    const stW=34;
    const dk=darkness();

    // SLOPE gradient
    const slopeTop=H*.69,slopeBot=stY+stW*.5;
    const sG=c.createLinearGradient(0,slopeTop-12,0,slopeBot+8);
    const sc1=lC([24,42,20],[8,14,8],dk);
    const sc2=lC([20,38,18],[8,14,8],dk);
    sG.addColorStop(0,rgba(sc1[0],sc1[1],sc1[2],0));
    sG.addColorStop(.05,rgba(sc1[0],sc1[1],sc1[2],.6));
    sG.addColorStop(.4,rgba(sc2[0],sc2[1],sc2[2],.75));
    sG.addColorStop(1,rgba(sc2[0],sc2[1],sc2[2],.4));
    c.fillStyle=sG;c.fillRect(0,slopeTop-12,W,slopeBot-slopeTop+20);

    // Slope ground texture
    for(let i=0;i<60;i++){
        const gx=(n1.n(i*1.4+5800)*.5+.5)*W+ox;
        const gy=L(slopeTop,slopeBot,n1.n(i*1.1+5810)*.5+.5);
        const gs=1+n1.n(i*2+5820)*2;
        c.beginPath();c.arc(gx,gy,gs,0,Math.PI*2);
        c.fillStyle=rgba(18+n1.n(i*.3)*4,34+n1.n(i*.3)*5,14,L(.04,.015,dk));c.fill();
    }

    // === CARDAMOM PLANTS ===
    for(let i=0;i<35;i++){
        const cx2=(n1.n(i*2.5+6000)*.5+.5)*W+ox;
        const cy2=L(slopeTop+5,slopeBot-6,n1.n(i*1.6+6010)*.5+.5);
        const ch=9+n1.n(i*2+6020)*7;
        const csw=Math.sin(t*.18+i*.6)*1.8;
        const cAlpha=L(.35,.1,dk);

        // Stem
        c.beginPath();c.moveTo(cx2,cy2);
        c.quadraticCurveTo(cx2+csw*.3,cy2-ch*.5,cx2+csw,cy2-ch);
        c.strokeStyle=rgba(28,48,20,cAlpha);c.lineWidth=1.3;c.stroke();

        // Large elongated leaves
        for(let l=0;l<5;l++){
            const lt=(l+1)/6;
            const lx=L(cx2,cx2+csw,lt);
            const ly=L(cy2,cy2-ch,lt);
            const side=(l%2===0)?-1:1;
            const lLen=7+n1.n(i*3+l*5+6030)*4;
            const lSw=Math.sin(t*.13+i+l*.4)*1.2;

            c.beginPath();c.moveTo(lx,ly);
            c.bezierCurveTo(
                lx+side*lLen*.4+lSw,ly-1.2,
                lx+side*lLen*.8+lSw,ly+lLen*.14,
                lx+side*lLen+lSw,ly+lLen*.22
            );
            c.bezierCurveTo(
                lx+side*lLen*.7+lSw,ly+lLen*.32,
                lx+side*lLen*.3+lSw,ly+lLen*.14,
                lx,ly
            );
            // Leaf vein (midrib)
            const leafG=c.createLinearGradient(lx,ly,lx+side*lLen+lSw,ly+lLen*.22);
            leafG.addColorStop(0,rgba(18,42+l*2,14,cAlpha*.85));
            leafG.addColorStop(.5,rgba(14,38+l*3,11,cAlpha*.75));
            leafG.addColorStop(1,rgba(16,35+l*2,12,cAlpha*.6));
            c.fillStyle=leafG;c.fill();
        }

        // Cardamom pods
        if(i%3===0){
            for(let p=0;p<3;p++){
                c.beginPath();c.ellipse(cx2+n1.n(i*7+p*4+6050)*5,cy2+2+p*2.5,2.2,1.3,n1.n(i+p)*.5,0,Math.PI*2);
                c.fillStyle=rgba(85,105,52,cAlpha*.55);c.fill();
            }
        }
    }

    // Trees from slope
    for(let i=0;i<24;i++){
        const tx=(n1.n(i*2.7+6100)*.5+.5)*W+ox;
        const ty=L(slopeTop+2,slopeBot-2,n1.n(i*1.8+6110)*.5+.5);
        const th=12+n1.n(i*2.3+6120)*12;
        const tw2=3.5+n1.n(i*1.5+6130)*3;
        // Trunk with slight taper
        c.beginPath();c.moveTo(tx-tw2*.12,ty);c.lineTo(tx+n1.n(i*3+6140)*2-tw2*.06,ty-th);
        c.lineTo(tx+n1.n(i*3+6140)*2+tw2*.06,ty-th);c.lineTo(tx+tw2*.12,ty);c.closePath();
        c.fillStyle=rgba(14,10,5,L(.28,.1,dk));c.fill();
        // Canopy — overlapping circles for natural look
        for(let cc=0;cc<4;cc++){
            const ccx=tx+n1.n(i*4+cc*3+6150)*tw2*1.8;
            const ccy=ty-th-cc*1.5+n1.n(i*3+cc*5+6160)*3;
            const cr=tw2*(.55+n1.n(i*5+cc*7+6170)*.45);
            const cg=c.createRadialGradient(ccx-cr*.2,ccy-cr*.2,0,ccx,ccy,cr);
            const gv=38+n1.n(i*.3+cc)*8;
            cg.addColorStop(0,rgba(16+n1.n(i*.3+cc)*5,gv+5,12,L(.35,.12,dk)));
            cg.addColorStop(.7,rgba(12+n1.n(i*.3+cc)*3,gv-2,10,L(.28,.09,dk)));
            cg.addColorStop(1,rgba(10,gv-6,8,0));
            c.fillStyle=cg;c.beginPath();c.arc(ccx,ccy,cr,0,Math.PI*2);c.fill();
        }
    }

    // === FLOWER BEDS ===
    for(let i=0;i<30;i++){
        const fx=(n1.n(i*2.3+6200)*.5+.5)*W+ox;
        const nx2=fx/W;
        const curve=n1.fbm(nx2*2.5+18,4)*16;
        const side=i%2===0?-1:1;
        const fy=stY+curve+oy+side*stW*(.55+n1.n(i*1.4+6210)*.2);
        const fAlpha=L(.25,.06,dk);

        const petals=4+Math.floor(n1.n(i*3+6220)*2);
        const fSz=2+n1.n(i*2+6230)*1.4;
        const colors=[[225,125,155],[185,105,205],[245,205,85],[205,85,105],[155,185,225]][i%5];

        c.beginPath();c.moveTo(fx,fy);c.lineTo(fx+Math.sin(t*.18+i)*.6,fy-fSz*2.5);
        c.strokeStyle=rgba(20,44,16,fAlpha);c.lineWidth=.5;c.stroke();

        for(let p=0;p<petals;p++){
            const ang=(p/petals)*Math.PI*2+t*.03;
            c.beginPath();c.ellipse(fx+Math.cos(ang)*fSz*.5+Math.sin(t*.18+i)*.6,
                fy-fSz*2.5+Math.sin(ang)*fSz*.5,fSz*.38,fSz*.19,ang,0,Math.PI*2);
            c.fillStyle=rgba(colors[0],colors[1],colors[2],fAlpha);c.fill();
        }
        c.beginPath();c.arc(fx+Math.sin(t*.18+i)*.6,fy-fSz*2.5,fSz*.16,0,Math.PI*2);
        c.fillStyle=rgba(205,185,55,fAlpha);c.fill();
    }

    // === AQUATIC PLANTS ===
    for(let i=0;i<24;i++){
        const ax=(n1.n(i*2.8+6300)*.5+.5)*W+ox;
        const nx2=ax/W;
        const curve=n1.fbm(nx2*2.5+18,4)*16;
        const side=i%2===0?-1:1;
        const ay=stY+curve+oy+side*stW*.35;
        const aAlpha=L(.28,.08,dk);

        if(i%4===0){
            // Water lily pad with detail
            const padR=3.5+n1.n(i*4+6310)*2;
            c.beginPath();c.arc(ax,ay,padR,0,Math.PI*2);
            const padG=c.createRadialGradient(ax-padR*.2,ay-padR*.2,0,ax,ay,padR);
            padG.addColorStop(0,rgba(28,58,30,aAlpha));
            padG.addColorStop(.7,rgba(22,48,24,aAlpha*.8));
            padG.addColorStop(1,rgba(18,40,20,aAlpha*.5));
            c.fillStyle=padG;c.fill();
            // Notch in lily pad
            c.beginPath();c.moveTo(ax,ay);c.lineTo(ax+padR*.3,ay-padR);c.lineTo(ax-padR*.3,ay-padR);c.closePath();
            c.fillStyle=rgba(35,65,100,aAlpha*.4);c.fill();
            // Lily flower
            if(dk<.35){
                for(let p=0;p<5;p++){
                    const pa=(p/5)*Math.PI*2;
                    c.beginPath();c.ellipse(ax+1+Math.cos(pa)*2,ay-1.5+Math.sin(pa)*1.2,1.8,1,pa,0,Math.PI*2);
                    c.fillStyle=rgba(235,210,218,aAlpha*.7);c.fill();
                }
                c.beginPath();c.arc(ax+1,ay-1.5,.8,0,Math.PI*2);
                c.fillStyle=rgba(240,220,80,aAlpha*.6);c.fill();
            }
        } else if(i%4===1){
            // Reeds
            for(let r=0;r<4;r++){
                const rx=ax+n1.n(i*5+r*4+6320)*4;
                const rh=7+n1.n(i*3+r*6+6330)*6;
                const rsw=Math.sin(t*.18+i+r*.3)*1.2;
                c.beginPath();c.moveTo(rx,ay);
                c.quadraticCurveTo(rx+rsw*.5,ay-rh*.5,rx+rsw,ay-rh);
                c.strokeStyle=rgba(22,50,18,aAlpha);c.lineWidth=.7;c.stroke();
                c.beginPath();c.ellipse(rx+rsw,ay-rh,1.2,3,0,0,Math.PI*2);
                c.fillStyle=rgba(85,65,35,aAlpha*.65);c.fill();
            }
        } else if(i%4===2){
            // Sedge grass clump
            for(let s=0;s<6;s++){
                const sx2=ax+n1.n(i*6+s*3+6340)*4-2;
                const sh=5+n1.n(i*4+s*5+6345)*4;
                const ssw=Math.sin(t*.15+i*1.2+s*.4)*1.5;
                c.beginPath();c.moveTo(sx2,ay);
                c.quadraticCurveTo(sx2+ssw*.4,ay-sh*.5,sx2+ssw,ay-sh);
                c.strokeStyle=rgba(18,45,15,aAlpha*.8);c.lineWidth=.5;c.stroke();
            }
        } else {
            // Moss on wet rock
            const rsz=2.5+n1.n(i*3+6350)*2.5;
            const rg=c.createRadialGradient(ax-rsz*.15,ay-rsz*.15,0,ax,ay,rsz);
            rg.addColorStop(0,rgba(45,62,40,aAlpha*.6));
            rg.addColorStop(.6,rgba(35,55,32,aAlpha*.5));
            rg.addColorStop(1,rgba(30,50,28,aAlpha*.2));
            c.fillStyle=rg;c.beginPath();c.arc(ax,ay,rsz,0,Math.PI*2);c.fill();
        }
    }

    // === BOULDERS ===
    for(let i=0;i<18;i++){
        const bx=(n1.n(i*3.5+6400)*.5+.5)*W+ox;
        const nx2=bx/W;
        const curve=n1.fbm(nx2*2.5+18,4)*16;
        const inSt=n1.n(i*1.8+6410)>.05;
        const by=stY+curve+oy+(inSt?n1.n(i*2.5+6415)*stW*.3:
            (n1.n(i*1.3+6420)>0?-1:1)*stW*(.45+n1.n(i*2+6425)*.25));
        const bsz=6+n1.n(i*2.2+6430)*12;

        // Irregular boulder shape
        c.beginPath();
        const pts=[];
        for(let j=0;j<=12;j++){
            const ang=(j/12)*Math.PI*2;
            const r=bsz*(.6+n1.n(i*8+j*4+6440)*.42);
            const px2=bx+Math.cos(ang)*r;
            const py2=by+Math.sin(ang)*r*.45;
            pts.push({x:px2,y:py2});
        }
        c.moveTo(pts[0].x,pts[0].y);
        for(let j=1;j<pts.length;j++){
            const prev=pts[j-1],curr=pts[j];
            c.quadraticCurveTo((prev.x+curr.x)/2+n1.n(i*9+j*6+6442)*2,
                (prev.y+curr.y)/2+n1.n(i*9+j*7+6443)*1.5,curr.x,curr.y);
        }
        c.closePath();

        const rBase=42+n1.n(i*1.4+6450)*18;
        const rk=L(1,.35,dk);
        const rg=c.createLinearGradient(bx-bsz*.3,by-bsz*.4,bx+bsz*.3,by+bsz*.3);
        rg.addColorStop(0,rgba((rBase+18)*rk,(rBase+14)*rk,(rBase+10)*rk,.72));
        rg.addColorStop(.4,rgba((rBase+5)*rk,(rBase+2)*rk,(rBase-2)*rk,.68));
        rg.addColorStop(.7,rgba((rBase-5)*rk,(rBase-8)*rk,(rBase-10)*rk,.6));
        rg.addColorStop(1,rgba((rBase-14)*rk,(rBase-16)*rk,(rBase-18)*rk,.5));
        c.fillStyle=rg;c.fill();

        // Moss on boulder
        if(n1.n(i*3+6460)>.1){
            c.beginPath();c.ellipse(bx-bsz*.15,by-bsz*.18,bsz*.3,bsz*.14,.2,0,Math.PI*2);
            c.fillStyle=rgba(30,55,24,L(.18,.06,dk));c.fill();
        }
        // White water around boulder in stream
        if(inSt){
            for(let w=0;w<4;w++){
                const wx=bx+bsz*(.3+w*.2)+n1.n(bx+w*5)*3;
                const wy=by+n1.n(bx+w*7)*bsz*.12;
                const wr=2+n1.n(bx+w*3)*.8;
                c.beginPath();c.ellipse(wx,wy,wr*2,wr*.4,.1,0,Math.PI*2);
                c.fillStyle=rgba(215,230,245,L(.07,.02,dk)+Math.sin(t*2.5+bx+w)*.012);c.fill();
            }
        }
    }

    // === WATER (layered passes for depth) ===
    // Deep water base
    c.beginPath();
    for(let x=-50;x<=W+50;x+=2){
        const nx2=x/W;const curve=n1.fbm(nx2*2.5+18,4)*16;
        x===-50?c.moveTo(x+ox,stY+curve+oy-stW*.5):c.lineTo(x+ox,stY+curve+oy-stW*.5);
    }
    for(let x=W+50;x>=-50;x-=2){
        const nx2=x/W;const curve=n1.fbm(nx2*2.5+18,4)*16;
        c.lineTo(x+ox,stY+curve+oy+stW*.5);
    }
    c.closePath();
    const deepWater=lC([18,38,65],[6,12,25],dk);
    c.fillStyle=rgba(deepWater[0],deepWater[1],deepWater[2],.22);c.fill();

    // Water surface passes
    const wPasses=[
        {ws:1.0,col:[42,72,108],a:.11,sp:1.2},{ws:.82,col:[38,68,104],a:.14,sp:1.5},
        {ws:.6,col:[32,58,95],a:.17,sp:1.0},{ws:.38,col:[25,50,90],a:.21,sp:1.8},
        {ws:.15,col:[58,94,130],a:.09,sp:0.8},
    ];
    for(const wp of wPasses){
        c.beginPath();
        for(let x=-50;x<=W+50;x+=2){
            const nx2=x/W;const curve=n1.fbm(nx2*2.5+18,4)*16;
            const wave=Math.sin(nx2*24+t*.3*wp.sp+wp.ws*2)*1.6+Math.sin(nx2*42+t*.45*wp.sp)*.7
                +Math.sin(nx2*15+t*.18)*.9;
            x===-50?c.moveTo(x+ox,stY+curve+wave+oy-stW*wp.ws*.5):
                c.lineTo(x+ox,stY+curve+wave+oy-stW*wp.ws*.5);
        }
        for(let x=W+50;x>=-50;x-=2){
            const nx2=x/W;const curve=n1.fbm(nx2*2.5+18,4)*16;
            const wave=Math.sin(nx2*24+t*.3*wp.sp+wp.ws*2+.5)*1.2;
            c.lineTo(x+ox,stY+curve+wave+oy+stW*wp.ws*.5);
        }
        c.closePath();
        const wc=lC(wp.col,[wp.col[0]*.3,wp.col[1]*.3,wp.col[2]*.4],dk);
        c.fillStyle=rgba(wc[0],wc[1],wc[2],wp.a);c.fill();
    }

    // Sun/sky reflection on water
    const sv=sunVis();
    if(sv>.05){
        const sxP=sunX();
        const refG=c.createRadialGradient(sxP*W+ox,stY+oy,0,sxP*W+ox,stY+oy,stW*2);
        refG.addColorStop(0,rgba(255,240,200,.04*sv));
        refG.addColorStop(.3,rgba(255,235,190,.015*sv));
        refG.addColorStop(1,'transparent');
        c.fillStyle=refG;
        c.fillRect(0,stY-stW+oy,W,stW*2);
    }

    // Glints
    c.globalCompositeOperation='screen';
    for(let i=0;i<35;i++){
        const gx=((i*47+t*4.2)%(W+80))-40+ox;
        const nx2=gx/W;const curve=n1.fbm(nx2*2.5+18,4)*16;
        const gy=stY+curve+oy+n1.n(i*2+6500)*stW*.22;
        const gl=Math.sin(t*2.2+i*1.8+nx2*6)*.5+.5;
        if(gl>.45){
            c.beginPath();c.ellipse(gx,gy,1.8+n1.n(i*1.3+6510)*2.5,.45,n1.n(i+6520)*.4,0,Math.PI*2);
            const gc=lC([205,225,250],[55,75,115],dk);
            c.fillStyle=rgba(gc[0],gc[1],gc[2],(gl-.45)*.22*(.25+sv*.75));c.fill();
        }
    }
    c.globalCompositeOperation='source-over';
}

// ===== MIST =====
function drawMist(c,bY,cnt,spd,mA,sx,sy,col,px){
    const drift=t*spd,ox2=(smx-.5)*px,oy2=(smy-.5)*px*.14;
    const dk=darkness();const nc=lC(col,[col[0]*.28,col[1]*.28,col[2]*.38],dk);
    for(let i=0;i<cnt;i++){
        const sd=i*3.7+.5;
        const x=((n1.n(sd)*W*1.9+drift*22+ox2)%(W*2.4))-W*.7;
        const y=bY+n1.fbm(drift*.032+sd,2)*24+n1.n(sd+100)*20+oy2;
        const rx=(115+n1.n(sd+200)*110)*sx;const ry=(20+n1.n(sd+300)*16)*sy;
        const al=mA*(.3+n1.fbm(drift*.045+sd,2)*.7);
        for(let p=2;p>=0;p--){
            const pr=1+p*.32,a=al*(1-p*.26);
            const g=c.createRadialGradient(x,y,0,x,y,rx*pr);
            g.addColorStop(0,rgba(nc[0],nc[1],nc[2],a));
            g.addColorStop(.25,rgba(nc[0],nc[1],nc[2],a*.65));
            g.addColorStop(.55,rgba(nc[0]+2,nc[1]+2,nc[2]+2,a*.2));
            g.addColorStop(1,'transparent');
            c.fillStyle=g;c.beginPath();c.ellipse(x,y,rx*pr,ry*pr,n1.n(sd+400)*.2,0,Math.PI*2);c.fill();
        }
    }
}
function drawWispy(c,bY,cnt,spd,al,px){
    const drift=t*spd,ox2=(smx-.5)*px;const dk=darkness();
    const nc=lC([190,200,208],[42,48,62],dk);
    for(let i=0;i<cnt;i++){
        const sd=i*5.1+77;const sx2=((n1.n(sd)*W*2+drift*18+ox2)%(W*1.7))-W*.35;
        const y=bY+n1.n(sd+50)*24;c.beginPath();const len=110+n1.n(sd+80)*130;
        for(let x=0;x<len;x+=2){const py2=y+n1.fbm((sx2+x)*.003+sd+drift*.011,4)*11;
            x===0?c.moveTo(sx2+x,py2):c.lineTo(sx2+x,py2);}
        c.strokeStyle=rgba(nc[0],nc[1],nc[2],al);c.lineWidth=1.5+n1.n(sd+90)*3.5;c.lineCap='round';
        c.shadowColor=rgba(nc[0],nc[1],nc[2],al*.35);c.shadowBlur=6;c.stroke();c.shadowBlur=0;
    }
}

// ===== FOOD FOREST FLOOR =====
function drawFloor(c){
    const baseY=H*.73;
    const px=(smx-.5)*28;const dk=darkness();

    // Ground gradient
    const grd=c.createLinearGradient(0,baseY-22,0,H);
    const fc1=lC([22,38,18],[6,12,6],dk);const fc2=lC([4,8,3],[1,2,1],dk);
    grd.addColorStop(0,rgba(fc1[0],fc1[1],fc1[2],0));
    grd.addColorStop(.02,rgba(fc1[0],fc1[1],fc1[2],1));
    grd.addColorStop(.25,rgba(L(fc1[0],fc2[0],.4),L(fc1[1],fc2[1],.4),L(fc1[2],fc2[2],.4),1));
    grd.addColorStop(1,rgba(fc2[0],fc2[1],fc2[2],1));
    c.fillStyle=grd;c.fillRect(0,baseY-22,W,H-baseY+22);

    // Ground texture — fallen leaves, humus
    try{
        const gD=c.getImageData(0,Math.max(0,baseY|0),W,Math.min(45,H-(baseY|0)));const gd=gD.data;
        for(let i=0;i<gd.length;i+=4){const px2=(i/4)%W,py2=(i/4)/W|0;
            const tex=n4.fbm2(px2*.02,py2*.04,4)*5;
            const leaf=n5.fbm2(px2*.05,py2*.08,3)*2;
            gd[i]=cl(gd[i]+tex+leaf*.5,0,255);gd[i+1]=cl(gd[i+1]+tex*1.15+leaf*.3,0,255);
            gd[i+2]=cl(gd[i+2]+tex*.4,0,255);}
        c.putImageData(gD,0,Math.max(0,baseY|0));
    }catch(e){}

    const fAlpha=L(.3,.08,dk);

    // Fallen leaves
    for(let i=0;i<40;i++){
        const lx=(n1.n(i*1.5+6900)*.5+.5)*W*1.1-W*.05+px;
        const ly=baseY+3+(n1.n(i*2+6910)*.5+.5)*10;
        const lr=1+n1.n(i*3+6920)*1.5;
        const rot=n1.n(i*4+6930)*Math.PI;
        const leafCol=[[55,35,15],[40,28,10],[65,45,18],[50,30,12]][i%4];
        c.save();c.translate(lx,ly);c.rotate(rot);
        c.beginPath();c.ellipse(0,0,lr*1.5,lr*.6,0,0,Math.PI*2);
        c.fillStyle=rgba(leafCol[0],leafCol[1],leafCol[2],fAlpha*.25);c.fill();
        c.restore();
    }

    // Ground cover flowers
    for(let i=0;i<35;i++){
        const fx=(n1.n(i*1.8+7000)*.5+.5)*W*1.1-W*.05+px;
        const fy=baseY+2+(n1.n(i*2.2+7010)*.5+.5)*12;
        if(i%3<2&&dk<.45){
            const fSz=2+n1.n(i*2+7030)*1.3;
            const colors=[[225,185,205],[205,205,125],[185,145,205],[245,205,135],[205,225,185]][i%5];
            c.beginPath();c.moveTo(fx,fy);c.lineTo(fx+Math.sin(t*.18+i)*.7,fy-fSz*2.4);
            c.strokeStyle=rgba(22,48,16,fAlpha);c.lineWidth=.45;c.stroke();
            const petals=4+Math.floor(n1.n(i*3+7020)*2);
            for(let p=0;p<petals;p++){const ang=(p/petals)*Math.PI*2+t*.035;
                c.beginPath();c.ellipse(fx+Math.cos(ang)*fSz*.5+Math.sin(t*.18+i)*.7,
                    fy-fSz*2.4+Math.sin(ang)*fSz*.5,fSz*.38,fSz*.18,ang,0,Math.PI*2);
                c.fillStyle=rgba(colors[0],colors[1],colors[2],fAlpha);c.fill();}
            c.beginPath();c.arc(fx+Math.sin(t*.18+i)*.7,fy-fSz*2.4,fSz*.15,0,Math.PI*2);
            c.fillStyle=rgba(205,185,55,fAlpha);c.fill();
        }
    }

    // Mushrooms
    for(let i=0;i<8;i++){
        const mx2=(n1.n(i*3.1+6950)*.5+.5)*W+px;
        const my2=baseY+4+(n1.n(i*2.4+6955)*.5+.5)*8;
        const mh=3+n1.n(i*2+6960)*2;
        const mw=2+n1.n(i*3+6965)*1.5;
        // Stem
        c.beginPath();c.moveTo(mx2-.5,my2);c.lineTo(mx2-.3,my2-mh);c.lineTo(mx2+.3,my2-mh);c.lineTo(mx2+.5,my2);
        c.fillStyle=rgba(180,170,150,fAlpha*.4);c.fill();
        // Cap
        c.beginPath();c.ellipse(mx2,my2-mh,mw,mh*.35,0,Math.PI,Math.PI*2);
        const mcol=i%3===0?[180,60,40]:i%3===1?[200,170,120]:[160,140,100];
        c.fillStyle=rgba(mcol[0],mcol[1],mcol[2],fAlpha*.35);c.fill();
    }

    // Shrubs with berries
    for(let i=0;i<12;i++){
        const sx2=(i/12)*W*1.1-W*.05+px+n1.n(i*3.8+7100)*30;
        const sy2=baseY+n1.n(i*2.5+7110)*4;const sh=8+n1.n(i*1.9+7120)*9;
        for(let cc=0;cc<5;cc++){
            const cx2=sx2+n1.n(i*5+cc*3+7140)*7;
            const cy=sy2-sh*(.25+cc*.12)+n1.n(i*4+cc*7+7150)*3;
            const cr=3.5+n1.n(i*6+cc*5+7160)*2;
            const sg=c.createRadialGradient(cx2-cr*.2,cy-cr*.2,0,cx2,cy,cr);
            const gv=42+n1.n(i*.2+cc)*6;
            sg.addColorStop(0,rgba(20+n1.n(i*.2+cc)*3,gv+4,16,fAlpha));
            sg.addColorStop(.7,rgba(16,gv-2,12,fAlpha*.7));
            sg.addColorStop(1,rgba(14,gv-5,10,0));
            c.fillStyle=sg;c.beginPath();c.arc(cx2,cy,cr,0,Math.PI*2);c.fill();
        }
        if(i%2===0)for(let f=0;f<3;f++){
            c.beginPath();c.arc(sx2+n1.n(i*7+f*4+7170)*6,sy2-sh*.4+n1.n(i*6+f*6+7180)*sh*.3,1.4,0,Math.PI*2);
            c.fillStyle=rgba(i%4===0?185:205,i%4===0?50:165,i%4===0?40:40,fAlpha*.65);c.fill();}
    }

    // Tree ferns (more detailed fronds)
    for(let i=0;i<6;i++){
        const x=(i/6)*W*1.1-W*.05+px+n1.n(i*4.2+7200)*50;
        const y=baseY+n1.n(i*3+7210)*3;const h=24+n1.n(i*2+7220)*16;
        const sw=Math.sin(t*.16+i*.8)*2.2;
        // Fibrous trunk
        c.beginPath();c.moveTo(x-1.8,y);c.quadraticCurveTo(x+sw*.3-1,y-h*.5,x+sw-1,y-h);
        c.lineTo(x+sw+1,y-h);c.quadraticCurveTo(x+sw*.3+1,y-h*.5,x+1.8,y);c.closePath();
        c.fillStyle=rgba(32,24,16,fAlpha*1.1);c.fill();
        // Diamond pattern on trunk
        for(let d=0;d<h/3;d++){
            const dy=y-d*3;const dx=L(x,x+sw,d*3/h);
            c.beginPath();c.moveTo(dx,dy);c.lineTo(dx+1.5,dy-1.5);c.lineTo(dx,dy-3);c.lineTo(dx-1.5,dy-1.5);c.closePath();
            c.fillStyle=rgba(38,28,18,fAlpha*.3);c.fill();
        }
        const fc=6+Math.floor(n1.n(i*5+7230)*2);
        for(let f=0;f<fc;f++){
            const ang=(f/fc)*Math.PI*1.2-Math.PI*.6+n1.n(f*2+i*7+7235)*.2;
            const fLen=14+n1.n(f*3+i*5+7240)*10;const droop=.35+n1.n(f*2+7260)*.22;
            const fSw=Math.sin(t*.18+i+f*.3)*1.3;
            const ex2=x+sw+Math.cos(ang)*fLen+fSw;const ey=y-h+Math.sin(ang)*fLen+droop*fLen;
            // Frond spine
            c.beginPath();c.moveTo(x+sw,y-h);
            c.quadraticCurveTo(x+sw+Math.cos(ang)*fLen*.5+fSw*.5,y-h+Math.sin(ang)*fLen*.4,ex2,ey);
            c.strokeStyle=rgba(20,46,16,fAlpha);c.lineWidth=1;c.stroke();
            // Pinnae (leaflets along frond)
            for(let p=1;p<=5;p++){const pt=p/6;
                const ppx=L(x+sw,ex2,pt);const ppy=L(y-h,ey,pt);const pLen=(1-pt)*4.5+1.2;
                for(const s of[-1,1]){
                    c.beginPath();c.moveTo(ppx,ppy);
                    c.quadraticCurveTo(ppx+Math.cos(ang+s*.4)*pLen*.5,ppy+Math.sin(ang+s*.4)*pLen*.5,
                        ppx+Math.cos(ang+s*.4)*pLen,ppy+Math.sin(ang+s*.4)*pLen+.7);
                    c.strokeStyle=rgba(17,42+pt*7,13,fAlpha*.65);c.lineWidth=.45;c.stroke();
                }
            }
        }
    }

    // Banana plants
    for(let i=0;i<4;i++){
        const bx=W*(.1+i*.28)+px+n1.n(i*8+7300)*40;
        const by=baseY+n1.n(i*5+7310)*2;const bh=20+n1.n(i*3+7320)*12;
        // Pseudostem
        c.beginPath();c.moveTo(bx-2,by);
        c.quadraticCurveTo(bx-1.5,by-bh*.5,bx-1.2,by-bh);
        c.lineTo(bx+1.2,by-bh);
        c.quadraticCurveTo(bx+1.5,by-bh*.5,bx+2,by);
        c.closePath();
        const bsG=c.createLinearGradient(bx-2,0,bx+2,0);
        bsG.addColorStop(0,rgba(28,42,20,fAlpha));
        bsG.addColorStop(.5,rgba(38,55,28,fAlpha));
        bsG.addColorStop(1,rgba(25,40,18,fAlpha));
        c.fillStyle=bsG;c.fill();

        for(let l=0;l<5;l++){
            const lAng=(l/5)*Math.PI*1.6-Math.PI*.8+n1.n(l*3+i*9+7330)*.3;
            const lLen=14+n1.n(l*4+i*7+7340)*7;const lSw=Math.sin(t*.14+i+l*.5)*2.5;
            const tipX=bx+Math.cos(lAng)*lLen+lSw;
            const tipY=by-bh+Math.sin(lAng)*lLen*.6+lLen*.18;
            c.beginPath();c.moveTo(bx,by-bh);
            c.bezierCurveTo(bx+Math.cos(lAng)*lLen*.3+Math.sin(lAng)*3+lSw*.3,
                by-bh+Math.sin(lAng)*lLen*.3-Math.cos(lAng)*3,
                bx+Math.cos(lAng)*lLen*.7+Math.sin(lAng)*1.8+lSw*.7,
                by-bh+Math.sin(lAng)*lLen*.6+lLen*.06,tipX,tipY);
            c.bezierCurveTo(bx+Math.cos(lAng)*lLen*.7-Math.sin(lAng)*1.8+lSw*.7,
                by-bh+Math.sin(lAng)*lLen*.6+lLen*.06,
                bx+Math.cos(lAng)*lLen*.3-Math.sin(lAng)*3+lSw*.3,
                by-bh+Math.sin(lAng)*lLen*.3+Math.cos(lAng)*3,bx,by-bh);
            // Leaf gradient
            const blG=c.createLinearGradient(bx,by-bh,tipX,tipY);
            blG.addColorStop(0,rgba(16,40+l*2,12,fAlpha*.88));
            blG.addColorStop(.5,rgba(14,36+l*2,10,fAlpha*.78));
            blG.addColorStop(1,rgba(18,32+l*2,14,fAlpha*.55));
            c.fillStyle=blG;c.fill();
            // Midrib
            c.beginPath();c.moveTo(bx,by-bh);
            c.quadraticCurveTo(bx+Math.cos(lAng)*lLen*.5+lSw*.5,
                by-bh+Math.sin(lAng)*lLen*.4+lLen*.03,tipX,tipY);
            c.strokeStyle=rgba(22,50,18,fAlpha*.4);c.lineWidth=.3;c.stroke();
        }
        // Banana bunch (if fruiting)
        if(i%2===0){
            const bbx=bx+n1.n(i*9+7360)*3;const bby=by-bh-2;
            for(let b=0;b<3;b++){
                c.beginPath();c.ellipse(bbx+b*2-2,bby+b*1.5,3,1.2,.3,0,Math.PI*2);
                c.fillStyle=rgba(140,160,45,fAlpha*.4);c.fill();
            }
        }
    }
}

// ===== TREES (foreground) =====
function drawTree(c,bxF,tw,px2){
    const px=(smx-.5)*px2,py=(smy-.5)*px2*.1;
    const x=bxF*W+px;const lean=n1.n(bxF*10)*12;const dk=darkness();

    // Buttress roots (more organic)
    for(let r=0;r<5;r++){
        const side=(r<2?-1:1)*(1+(r%2)*.5);
        const spread=tw*(1.5+r*.35);const rH=tw*(.5+n1.n(r*5+bxF*20)*.28);
        c.beginPath();c.moveTo(x+side*tw*.2,H*.76-rH);
        c.bezierCurveTo(x+side*spread*.35,H*.76-rH*.45,x+side*spread*.65,H*.76-rH*.1,x+side*spread,H*.76+4);
        c.lineTo(x+side*spread*.55,H*.76+4);
        c.bezierCurveTo(x+side*spread*.35,H*.76-rH*.05,x+side*spread*.2,H*.76-rH*.28,x+side*tw*.12,H*.76-rH*.5);
        c.closePath();
        const rG=c.createLinearGradient(x,H*.76-rH,x+side*spread,H*.76);
        rG.addColorStop(0,rgba(8,6,3,L(.55,.25,dk)));
        rG.addColorStop(1,rgba(5,4,2,L(.4,.18,dk)));
        c.fillStyle=rG;c.fill();
    }

    // Trunk with bark texture
    c.beginPath();
    for(let y=H+10;y>=py-10;y-=2){
        const f=(H-y)/H;const tp=1-f*.26;
        const w=n1.n(y*.003+bxF*10)*2.8+n1.n(y*.012+bxF*15)*1.2;
        c.lineTo(x+lean*f-tw*tp+w,y);
    }
    for(let y=py-10;y<=H+10;y+=2){
        const f=(H-y)/H;const tp=1-f*.26;
        const w=n1.n(y*.003+bxF*10)*2.8+n1.n(y*.012+bxF*15)*1.2;
        c.lineTo(x+lean*f+tw*tp-w,y);
    }
    c.closePath();
    const bG=c.createLinearGradient(x-tw*1.5,0,x+tw*1.5,0);
    bG.addColorStop(0,rgba(3,2,1,1));bG.addColorStop(.1,rgba(14,10,4,1));
    bG.addColorStop(.3,rgba(24,17,7,1));bG.addColorStop(.5,rgba(28,20,9,1));
    bG.addColorStop(.7,rgba(22,15,6,1));bG.addColorStop(.9,rgba(12,8,3,1));bG.addColorStop(1,rgba(3,2,1,1));
    c.fillStyle=bG;c.fill();

    // Bark grooves — deeper and more detailed
    for(let i=0;i<12;i++){
        const bxx=x+(i-6)*tw*.12+lean*.3;
        c.beginPath();
        for(let y=H;y>0;y-=4){
            const f2=(H-y)/H;
            c.lineTo(bxx+lean*f2+n1.fbm(y*.002+i*1.9+bxF*8,5)*4,y);
        }
        c.strokeStyle=rgba(2,1,0,.14+n1.n(i+bxF*5)*.06);c.lineWidth=.6;c.stroke();
    }

    // Lichen patches on bark
    for(let i=0;i<6;i++){
        const ly=H*(.2+i*.12);const f=(H-ly)/H;const lX=lean*f;
        const mx2=x+lX+(n1.n(i*5+bxF*12+500)>0?1:-1)*tw*(.2+n1.n(i*3+510)*.12);
        c.beginPath();c.ellipse(mx2,ly+py,tw*(.08+n1.n(i*4+520)*.04),tw*(.05+n1.n(i*3+530)*.03),
            n1.n(i*2+540)*.4,0,Math.PI*2);
        c.fillStyle=rgba(140,155,110,.04+n1.n(i*2+550)*.02);c.fill();
    }

    // Epiphytes, moss, orchids
    for(let i=0;i<10;i++){
        const my2=H*(.08+i*.085);const f=(H-my2)/H;const lX=lean*f;
        const side=n1.n(i*4+bxF*10+100)>0?1:-1;
        const mx2=x+lX+side*tw*(.2+n1.n(i*2+110)*.15);
        // Moss clumps
        for(let j=0;j<3;j++){
            c.beginPath();
            c.arc(mx2+n1.n(i*3+j*5+130)*tw*.12,my2+py+n1.n(i*3+j*7+140)*3.5,
                tw*(.055+n1.n(i*3+j*9+150)*.035),0,Math.PI*2);
            c.fillStyle=rgba(30+j*3,58+j*5,22,.07+j*.012);c.fill();
        }
        // Small orchid (rare, day only)
        if(i%5===2&&dk<.35){
            c.beginPath();c.arc(mx2+1,my2+py-2,1.5,0,Math.PI*2);
            c.fillStyle=rgba(210,160,190,L(.1,.02,dk));c.fill();
            c.beginPath();c.arc(mx2+1.5,my2+py-2.5,.6,0,Math.PI*2);
            c.fillStyle=rgba(235,210,80,L(.08,.01,dk));c.fill();
        }
    }

    // Vines/lianas
    const vc=2+Math.floor(n1.n(bxF*20+200)*2);
    for(let v=0;v<vc;v++){
        const bY2=H*(.1+v*.12+n1.n(v*3+bxF*15+210)*.05);
        const f=(H-bY2)/H;const lX=lean*f;const dir=bxF<.5?1:-1;
        const bSX=x+lX+tw*.35*dir+px;const bSY=bY2+py;
        const bLen=tw*(3.5+n1.n(v*5+bxF*20+220)*2.5);
        // Branch
        c.beginPath();c.moveTo(bSX,bSY);
        c.quadraticCurveTo(bSX+dir*bLen*.5,bSY-22,bSX+dir*bLen,bSY-12+n1.n(v*4+230)*16);
        c.strokeStyle=rgba(14,10,4,.6);c.lineWidth=tw*.15;c.lineCap='round';c.stroke();
        // Hanging vine
        const vX=L(bSX,bSX+dir*bLen,.42);const vY=bSY-9;
        const vLen=35+n1.n(v*6+250)*50;const vSw=Math.sin(t*.15+v*1.3)*4;
        c.beginPath();c.moveTo(vX,vY);
        c.bezierCurveTo(vX+vSw*.25,vY+vLen*.22,vX+vSw*.85,vY+vLen*.5,vX+vSw*.55,vY+vLen);
        c.strokeStyle=rgba(18,30,12,.22);c.lineWidth=1;c.stroke();
        // Vine leaves
        for(let l=0;l<4;l++){const lt=(l+1)/5;
            c.beginPath();
            c.ellipse(vX+vSw*lt*.8+n1.n(l*3+v*10+260)*2.5,vY+vLen*lt,
                2.2,1.4,n1.n(l+v+270)*Math.PI*.4,0,Math.PI*2);
            c.fillStyle=rgba(14,38,10,.14);c.fill();
        }
    }
}

// ===== CANOPY =====
function drawCanopy(c){
    const px=(smx-.5)*32,py=(smy-.5)*16;const dk=darkness();
    // Dense canopy at top
    const cd=lC([4,7,3],[1,2,1],dk);
    c.fillStyle=rgba(cd[0],cd[1],cd[2],1);c.fillRect(0,0,W,H*.04);
    const tG=c.createLinearGradient(0,0,0,H*.15);
    tG.addColorStop(0,rgba(cd[0],cd[1],cd[2],1));tG.addColorStop(1,'transparent');
    c.fillStyle=tG;c.fillRect(0,0,W,H*.15);

    // Canopy leaf clusters
    const cls=[
        [-.06,.04,.34,.19,.96],[.07,.06,.26,.16,.93],[.19,.05,.19,.12,.89],[.28,.10,.15,.08,.81],
        [1.06,.04,.34,.19,.96],[.93,.06,.26,.16,.93],[.81,.05,.19,.12,.89],[.72,.10,.15,.08,.81],
        [.40,.05,.07,.04,.4],[.53,.04,.06,.03,.32],[.62,.07,.06,.035,.36],[.46,.09,.045,.025,.28],
        [.35,.03,.05,.03,.25],[.58,.02,.04,.025,.2],[.50,.06,.055,.03,.3],
    ];
    for(const[cx,cy,rx,ry,d]of cls){
        const gx=cx*W+px,gy=cy*H+py;
        const cc=lC([5,12,4],[1,3,1],dk);
        const g=c.createRadialGradient(gx,gy,0,gx,gy,rx*W);
        g.addColorStop(0,rgba(cc[0],cc[1],cc[2],d));
        g.addColorStop(.3,rgba(cc[0]+2,cc[1]+4,cc[2]+1,d*.72));
        g.addColorStop(.6,rgba(cc[0]+3,cc[1]+7,cc[2]+2,d*.32));
        g.addColorStop(1,'transparent');
        c.fillStyle=g;c.beginPath();c.ellipse(gx,gy,rx*W,ry*H,0,0,Math.PI*2);c.fill();
        // Sub-clusters for individual leaf feeling
        if(rx>.055)for(let i=0;i<5;i++){
            const a=n1.n(cx*10+i*3.2)*Math.PI*2;
            const dist=rx*W*(.4+n1.n(cx*10+i*7.1)*.4);
            c.beginPath();c.arc(gx+Math.cos(a)*dist,gy+Math.sin(a)*dist*(ry/rx),
                rx*W*(.12+n1.n(cx*10+i*11)*.08),0,Math.PI*2);
            c.fillStyle=rgba(cc[0]+1,cc[1]+3,cc[2]+1,d*.45);c.fill();
        }
    }

    // Hanging leaves
    for(let i=0;i<32;i++){
        const lx=W*(.16+(i/32)*.68)+px+n1.n(i*1.1+1200)*42;
        const ly=H*(.035+n1.n(i*.65+1250)*.11)+py;
        const sw=Math.sin(t*.22+i*.45)*3.8;const len=9+n1.n(i*1.3+1260)*14;
        c.beginPath();c.moveTo(lx+sw,ly);
        c.bezierCurveTo(lx+sw+3.5,ly+len*.22,lx+sw+2.2,ly+len*.62,lx+sw+.5,ly+len);
        c.bezierCurveTo(lx+sw-2.2,ly+len*.62,lx+sw-3.5,ly+len*.22,lx+sw,ly);
        const lc=lC([10,28,8],[3,10,3],dk);
        c.fillStyle=rgba(lc[0],lc[1],lc[2],.17+n1.n(i*.3+1270)*.08);c.fill();
    }

    // Light filtering through canopy gaps (day only)
    const sv=sunVis();
    if(sv>.1){
        c.globalCompositeOperation='screen';
        for(let i=0;i<8;i++){
            const gx=W*(.3+n1.n(i*4.5+1300)*.4)+px;
            const gy=H*(n1.n(i*3.2+1310)*.08);
            const gr=15+n1.n(i*2.8+1320)*25;
            const ga=.01*sv*cl(Math.sin(t*.15+i*2)*.5+.5);
            if(ga>.002){
                const g=c.createRadialGradient(gx,gy,0,gx,gy,gr);
                g.addColorStop(0,rgba(255,248,220,ga));
                g.addColorStop(.5,rgba(200,230,180,ga*.3));
                g.addColorStop(1,'transparent');
                c.fillStyle=g;c.beginPath();c.arc(gx,gy,gr,0,Math.PI*2);c.fill();
            }
        }
        c.globalCompositeOperation='source-over';
    }
}

// ===== SKY =====
function drawSky(c){
    const skyStops={
        night:  [[2,3,10],[4,5,15],[7,9,25],[10,13,35],[16,18,42],[13,16,38],[9,11,28],[5,7,18]],
        dawn:   [[7,10,25],[16,22,45],[40,58,88],[88,108,132],[162,148,122],[212,138,78],[202,88,38],[122,42,20]],
        day:    [[22,55,115],[38,78,148],[58,108,178],[88,138,198],[128,168,208],[158,188,212],[138,168,198],[98,138,178]],
        sunset: [[12,16,38],[22,28,52],[48,48,78],[98,78,98],[178,118,88],[218,128,58],[208,82,32],[128,42,20]],
    };
    let stops;const td=timeOfDay;
    if(td<.18){stops=skyStops.night.map(c2=>c2);}
    else if(td<.32){const f=(td-.18)/.14;stops=skyStops.night.map((c2,i)=>lC(c2,skyStops.dawn[i],f));}
    else if(td<.42){const f=(td-.32)/.1;stops=skyStops.dawn.map((c2,i)=>lC(c2,skyStops.day[i],f));}
    else if(td<.58){stops=skyStops.day.map(c2=>c2);}
    else if(td<.7){const f=(td-.58)/.12;stops=skyStops.day.map((c2,i)=>lC(c2,skyStops.sunset[i],f));}
    else if(td<.85){const f=(td-.7)/.15;stops=skyStops.sunset.map((c2,i)=>lC(c2,skyStops.night[i],f));}
    else{stops=skyStops.night.map(c2=>c2);}

    for(let y=0;y<H*.73;y++){
        const f=y/(H*.73);let idx=cl(f*7,0,6.99);const lo=idx|0;const hi=Math.min(lo+1,7);
        const fr=idx-lo;const cc=lC(stops[lo],stops[hi],fr);
        const nv=n1.n(y*.005+100)*2.2;
        c.fillStyle=rgba(cc[0]+nv,cc[1]+nv*.4,cc[2]-nv*.1);c.fillRect(0,y,W,1);
    }
}

function drawSunMoon(c){
    const sv=sunVis(),mv=moonVis();
    if(sv>.01){
        const sx2=sunX()*W+(smx-.5)*W*.012;const sy2=sunY()*H+(smy-.5)*H*.006;
        // Outer glow
        for(let i=5;i>=0;i--){const r=90+i*55;
            const g=c.createRadialGradient(sx2,sy2,0,sx2,sy2,r);
            g.addColorStop(0,rgba(255,248,218,(.025-i*.003)*sv));g.addColorStop(1,'transparent');
            c.fillStyle=g;c.beginPath();c.arc(sx2,sy2,r,0,Math.PI*2);c.fill();}
        // Sun disc
        const d=c.createRadialGradient(sx2,sy2,0,sx2,sy2,26);
        d.addColorStop(0,rgba(255,252,242,.72*sv));d.addColorStop(.25,rgba(255,238,185,.45*sv));
        d.addColorStop(.6,rgba(248,205,115,.12*sv));d.addColorStop(1,'transparent');
        c.fillStyle=d;c.beginPath();c.arc(sx2,sy2,26,0,Math.PI*2);c.fill();
    }
    if(mv>.01){
        const mx2=W*(.55+(smx-.5)*.012);const my2=H*(.26+(smy-.5)*.006);
        for(let i=2;i>=0;i--){const r=48+i*38;
            const g=c.createRadialGradient(mx2,my2,0,mx2,my2,r);
            g.addColorStop(0,rgba(182,198,225,(.016-i*.004)*mv));g.addColorStop(1,'transparent');
            c.fillStyle=g;c.beginPath();c.arc(mx2,my2,r,0,Math.PI*2);c.fill();}
        const md=c.createRadialGradient(mx2,my2,0,mx2,my2,17);
        md.addColorStop(0,rgba(232,238,248,.58*mv));md.addColorStop(.35,rgba(212,220,232,.42*mv));
        md.addColorStop(.75,rgba(182,192,212,.16*mv));md.addColorStop(1,'transparent');
        c.fillStyle=md;c.beginPath();c.arc(mx2,my2,17,0,Math.PI*2);c.fill();
        // Crescent shadow
        c.beginPath();c.arc(mx2+5.5,my2-1.5,13,0,Math.PI*2);c.fillStyle=rgba(6,8,18,.42*mv);c.fill();
        // Stars
        for(let i=0;i<60;i++){
            const stx=(n1.n(i*2.3+8000)*.5+.5)*W;const sty=(n1.n(i*3.1+8050)*.5+.5)*H*.4;
            const twinkle=(.22+Math.sin(t*.35+i*1.7)*.28)*mv;
            if(twinkle>.08&&sty<H*.36){c.beginPath();c.arc(stx,sty,.3+n1.n(i*4+8100)*.55,0,Math.PI*2);
                c.fillStyle=rgba(222,228,242,twinkle*.28);c.fill();}
        }
    }
}

// ===== LIGHT RAYS =====
function drawRays(c){
    const sv=sunVis();if(sv<.02)return;
    c.globalCompositeOperation='screen';
    const rays=[
        {x:.35,a:4,w:42,ph:0},{x:.44,a:-1.5,w:28,ph:2},{x:.52,a:6,w:22,ph:4},
        {x:.39,a:1,w:16,ph:1.5},{x:.48,a:-3,w:18,ph:3.2},
    ];
    for(const r of rays){
        const int=cl(.5+Math.sin(t*.18+r.ph)*.5)*.038*sv;if(int<.002)continue;
        c.save();c.translate(r.x*W,0);c.rotate(r.a*Math.PI/180);
        const g=c.createLinearGradient(0,0,0,H*.8);
        g.addColorStop(0,rgba(255,240,180,int));g.addColorStop(.2,rgba(255,234,170,int*.5));
        g.addColorStop(.5,rgba(255,230,160,int*.12));g.addColorStop(1,'transparent');
        c.fillStyle=g;c.fillRect(-r.w/2,0,r.w,H*.8);c.restore();
    }
    c.globalCompositeOperation='source-over';
}

// ===== CREATURES =====
const bflies=Array.from({length:12},(_,i)=>({
    x:.18+n1.n(i*3+9000)*.64,y:.54+n1.n(i*3.5+9050)*.22,
    ph:n1.n(i*4+9100)*Math.PI*2,sp:.05+n1.n(i*2+9150)*.14,
    sz:2.2+n1.n(i*5+9200)*1.8,
    col:[[205,145,65],[185,85,125],[105,145,205],[205,185,85],[165,105,185],[220,165,95]][i%6],
    wph:n1.n(i*6+9250)*Math.PI*2
}));
const fflies=Array.from({length:16},(_,i)=>({
    x:.12+n1.n(i*3+9300)*.76,y:.62+n1.n(i*3.4+9350)*.2,
    ph:n1.n(i*4.1+9400)*Math.PI*2,sp:.07+n1.n(i*1.9+9450)*.22,
    sz:1+n1.n(i*4.8+9500)*1.6
}));

function drawCreatures(c){
    const dk=darkness();
    // Butterflies
    if(dk<.45){
        const bA=1-dk*2.2;
        for(const b of bflies){
            const x=b.x*W+Math.sin(t*b.sp+b.ph)*48;
            const y=b.y*H+Math.cos(t*b.sp*.65+b.ph+1)*22+Math.sin(t*b.sp*1.4+b.ph)*12;
            const wb=Math.sin(t*5.2+b.wph);
            c.save();c.translate(x,y);
            // Body
            c.beginPath();c.ellipse(0,0,b.sz*.14,b.sz*.55,0,0,Math.PI*2);
            c.fillStyle=rgba(28,18,8,bA*.22);c.fill();
            const fs=.22+Math.abs(wb)*.78;
            for(const s of[-1,1]){
                // Upper wing
                c.beginPath();c.ellipse(s*b.sz*.48*fs,-b.sz*.18,b.sz*.48*fs,b.sz*.42,s*.22,0,Math.PI*2);
                c.fillStyle=rgba(b.col[0],b.col[1],b.col[2],bA*.15);c.fill();
                // Lower wing
                c.beginPath();c.ellipse(s*b.sz*.32*fs,b.sz*.08,b.sz*.24*fs,b.sz*.28,s*.15,0,Math.PI*2);
                c.fillStyle=rgba(b.col[0]+20,b.col[1]+12,b.col[2]+8,bA*.1);c.fill();
            }
            c.restore();
        }
    }
    // Fireflies — near forest floor
    if(dk>.2){
        const fA=cl((dk-.2)*1.4);
        for(const f of fflies){
            const x=f.x*W+Math.sin(t*f.sp+f.ph)*32;
            const y=f.y*H+Math.cos(t*f.sp*.4+f.ph+1)*16;
            const b=cl(Math.sin(t*.75+f.ph));
            if(b>.35){
                const g=c.createRadialGradient(x,y,0,x,y,f.sz*7);
                g.addColorStop(0,rgba(178,198,68,b*fA*.32));
                g.addColorStop(.2,rgba(178,198,68,b*fA*.08));g.addColorStop(1,'transparent');
                c.fillStyle=g;c.beginPath();c.arc(x,y,f.sz*7,0,Math.PI*2);c.fill();
                c.beginPath();c.arc(x,y,f.sz*.38,0,Math.PI*2);
                c.fillStyle=rgba(242,244,158,b*fA*.75);c.fill();
            }
        }
    }
    // Dust motes / pollen
    const dA=L(1,.22,dk);
    for(let i=0;i<35;i++){
        const dx=(.18+n1.n(i*1.5+9600)*.64)*W+Math.sin(t*(.025+n1.n(i*1.1+9650)*.1)*.5+n1.n(i*3.8+9700)*Math.PI*2)*28;
        const dy=((.18+n1.n(i*1.9+9750)*.52)*H+t*(.025+n1.n(i*1.1+9650)*.1)*3)%(H*.55)+H*.14;
        const v=(.035+n1.n(i*2.3+9800)*.075)*(.5+Math.sin(t*.55+n1.n(i*3.8+9700)*Math.PI*2)*.5)*dA;
        if(v>.008){c.beginPath();c.arc(dx,dy,.25+n1.n(i*2.8+9850)*.95,0,Math.PI*2);
            c.fillStyle=rgba(205,195,165,v);c.fill();}
    }
}

// ===== VIGNETTE =====
function drawVignette(c){
    const dk=darkness();const vc=lC([2,4,1],[1,1,3],dk);
    const v=c.createRadialGradient(W/2,H*.36,W*.14,W/2,H*.36,W*.74);
    v.addColorStop(0,'transparent');v.addColorStop(.4,'transparent');
    v.addColorStop(.72,rgba(vc[0],vc[1],vc[2],.2+dk*.16));
    v.addColorStop(1,rgba(vc[0],vc[1],vc[2],.5+dk*.24));
    c.fillStyle=v;c.fillRect(0,0,W,H);
    const b=c.createLinearGradient(0,H*.82,0,H);
    b.addColorStop(0,'transparent');b.addColorStop(1,rgba(vc[0],vc[1],vc[2],.3+dk*.16));
    c.fillStyle=b;c.fillRect(0,H*.82,W,H*.18);
}

// ===== RENDER =====
function drawStatic(){
    bg.clearRect(0,0,W,H);
    drawSky(bg);drawSunMoon(bg);
    // Cirrus clouds
    bg.globalAlpha=L(.028,.008,darkness());
    for(let i=0;i<5;i++){const cy=H*(.07+i*.045),cx=W*(.1+i*.2);bg.beginPath();
        for(let x=-140;x<140;x+=2){const ht=1-(x/140)**2;
            const y=cy+n1.fbm(x*.012+i*4.5,4)*5.5*ht;x===-140?bg.moveTo(cx+x,y):bg.lineTo(cx+x,y);}
        bg.strokeStyle=rgba(188,185,175,1);bg.lineWidth=5.5;bg.lineCap='round';bg.stroke();}
    bg.globalAlpha=1;

    // Hills with mist interleaved
    drawHill(bg,hillTex[0],W*.26,W*.58,H*.16,H*.47,n1,1.2,4);
    drawMist(bg,H*.42,8,.06,.065,2.3,1.35,[165,180,198],5);
    drawWispy(bg,H*.40,3,.05,.018,5);
    drawHill(bg,hillTex[1],W*.70,W*.50,H*.13,H*.51,n2,3.4,9);
    drawHill(bg,hillTex[2],W*.38,W*.40,H*.10,H*.505,n2,4.1,10);
    drawMist(bg,H*.48,10,.09,.075,1.85,1.25,[180,195,205],10);
    drawWispy(bg,H*.46,4,.075,.022,8);
    drawHill(bg,hillTex[3],W*.48,W*.68,H*.11,H*.56,n3,5.8,15);
    drawStream(bg);
    drawMist(bg,H*.59,12,.12,.085,1.95,1.45,[185,198,205],14);
    drawWispy(bg,H*.57,5,.1,.028,12);
    drawFloor(bg);
    drawTree(bg,.28,12,16);drawTree(bg,.70,10,16);
    drawTree(bg,.05,44,36);drawTree(bg,-.05,54,42);
    drawTree(bg,.92,40,36);drawTree(bg,1.05,50,42);
    drawCanopy(bg);
}

function drawAnimated(){
    fg.clearRect(0,0,W,H);
    drawMist(fg,H*.41,4,.065,.032,1.8,1,[162,178,195],5);
    drawMist(fg,H*.48,5,.10,.038,1.55,1.12,[178,192,200],10);
    drawMist(fg,H*.58,7,.13,.048,1.75,1.25,[182,196,202],14);
    drawWispy(fg,H*.44,2,.065,.01,6);drawWispy(fg,H*.54,3,.09,.015,10);
    drawRays(fg);drawCreatures(fg);drawVignette(fg);
}

let lastTOD=-1;
function render(){
    t+=.016;smx=L(smx,mx,.016);smy=L(smy,my,.016);
    tLabel.textContent=getTimeLabel(timeOfDay);

    const moved=Math.abs(smx-psmx)>.0008||Math.abs(smy-psmy)>.0008;
    const todChanged=Math.abs(timeOfDay-lastTOD)>.0008;
    if(needsRedraw||moved||todChanged){drawStatic();psmx=smx;psmy=smy;lastTOD=timeOfDay;needsRedraw=false;}
    drawAnimated();
    requestAnimationFrame(render);
}
resize();
</script>
