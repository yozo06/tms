# ===========================================================================
# WildArc — Local Development Docker Compose
# ===========================================================================
# Usage:
#   1. Copy .env.example to .env and fill in your Supabase + Google credentials
#   2. docker-compose up
#   3. Backend API:   http://localhost:3000
#      Frontend dev:  http://localhost:5173
#
# Hot-reload is enabled for both services via volume mounts.
# ===========================================================================

version: '3.9'

services:
  # ---- Backend API (Node.js + Express + TypeScript) ----
  api:
    build:
      context: .
      dockerfile: Dockerfile.dev
      target: api
    container_name: wildarc-api
    ports:
      - "3000:3000"
    volumes:
      - ./src:/app/src:ro           # source mount — read-only in container
      - ./tsconfig.json:/app/tsconfig.json:ro
      - /app/node_modules            # anonymous volume prevents host override
    env_file:
      - .env
    environment:
      - NODE_ENV=development
      - PORT=3000
      - FRONTEND_URL=http://localhost:5173
    command: npx ts-node-dev --respawn --transpile-only src/server.ts
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ---- Frontend (Vite Dev Server) ----
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.dev
      target: frontend
    container_name: wildarc-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/frontend/src:ro
      - ./frontend/public:/app/frontend/public:ro
      - ./frontend/index.html:/app/frontend/index.html:ro
      - /app/frontend/node_modules
    environment:
      - VITE_API_URL=http://localhost:3000
    command: npx vite --host 0.0.0.0 --port 5173
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy

